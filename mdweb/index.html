// ── Load folder ───────────────────────────────────────────────────────────────
async function loadFolder(handle) {
  stopWatching();
  state.rootHandle      = handle;
  state.rootName        = handle.name;
  state.editMode        = false;
  state.dirty           = false;
  state.writePermission = false;
  state.splitRatio      = 0.5;
  state.currentFileType = null;
  state.visibleCategories = new Set(['markdown','html','code','text','viewable','unsupported']);
  state.files.clear();
  state.dirs.clear();
  state.tree = { name: handle.name, children: {}, files: [], path: '', handle: handle };

  await walkDir(handle, state.tree, '');

  sidebarWelcome.style.display  = 'none';
  sidebarTreeWrap.style.display = 'block';
  sidebarBottom.classList.add('visible');
  headerFolderName.textContent = handle.name;
  headerFolderName.classList.add('visible');
  welcomeContent.style.display = 'none';

  renderTree(state.tree);
  buildFilterBar();
  treeFilter.classList.add('visible');
  treeSearch.classList.add('visible');
  treeSearchInput.value = '';
  filterTree('');
  state.treeCollapsed = false;
  updateCollapseBtn();
  startWatching();

  // Priority: README.md → index.html → first file → folder view
  const readme  = findFile('README.md') || findFile('readme.md');
  const indexHtml = findFile('index.html');
  const first   = firstFile(state.tree);
  if (readme)    openFile(readme);
  else if (first) openFile(first);
  else            openDir('');
}

// ── Walk directory ────────────────────────────────────────────────────────────
async function walkDir(dirHandle, node, prefix) {
  const entries = [];
  for await (const e of dirHandle.values()) entries.push(e);
  entries.sort((a, b) => {
    if (a.kind !== b.kind) return a.kind === 'directory' ? -1 : 1;
    return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
  });
  for (const entry of entries) {
    if (entry.name.startsWith('.')) continue;
    const path = prefix ? `${prefix}/${entry.name}` : entry.name;
    if (entry.kind === 'directory') {
      const child = { name: entry.name, children: {}, files: [], path, handle: entry };
      node.children[entry.name] = child;
      state.dirs.set(path, child);
      await walkDir(entry, child, path);
    } else if (entry.kind === 'file') {
      // Collect ALL files — filter happens in the tree render layer
      node.files.push({ name: entry.name, path, handle: entry });
      state.files.set(path, entry);
    }
  }
}

// ── File-tree refresh & watching ──────────────────────────────────────────────

// Collect all paths from the current walk into a plain Set (no state mutation).
async function collectPaths(dirHandle, prefix, out) {
  for await (const e of dirHandle.values()) {
    if (e.name.startsWith('.')) continue;
    const path = prefix ? `${prefix}/${e.name}` : e.name;
    if (e.kind === 'directory') {
      out.add(path + '/');
      await collectPaths(e, path, out);
    } else {
      out.add(path);
    }
  }
}

// Re-scan the directory tree and repaint the sidebar without touching the viewer.
async function refreshTree() {
  if (!state.rootHandle) return;

  // Rebuild internal state from disk.
  state.files.clear();
  state.dirs.clear();
  state.tree = { name: state.rootName, children: {}, files: [], path: '', handle: state.rootHandle };
  await walkDir(state.rootHandle, state.tree, '');

  // Repaint the sidebar.
  renderTree(state.tree);
  buildFilterBar();

  // Re-apply any active search query so filter state survives the re-render.
  if (treeSearchInput.value) filterTree(treeSearchInput.value);

  // Restore active selection highlight without reloading content.
  if (state.currentPath) {
    const item = sidebarTreeWrap.querySelector(`[data-path="${CSS.escape(state.currentPath)}"]`);
    if (item) {
      item.classList.add('active');
      item.scrollIntoView({ block: 'nearest' });
    } else {
      // The active file no longer exists — show a notice banner.
      showDeletedFileBanner(state.currentPath);
    }
  }

  // Restore dirty dot if applicable.
  updateTreeDirtyState();
}

function showDeletedFileBanner(path) {
  const filename = path.split('/').pop();
  readerInner.className = '';
  readerInner.innerHTML = `
    <div class="notice-pane">
      <div class="notice-pane-icon">⚠️</div>
      <div class="notice-pane-title">File no longer found</div>
      <div class="notice-pane-sub">
        <strong>${escHtml(filename)}</strong> has been moved or deleted from the folder.<br>
        Select another file from the sidebar.
      </div>
    </div>`;
  hideAllPanels();
  reader.style.display = 'block';
  breadcrumb.classList.add('visible');
  state.currentPath = null;
}

function stopWatching() {
  if (state.watchInterval !== null) {
    clearInterval(state.watchInterval);
    state.watchInterval = null;
  }
}

async function startWatching() {
  stopWatching();
  // Snapshot of known paths at the time watching starts.
  let knownPaths = new Set(state.files.keys());
  // Add directory paths too (with trailing slash).
  for (const [p] of state.dirs) knownPaths.add(p + '/');

  state.watchInterval = setInterval(async () => {
    if (!state.rootHandle) { stopWatching(); return; }
    try {
      const current = new Set();
      await collectPaths(state.rootHandle, '', current);

      // Compare to known paths (files only, without trailing-slash dirs).
      const currentFiles = new Set([...current].filter(p => !p.endsWith('/')));
      const changed = knownPaths.size !== currentFiles.size ||
                      [...currentFiles].some(p => !knownPaths.has(p)) ||
                      [...knownPaths].some(p => !currentFiles.has(p));

      if (changed) {
        knownPaths = currentFiles;
        await refreshTree();
      }
    } catch (e) {
      // Permission may have been revoked; stop watching silently.
      console.warn('mdweb watch error:', e);
      stopWatching();
    }
  }, 10000);
}

// ── Tree-item move (drag within sidebar) ─────────────────────────────────────

// Resolve a dir node's FileSystemDirectoryHandle from its path string.
function getDirHandle(dirPath) {
  if (dirPath === '') return state.tree.handle;       // root
  const node = state.dirs.get(dirPath);
  if (!node) throw new Error(`Unknown dir path: "${dirPath}"`);
  return node.handle;
}

// Resolve the handle of the parent directory for any entry path.
function getParentDirHandle(entryPath) {
  const parentPath = entryPath.includes('/')
    ? entryPath.split('/').slice(0, -1).join('/')
    : '';
  return getDirHandle(parentPath);
}

// Copy a single file from srcDirHandle to destDirHandle using ArrayBuffer
// (safe for both text and binary), then delete the original.
async function moveFile(srcDirHandle, name, destDirHandle, newName) {
  const srcFileHandle  = await srcDirHandle.getFileHandle(name);
  const file           = await srcFileHandle.getFile();
  const buffer         = await file.arrayBuffer();
  const destFileHandle = await destDirHandle.getFileHandle(newName, { create: true });
  const writable       = await destFileHandle.createWritable();
  await writable.write(buffer);
  await writable.close();
  await srcDirHandle.removeEntry(name);
}

// Recursively copy a directory tree then remove the original.
async function moveDirectory(srcParentHandle, name, destDirHandle, newName) {
  const srcDir  = await srcParentHandle.getDirectoryHandle(name);
  const destDir = await destDirHandle.getDirectoryHandle(newName, { create: true });
  for await (const entry of srcDir.values()) {
    if (entry.name.startsWith('.')) continue;
    if (entry.kind === 'file') {
      await moveFile(srcDir, entry.name, destDir, entry.name);
    } else {
      await moveDirectory(srcDir, entry.name, destDir, entry.name);
    }
  }
  await srcParentHandle.removeEntry(name, { recursive: true });
}

// Orchestrate a move: validate, prompt, acquire write permission, execute.
async function moveEntry(srcPath, destDirPath, kind) {
  if (!srcPath) return;

  // Guard: dropping onto itself
  if (srcPath === destDirPath) return;

  // Guard: can't move a directory into itself or any of its descendants
  if (kind === 'directory' && destDirPath.startsWith(srcPath + '/')) {
    showToast('Cannot move a folder into one of its own subfolders.', { type: 'warn' });
    return;
  }

  // Guard: already in the destination directory (no-op)
  const srcParentPath = srcPath.includes('/')
    ? srcPath.split('/').slice(0, -1).join('/')
    : '';
  if (srcParentPath === destDirPath) {
    showToast('Already in that folder.', { type: 'warn', duration: 3000 });
    return;
  }

  const name      = srcPath.split('/').pop();
  const destLabel = destDirPath === '' ? state.rootName : destDirPath.split('/').pop();
  if (!confirm(`Move "${name}" into "${destLabel}"?`)) return;

  // Ensure write permission
  if (!state.writePermission) {
    const perm = await state.rootHandle.requestPermission({ mode: 'readwrite' });
    if (perm !== 'granted') { showPermDenied(); return; }
    state.writePermission = true;
  }

  try {
    const srcParentHandle = getParentDirHandle(srcPath);
    const destDirHandle   = getDirHandle(destDirPath);

    if (kind === 'file') {
      await moveFile(srcParentHandle, name, destDirHandle, name);
    } else {
      await moveDirectory(srcParentHandle, name, destDirHandle, name);
    }

    const newPath = destDirPath ? `${destDirPath}/${name}` : name;
    showToast(`Moved "${name}" to "${destLabel}".`, { type: 'ok', duration: 3000 });

    // Refresh tree; if the moved file was open, re-open it at its new location.
    if (kind === 'file' && state.currentPath === srcPath) {
      state.currentPath = null;
      await refreshTree();
      openFile(newPath);
    } else if (kind === 'directory' && state.currentPath && state.currentPath.startsWith(srcPath + '/')) {
      // Active file was inside the moved directory; update its path.
      const relativePath = state.currentPath.slice(srcPath.length);
      state.currentPath = null;
      await refreshTree();
      openFile(newPath + relativePath);
    } else {
      await refreshTree();
    }
  } catch (err) {
    console.error('Move failed:', err);
    showToast(`Move failed: ${err.message}`, { type: 'error', duration: 8000 });
  }
}

// ── Toast notification ────────────────────────────────────────────────────────
let _toastTimer = null;
const toast = document.getElementById('toast');

// showToast(msg, { type: 'error'|'warn'|'ok'|'', duration: ms })
// duration=0 means stay until dismissed.
function showToast(msg, { type = '', duration = 5000 } = {}) {
  clearTimeout(_toastTimer);
  toast.textContent = msg;
  toast.className = 'visible' + (type ? ` toast-${type}` : '');
  if (duration > 0) {
    _toastTimer = setTimeout(() => toast.classList.remove('visible'), duration);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function findFile(name) {
  for (const [path] of state.files) {
    if (path === name || path.endsWith('/' + name)) return path;
  }
  return null;
}
function firstFile(node) {
  if (node.files.length > 0) return node.files[0].path;
  for (const child of Object.values(node.children)) {
    const f = firstFile(child); if (f) return f;
  }
  return null;
}
function getNode(dirPath) {
  if (dirPath === '') return state.tree;
  return state.dirs.get(dirPath) || null;
}
function resolveRelativePath(fromPath, relPath) {
  if (relPath.startsWith('http://') || relPath.startsWith('https://')) return null;
  const parts = fromPath.split('/');
  parts.pop();
  for (const seg of relPath.split('/')) {
    if (seg === '..') parts.pop();
    else if (seg !== '.') parts.push(seg);
  }
  return parts.join('/');
}
function confirmDiscard() {
  const name = state.currentPath ? state.currentPath.split('/').pop() : 'this file';
  return confirm(`You have unsaved changes in "${name}".\n\nDiscard changes and continue?`);
}

// ── Open folder (card view) ───────────────────────────────────────────────────
function openDir(dirPath) {
  if (state.dirty && !confirmDiscard()) return;
  if (state.editMode) leaveEditMode(true);
  markCleanSilent();

  state.currentPath    = null;
  state.currentDirPath = dirPath;
  state.currentFileType = null;

  document.querySelectorAll('.tree-item.active').forEach(e => e.classList.remove('active'));
  hideAllPanels();
  breadcrumb.classList.add('visible');
  contentToolbar.classList.remove('visible');
  metaStrip.classList.remove('visible');
  folderView.classList.add('visible');

  renderFolderView(dirPath);
  renderBreadcrumbForDir(dirPath);
  folderView.scrollTop = 0;
}

// ── Folder card view ──────────────────────────────────────────────────────────
function renderFolderView(dirPath) {
  const node = getNode(dirPath);
  folderView.innerHTML = '';
  if (!node) { folderView.innerHTML = '<div class="state-msg">Folder not found.</div>'; return; }

  const dirs  = Object.values(node.children);
  const files = node.files;
  if (dirs.length === 0 && files.length === 0) {
    folderView.innerHTML = '<div class="state-msg">This folder is empty.</div>'; return;
  }

  if (dirs.length > 0) {
    const section = document.createElement('div');
    section.className = 'folder-view-section';
    section.appendChild(el('p', 'folder-view-heading', 'Folders'));
    const grid = document.createElement('div');
    grid.className = 'card-grid';
    for (const dir of dirs) {
      const total = countFiles(dir);
      const card = document.createElement('div');
      card.className = 'card-dir';
      card.innerHTML = `
        <div class="card-dir-icon">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="#58a6ff" opacity="0.85"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C8.17 3.71 8.692 4 9.5 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5z"/></svg>
        </div>
        <div class="card-dir-body">
          <div class="card-dir-name">${escHtml(dir.name)}</div>
          <div class="card-dir-count">${total} file${total !== 1 ? 's' : ''}</div>
        </div>`;
      card.addEventListener('click', () => openDir(dir.path));
      grid.appendChild(card);
    }
    section.appendChild(grid);
    folderView.appendChild(section);
  }

  if (files.length > 0) {
    // Group files by category
    const groups = {};
    for (const f of files) {
      const ft = getFileType(f.name);
      const cat = ft.category;
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(f);
    }
    const catOrder = ['markdown', 'html', 'code', 'text', 'viewable', 'unsupported'];
    const catLabels = { markdown: 'Markdown', html: 'HTML', code: 'Code', text: 'Text', viewable: 'Viewable', unsupported: 'Other' };

    for (const cat of catOrder) {
      if (!groups[cat]) continue;
      const section = document.createElement('div');
      section.className = 'folder-view-section';
      section.appendChild(el('p', 'folder-view-heading', catLabels[cat]));
      const grid = document.createElement('div');
      grid.className = 'card-grid';
      for (const file of groups[cat]) grid.appendChild(makeFileCard(file));
      section.appendChild(grid);
      folderView.appendChild(section);
    }
  }
}

function makeFileCard(file) {
  const ft = getFileType(file.name);
  const card = document.createElement('div');
  card.className = 'card-file';

  // Header: icon dot + name + ext pill
  const header = document.createElement('div');
  header.className = 'card-file-header';

  const iconDot = document.createElement('span');
  iconDot.className = 'card-file-icon';
  // Coloured dot per type
  const dotColor = (CAT_META[ft.category] || { color: '#374151' }).color;
  iconDot.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="4" fill="${dotColor}"/></svg>`;

  const nameEl = document.createElement('div');
  nameEl.className = 'card-file-name';
  nameEl.textContent = file.name;

  const extPill = document.createElement('span');
  extPill.className = `card-file-ext badge ${ft.badgeClass}`;
  extPill.textContent = ft.label;

  header.appendChild(iconDot);
  header.appendChild(nameEl);
  header.appendChild(extPill);
  card.appendChild(header);

  const badgeRow = document.createElement('div');
  badgeRow.className = 'card-file-badges';
  card.appendChild(badgeRow);

  const snippet = document.createElement('div');
  snippet.className = 'card-file-snippet';
  card.appendChild(snippet);

  card.addEventListener('click', () => openFile(file.path));
  enrichFileCard(file, ft, badgeRow, snippet);
  return card;
}

async function enrichFileCard(file, ft, badgeRow, snippet) {
  // Don't try to read binary/viewable/unsupported files as text
  if (ft.category === 'viewable' || ft.category === 'unsupported') return;
  try {
    const text = await (await file.handle.getFile()).text();
    if (ft.category === 'markdown') {
      const { meta, body } = parseFileMeta(text);
      if (meta.artifact) badgeRow.appendChild(mkBadge(meta.artifact, 'badge-blue'));
      if (meta.type) {
        const cls = { PSIRT:'badge-psirt', APPSEC:'badge-appsec', CSIRT:'badge-csirt', OSS:'badge-oss' }[meta.type] || 'badge-grey';
        badgeRow.appendChild(mkBadge(meta.type, cls));
      }
      const lines = body.split('\n');
      for (const line of lines) {
        const clean = line.replace(/^#+\s*/, '').replace(/[*_`]/g, '').trim();
        if (clean.length > 20) { snippet.textContent = clean.length > 120 ? clean.slice(0, 120) + '…' : clean; break; }
      }
    } else {
      // For all other types: grab first meaningful line
      const lines = text.split('\n');
      for (const line of lines) {
        const clean = line.replace(/^\s*[/*#!;-]+\s*/, '').trim();
        if (clean.length > 10) { snippet.textContent = clean.length > 120 ? clean.slice(0, 120) + '…' : clean; break; }
      }
    }
  } catch { /* leave empty */ }
}

// ── Open file ─────────────────────────────────────────────────────────────────
async function openFile(path) {
  if (state.dirty && path !== state.currentPath) {
    if (!confirmDiscard()) return;
    markCleanSilent();
  }
  if (state.editMode) leaveEditMode();

  state.currentPath    = path;
  state.currentDirPath = null;

  const filename = path.split('/').pop();
  state.currentFileType = getFileType(filename);

  // Sidebar
  document.querySelectorAll('.tree-item.active').forEach(e => e.classList.remove('active'));
  const item = sidebarTreeWrap.querySelector(`[data-path="${CSS.escape(path)}"]`);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }

  const ft = state.currentFileType;

  // ── Unsupported file ──
  if (ft.category === 'unsupported') {
    hideAllPanels();
    welcomeContent.style.display = 'none';
    breadcrumb.classList.add('visible');
    contentToolbar.classList.add('visible');
    reader.style.display = 'block';
    state.currentRawText = '';
    metaStrip.classList.remove('visible');
    metaStrip.innerHTML = '';
    readerInner.className = '';
    readerInner.innerHTML = `
      <div class="notice-pane">
        <div class="notice-pane-icon">🚫</div>
        <div class="notice-pane-title">Cannot display this file</div>
        <div class="notice-pane-sub">
          <strong>${escHtml(filename)}</strong><br>
          The <code>.${escHtml(ft.label.toLowerCase())}</code> format is not supported for viewing.
          You can still open and edit this file in an external application.
        </div>
      </div>`;
    syncToolbar();
    renderBreadcrumbForFile(path);
    return;
  }

  // ── Viewable file (image / video / audio / pdf) ──
  if (ft.category === 'viewable') {
    hideAllPanels();
    welcomeContent.style.display = 'none';
    breadcrumb.classList.add('visible');
    contentToolbar.classList.add('visible');
    state.currentRawText = '';
    metaStrip.classList.remove('visible');
    metaStrip.innerHTML = '';
    viewerArea.innerHTML = '';
    viewerArea.classList.add('visible');
    try {
      const handle = state.files.get(path);
      const file   = await handle.getFile();
      const url    = URL.createObjectURL(file);
      state._blobUrl = url;
      let elem;
      if (ft.viewerType === 'image') {
        elem = document.createElement('img');
        elem.src = url;
        elem.alt = filename;
      } else if (ft.viewerType === 'video') {
        elem = document.createElement('video');
        elem.src = url; elem.controls = true; elem.style.maxHeight = '80vh';
      } else if (ft.viewerType === 'audio') {
        elem = document.createElement('audio');
        elem.src = url; elem.controls = true;
      } else if (ft.viewerType === 'pdf') {
        elem = document.createElement('iframe');
        elem.className = 'pdf-view';
        elem.src = url;
        elem.title = filename;
      }
      if (elem) viewerArea.appendChild(elem);
    } catch {
      viewerArea.innerHTML = `<div class="notice-pane">
        <div class="notice-pane-icon">⚠️</div>
        <div class="notice-pane-title">Could not load file</div>
        <div class="notice-pane-sub">${escHtml(filename)}</div>
      </div>`;
    }
    syncToolbar();
    renderBreadcrumbForFile(path);
    return;
  }

  // ── Text / Markdown / HTML / Code file ──
  let text = '';
  try {
    const handle = state.files.get(path);
    if (!handle) throw new Error('not found');
    text = await (await handle.getFile()).text();
  } catch {
    readerInner.innerHTML = `<div class="state-msg">Could not read: ${escHtml(path)}</div>`;
    showFileUI();
    renderBreadcrumbForFile(path);
    return;
  }

  state.currentRawText = text;

  if (ft.category === 'markdown') {
    const { meta, body } = parseFileMeta(text);
    renderMetaStrip(meta);
    renderForType(body, ft, readerInner);
  } else {
    metaStrip.classList.remove('visible');
    metaStrip.innerHTML = '';
    renderForType(text, ft, readerInner);
  }

  showFileUI();
  reader.scrollTop = 0;
  renderBreadcrumbForFile(path);
}

// ── Type-aware renderer ───────────────────────────────────────────────────────
function renderForType(text, ft, target, isPreview = false) {
  switch (ft.category) {
    case 'markdown':
      renderMarkdown(text, target);
      break;
    case 'html':
      renderHtml(text, target, isPreview);
      break;
    case 'code':
      renderCode(text, ft, target);
      break;
    default:
      renderPlainText(text, target);
  }
}

function renderMarkdown(body, target) {
  target.className = 'md';
  target.innerHTML = marked.parse(body, { gfm: true, breaks: false });
  target.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.disabled = true);
  // Internal .md link interception
  target.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (href && !href.startsWith('http') && !href.startsWith('#') && isReadable(href.split('/').pop())) {
      a.addEventListener('click', e => {
        e.preventDefault();
        const resolved = resolveRelativePath(state.currentPath, href);
        const dest = (resolved && state.files.has(resolved)) ? resolved : findFile(href.split('/').pop());
        if (dest) openFile(dest);
      });
    } else if (href && (href.startsWith('http://') || href.startsWith('https://'))) {
      a.target = '_blank'; a.rel = 'noopener noreferrer';
    }
  });
}

function renderHtml(text, target, isPreview) {
  target.className = '';
  // Determine parent pane for html-mode class
  const pane = target === readerInner ? reader : (target === previewInner ? previewPane : null);
  if (pane) pane.classList.add('html-mode');

  target.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'html-view-wrap';
  const iframe = document.createElement('iframe');
  iframe.className = 'html-view';
  iframe.setAttribute('sandbox', 'allow-same-origin');
  iframe.setAttribute('title', 'HTML preview');
  iframe.srcdoc = text;
  wrap.appendChild(iframe);
  target.appendChild(wrap);
}

function renderCode(text, ft, target) {
  target.className = '';
  const pre  = document.createElement('pre');
  const code = document.createElement('code');
  if (ft.lang) code.className = `language-${ft.lang}`;
  code.textContent = text;
  pre.appendChild(code);
  pre.className = `code-view${state.wrapMode ? '' : ' nowrap'}`;
  target.innerHTML = '';
  target.appendChild(pre);
  // Highlight async so it doesn't block
  if (ft.lang && typeof Prism !== 'undefined') {
    Prism.highlightElement(code);
  }
}

function renderPlainText(text, target) {
  target.className = '';
  const pre = document.createElement('pre');
  pre.className = `code-view${state.wrapMode ? '' : ' nowrap'}`;
  pre.textContent = text;
  target.innerHTML = '';
  target.appendChild(pre);
}

// Clear html-mode when switching away
function clearHtmlMode() {
  reader.classList.remove('html-mode');
  previewPane.classList.remove('html-mode');
}

// ── Show/hide panels ──────────────────────────────────────────────────────────
function hideAllPanels() {
  reader.style.display = 'none';
  folderView.classList.remove('visible');
  editArea.classList.remove('visible');
  viewerArea.classList.remove('visible');
  metaStrip.classList.remove('visible');
  clearHtmlMode();
  // Revoke any blob URL from previous viewable file
  if (state._blobUrl) { URL.revokeObjectURL(state._blobUrl); state._blobUrl = null; }
}

function showFileUI() {
  welcomeContent.style.display = 'none';
  hideAllPanels();
  breadcrumb.classList.add('visible');
  contentToolbar.classList.add('visible');
  reader.style.display = 'block';
  syncToolbar();
}

// ── Breadcrumb ────────────────────────────────────────────────────────────────
function renderBreadcrumbForFile(filePath) {
  breadcrumb.innerHTML = '';
  appendCrumb(state.rootName, true, () => openDir(''));
  const parts = filePath.split('/');
  parts.forEach((part, i) => {
    appendSep();
    const isLast = i === parts.length - 1;
    if (isLast) {
      if (state.dirty) breadcrumb.appendChild(el('span', 'crumb-dirty', '●'));
      appendCrumb(part, false);
    } else {
      const dp = parts.slice(0, i + 1).join('/');
      appendCrumb(part, true, () => openDir(dp));
    }
  });
}

function renderBreadcrumbForDir(dirPath) {
  breadcrumb.innerHTML = '';
  if (dirPath === '') { appendCrumb(state.rootName, false, null, true); return; }
  appendCrumb(state.rootName, true, () => openDir(''));
  const parts = dirPath.split('/');
  parts.forEach((part, i) => {
    appendSep();
    const isLast = i === parts.length - 1;
    if (isLast) appendCrumb(part, false, null, true);
    else { const dp = parts.slice(0, i + 1).join('/'); appendCrumb(part, true, () => openDir(dp)); }
  });
}

function appendCrumb(text, clickable, handler, isCurrent) {
  const span = document.createElement('span');
  span.textContent = text;
  span.className = 'crumb' + (clickable ? ' clickable' : '') + (isCurrent ? ' current' : '');
  if (clickable && handler) span.addEventListener('click', handler);
  breadcrumb.appendChild(span);
}
function appendSep() { breadcrumb.appendChild(el('span', 'crumb-sep', '/')); }

// ── Toolbar ───────────────────────────────────────────────────────────────────
function syncToolbar() {
  btnWrap.classList.toggle('active', state.wrapMode);
  btnSplit.classList.toggle('active', state.splitView);

  // File type badge
  const ft = state.currentFileType;
  if (ft) {
    ftBadge.textContent  = ft.label;
    ftBadge.className    = ft.badgeClass;
    ftBadge.style.display = '';
  } else {
    ftBadge.style.display = 'none';
  }

  // Split button — hide when viewing HTML (iframe sync not meaningful)
  const isHtml = ft && ft.category === 'html';
  btnSplit.style.display = isHtml ? 'none' : '';

  const showReset = state.splitView && state.editMode && !isHtml;
  btnResetSplit.style.display = showReset ? '' : 'none';
  if (showReset) btnResetSplit.classList.toggle('at-center', Math.abs(state.splitRatio - 0.5) < 0.01);

  const cat = state.currentFileType && state.currentFileType.category;
  const canEdit = cat && cat !== 'viewable' && cat !== 'unsupported';

  if (state.editMode) {
    btnReveal.style.display  = 'none';
    btnRefresh.style.display = 'none';
    btnEdit.style.display    = 'none';
    btnCancel.style.display  = '';
    btnSave.style.display    = '';
    btnSave.classList.toggle('dirty', state.dirty);
    btnSave.textContent = state.dirty ? '● Save' : 'Save';
  } else {
    btnReveal.style.display  = state.currentPath ? '' : 'none';
    btnRefresh.style.display = state.currentPath ? '' : 'none';
    // Dim Edit button for non-editable file types
    btnEdit.style.display    = '';
    btnEdit.style.opacity    = canEdit ? '' : '0.35';
    btnEdit.title            = canEdit ? '' : 'This file type cannot be edited';
    btnCancel.style.display  = 'none';
    btnSave.style.display    = 'none';
  }
}

btnWrap.addEventListener('click', () => { state.wrapMode = !state.wrapMode; applyWrapMode(); syncToolbar(); });
function applyWrapMode() {
  editor.classList.toggle('nowrap', !state.wrapMode);
  previewPane.classList.toggle('nowrap', !state.wrapMode);
  // Also update any rendered code-view blocks in reader
  reader.querySelectorAll('.code-view').forEach(el => el.classList.toggle('nowrap', !state.wrapMode));
}

btnSplit.addEventListener('click', () => { state.splitView = !state.splitView; applySplitView(); syncToolbar(); });
function applySplitView() {
  if (state.splitView && state.editMode) {
    previewPane.classList.add('visible');
    splitDivider.style.display = 'block';
    applySplitRatio();
    applyWrapMode();
    refreshPreview();
  } else {
    previewPane.classList.remove('visible');
    splitDivider.style.display = 'none';
    editorPane.style.flex  = '1';
    editorPane.style.width = '';
  }
}
function applySplitRatio() {
  editorPane.style.flex  = 'none';
  editorPane.style.width = `calc(${(state.splitRatio * 100).toFixed(2)}% - 3px)`;
  previewPane.style.flex = '1';
}

btnEdit.addEventListener('click', () => enterEditMode());
btnCancel.addEventListener('click', () => {
  if (state.dirty && !confirmDiscard()) return;
  leaveEditMode(true);
});
btnSave.addEventListener('click', () => { if (state.dirty) saveFile(); });

// ── Edit mode ─────────────────────────────────────────────────────────────────
async function enterEditMode() {
  if (!state.currentPath) return;

  // Block editing of non-text files
  const cat = state.currentFileType && state.currentFileType.category;
  if (cat === 'viewable' || cat === 'unsupported') {
    // Show a brief no-edit message in-place
    const origHTML = btnEdit.innerHTML;
    btnEdit.textContent = cat === 'viewable' ? '⚠ View only' : '⚠ Cannot edit';
    btnEdit.style.opacity = '0.6';
    setTimeout(() => { btnEdit.innerHTML = origHTML; btnEdit.style.opacity = ''; }, 2000);
    return;
  }
  if (!state.writePermission) {
    let perm;
    try { perm = await state.rootHandle.requestPermission({ mode: 'readwrite' }); }
    catch { perm = 'denied'; }
    if (perm !== 'granted') { showPermDenied(); return; }
    state.writePermission = true;
  }
  state.editMode    = true;
  state.editContent = state.currentRawText;
  state.dirty       = false;
  editor.value = state.editContent;
  applyWrapMode();
  clearHtmlMode();
  reader.style.display = 'none';
  editArea.classList.add('visible');
  applySplitView();
  editor.focus();
  syncToolbar();
  renderBreadcrumbForFile(state.currentPath);
}

function leaveEditMode() {
  state.editMode = false;
  editArea.classList.remove('visible');
  previewPane.classList.remove('visible');
  splitDivider.style.display = 'none';
  editorPane.style.flex  = '1';
  editorPane.style.width = '';
  reader.style.display   = 'block';
  // Re-render from saved content so any edits discarded are reflected
  const ft = state.currentFileType;
  if (ft) {
    if (ft.category === 'markdown') {
      const { meta, body } = parseFileMeta(state.currentRawText);
      renderMetaStrip(meta);
      renderMarkdown(body, readerInner);
    } else {
      renderForType(state.currentRawText, ft, readerInner);
    }
  }
  syncToolbar();
  if (state.currentPath) renderBreadcrumbForFile(state.currentPath);
  updateTreeDirtyState();
}

function showPermDenied() {
  permMsg.classList.add('visible');
  btnEdit.style.display = 'none';
  setTimeout(() => { permMsg.classList.remove('visible'); btnEdit.style.display = ''; }, 4000);
}

// ── Editor events ─────────────────────────────────────────────────────────────
editor.addEventListener('input', () => {
  state.editContent = editor.value;
  if (!state.dirty) {
    state.dirty = true;
    syncToolbar();
    if (state.currentPath) renderBreadcrumbForFile(state.currentPath);
    updateTreeDirtyState();
  }
  debouncedPreview();
});

let previewTimer = null;
function debouncedPreview() {
  clearTimeout(previewTimer);
  previewTimer = setTimeout(refreshPreview, 300);
}

function refreshPreview() {
  if (!state.splitView || !state.editMode || !state.currentFileType) return;
  const ft = state.currentFileType;
  const text = editor.value;
  clearHtmlMode();
  previewInner.className = ft.category === 'markdown' ? 'md' : '';
  if (ft.category === 'markdown') {
    const { body } = parseFileMeta(text);
    renderMarkdown(body, previewInner);
  } else {
    renderForType(text, ft, previewInner, true);
  }
}

editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    const v = editor.value;
    editor.value = v.slice(0, s) + '  ' + v.slice(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    editor.dispatchEvent(new Event('input'));
  }
});

// ── Save ──────────────────────────────────────────────────────────────────────
async function saveFile() {
  if (!state.currentPath || !state.dirty) return;
  btnSave.classList.add('saving');
  btnSave.textContent = 'Saving…';
  try {
    const handle = state.files.get(state.currentPath);
    const writable = await handle.createWritable();
    await writable.write(editor.value);
    await writable.close();
    state.currentRawText = editor.value;
    markClean();
  } catch (e) {
    console.error('Save failed:', e);
    btnSave.classList.remove('saving');
    btnSave.textContent = '⚠ Save failed';
    setTimeout(() => { if (state.dirty) btnSave.textContent = '● Save'; }, 3000);
  }
}

// ── Refresh (reload from disk) ─────────────────────────────────────────────────
async function refreshFile() {
  if (!state.currentPath) return;
  // Guard: confirm discard of unsaved edits
  if (state.dirty && !confirm(
    `You have unsaved changes in "${state.currentPath.split('/').pop()}".\n\nDiscard changes and reload from disk?`
  )) return;

  // Exit edit mode cleanly (no dirty confirm — already handled above)
  if (state.editMode) leaveEditMode();

  let text = '';
  try {
    const handle = state.files.get(state.currentPath);
    if (!handle) throw new Error('not found');
    text = await (await handle.getFile()).text();
  } catch {
    // Couldn't read — leave current content in place, show brief error
    const origHTML = btnRefresh.innerHTML;
    btnRefresh.textContent = '⚠ Read failed';
    setTimeout(() => { btnRefresh.innerHTML = origHTML; }, 2500);
    return;
  }

  state.currentRawText = text;
  state.dirty = false;
  updateTreeDirtyState();

  // Re-render
  const ft = state.currentFileType;
  if (ft && ft.category === 'markdown') {
    const { meta, body } = parseFileMeta(text);
    renderMetaStrip(meta);
    renderMarkdown(body, readerInner);
  } else {
    metaStrip.classList.remove('visible');
    metaStrip.innerHTML = '';
    renderForType(text, ft, readerInner);
  }

  reader.scrollTop = 0;
  syncToolbar();
  renderBreadcrumbForFile(state.currentPath);

  // Brief "Refreshed" feedback on the button
  const origHTML = btnRefresh.innerHTML;
  btnRefresh.classList.add('refreshed');
  btnRefresh.textContent = '✓ Refreshed';
  setTimeout(() => {
    btnRefresh.classList.remove('refreshed');
    btnRefresh.innerHTML = origHTML;
  }, 1800);
}

btnRefresh.addEventListener('click', refreshFile);

function markClean() {
  state.dirty = false;
  syncToolbar();
  if (state.currentPath) renderBreadcrumbForFile(state.currentPath);
  updateTreeDirtyState();
}
function markCleanSilent() { state.dirty = false; updateTreeDirtyState(); }
function updateTreeDirtyState() {
  document.querySelectorAll('.tree-item.has-unsaved').forEach(e => e.classList.remove('has-unsaved'));
  if (state.dirty && state.currentPath) {
    const item = sidebarTreeWrap.querySelector(`[data-path="${CSS.escape(state.currentPath)}"]`);
    if (item) item.classList.add('has-unsaved');
  }
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    if (state.editMode && state.dirty) saveFile();
  }
  if (e.key === 'Escape' && state.editMode) {
    if (state.dirty) { if (confirmDiscard()) leaveEditMode(); }
    else leaveEditMode();
  }
});

// ── Split drag ────────────────────────────────────────────────────────────────
let dragState = null;
splitDivider.addEventListener('mousedown', e => {
  e.preventDefault();
  dragState = { startX: e.clientX, startRatio: state.splitRatio, totalWidth: editArea.getBoundingClientRect().width - 5 };
  splitDivider.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const dx = e.clientX - dragState.startX;
  state.splitRatio = Math.min(0.80, Math.max(0.20, dragState.startRatio + dx / dragState.totalWidth));
  applySplitRatio();
});
document.addEventListener('mouseup', () => {
  if (!dragState) return;
  dragState = null;
  splitDivider.classList.remove('dragging');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  syncToolbar();
});

// ── Reset split ───────────────────────────────────────────────────────────────
function resetSplit() { state.splitRatio = 0.5; applySplitRatio(); syncToolbar(); }
btnResetSplit.addEventListener('click', () => { if (Math.abs(state.splitRatio - 0.5) >= 0.01) resetSplit(); });
splitDivider.addEventListener('dblclick', resetSplit);

// ── Scroll sync ───────────────────────────────────────────────────────────────
let scrollLock = false;
function syncScroll(source, target) {
  if (scrollLock) return;
  const srcMax = source.scrollHeight - source.clientHeight;
  if (srcMax <= 0) return;
  scrollLock = true;
  const ratio = source.scrollTop / srcMax;
  const tgtMax = target.scrollHeight - target.clientHeight;
  target.scrollTop = ratio * tgtMax;
  requestAnimationFrame(() => { scrollLock = false; });
}
editor.addEventListener('scroll', () => {
  if (state.splitView && state.editMode) syncScroll(editor, previewPane);
});
previewPane.addEventListener('scroll', () => {
  if (state.splitView && state.editMode) syncScroll(previewPane, editor);
});

// ── File type filter bar ──────────────────────────────────────────────────────
const CAT_META = {
  markdown:    { label: 'Markdown',    color: '#58a6ff' },
  html:        { label: 'HTML',        color: '#4ade80' },
  code:        { label: 'Code',        color: '#c084fc' },
  text:        { label: 'Text',        color: '#6e7a8a' },
  viewable:    { label: 'Viewable',    color: '#22d3ee' },
  unsupported: { label: 'Unsupported', color: '#374151' },
};
const CAT_ORDER = ['markdown','html','code','text','viewable','unsupported'];

// Count files per category in the whole tree
function countByCategory(node, counts = {}) {
  for (const f of node.files) {
    const cat = getFileType(f.name).category;
    counts[cat] = (counts[cat] || 0) + 1;
  }
  for (const child of Object.values(node.children)) countByCategory(child, counts);
  return counts;
}

function buildFilterBar() {
  filterBody.innerHTML = '';
  const counts = countByCategory(state.tree);

  // Only show categories that actually exist in this folder
  const presentCats = CAT_ORDER.filter(c => counts[c]);
  if (presentCats.length <= 1) {
    // Not useful to show a filter for one category
    treeFilter.classList.remove('visible');
    return;
  }

  for (const cat of presentCats) {
    const cm = CAT_META[cat];
    const isChecked = state.visibleCategories.has(cat);

    const row = document.createElement('div');
    row.className = 'filter-row';
    row.dataset.cat = cat;

    const check = document.createElement('div');
    check.className = `filter-check cat-${cat}${isChecked ? ' checked' : ''}`;
    check.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 4l2.5 2.5L7 1.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    const dot = document.createElement('span');
    dot.className = 'filter-dot';
    dot.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3.5" fill="${cm.color}"/></svg>`;

    const lbl = document.createElement('span');
    lbl.className = 'filter-label';
    lbl.textContent = cm.label;

    const cnt = document.createElement('span');
    cnt.className = 'filter-count';
    cnt.textContent = counts[cat];

    row.appendChild(check); row.appendChild(dot); row.appendChild(lbl); row.appendChild(cnt);
    row.addEventListener('click', () => toggleFilterCat(cat));
    filterBody.appendChild(row);
  }

  updateFilterCount();
}

function toggleFilterCat(cat) {
  if (state.visibleCategories.has(cat)) {
    // Don't allow deselecting the last visible category
    if (state.visibleCategories.size <= 1) return;
    state.visibleCategories.delete(cat);
  } else {
    state.visibleCategories.add(cat);
  }
  // Update check UI
  const row = filterBody.querySelector(`[data-cat="${cat}"]`);
  if (row) {
    const check = row.querySelector('.filter-check');
    check.classList.toggle('checked', state.visibleCategories.has(cat));
  }
  applyTreeFilter();
  updateFilterCount();
}

function updateFilterCount() {
  const counts = countByCategory(state.tree);
  const presentCats = CAT_ORDER.filter(c => counts[c]);
  const hiddenCount = presentCats.filter(c => !state.visibleCategories.has(c)).length;
  if (hiddenCount > 0) {
    filterActiveCount.textContent = `(${hiddenCount} hidden)`;
    filterActiveCount.classList.add('visible');
  } else {
    filterActiveCount.classList.remove('visible');
  }
}

function applyTreeFilter() {
  // Show/hide all .tree-file items based on their category
  sidebarTreeWrap.querySelectorAll('.tree-file').forEach(row => {
    const cat = row.dataset.category;
    const hidden = cat && !state.visibleCategories.has(cat);
    row.toggleAttribute('data-cat-hidden', hidden);
  });
}

// Filter header click → expand/collapse
filterHeader.addEventListener('click', () => {
  const isOpen = filterBody.classList.toggle('open');
  filterChevron.classList.toggle('open', isOpen);
});

// ── Sidebar tree ──────────────────────────────────────────────────────────────
function renderTree(tree) {
  sidebarTreeWrap.innerHTML = '';
  const wrap = document.createElement('div');
  for (const f of tree.files) wrap.appendChild(makeFileItem(f, 0));
  for (const dir of Object.values(tree.children)) wrap.appendChild(makeDirItem(dir, 0, countFiles(dir) <= 6));
  sidebarTreeWrap.appendChild(wrap);
}

function countFiles(node) {
  let n = node.files.length;
  for (const c of Object.values(node.children)) n += countFiles(c);
  return n;
}

function makeDirItem(dir, depth, defaultOpen) {
  const wrap = document.createElement('div');
  const row  = document.createElement('div');
  row.className = 'tree-item tree-dir';
  row.dataset.path = dir.path;
  row.style.paddingLeft = `${depth * 16 + 4}px`;

  const chevron = document.createElement('span');
  chevron.className = 'tree-chevron' + (defaultOpen ? ' open' : '');
  chevron.innerHTML = svgChevron();

  const icon = document.createElement('span');
  icon.className = 'tree-icon';
  icon.innerHTML = svgFolder();

  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = dir.name;

  row.appendChild(chevron); row.appendChild(icon); row.appendChild(label);
  wrap.appendChild(row);

  const children = document.createElement('div');
  children.className = 'tree-children' + (defaultOpen ? ' open' : '');
  for (const f of dir.files) children.appendChild(makeFileItem(f, depth + 1));
  for (const sub of Object.values(dir.children)) children.appendChild(makeDirItem(sub, depth + 1, countFiles(sub) <= 4));
  wrap.appendChild(children);

  row.addEventListener('click', () => {
    const open = children.classList.toggle('open');
    chevron.classList.toggle('open', open);
    openDir(dir.path);
  });

  // ── Drag: this dir can be dragged to move it ────────────────
  row.draggable = true;
  row.addEventListener('dragstart', e => {
    e.stopPropagation();
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/x-mdweb-src', dir.path);
    e.dataTransfer.setData('text/x-mdweb-kind', 'directory');
    row.style.opacity = '0.5';
  });
  row.addEventListener('dragend', () => { row.style.opacity = ''; });

  // ── Drop: dirs accept drops of other files/dirs ─────────────
  row.addEventListener('dragover', e => {
    if (!e.dataTransfer.types.includes('text/x-mdweb-src')) return;
    e.preventDefault(); e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
    row.classList.add('drop-target');
  });
  row.addEventListener('dragleave', e => {
    if (!row.contains(e.relatedTarget)) row.classList.remove('drop-target');
  });
  row.addEventListener('drop', async e => {
    e.preventDefault(); e.stopPropagation();
    row.classList.remove('drop-target');
    const srcPath = e.dataTransfer.getData('text/x-mdweb-src');
    const kind    = e.dataTransfer.getData('text/x-mdweb-kind');
    if (srcPath) await moveEntry(srcPath, dir.path, kind);
  });

  return wrap;
}

function makeFileItem(file, depth) {
  const ft = getFileType(file.name);
  const row = document.createElement('div');
  row.className = 'tree-item tree-file';
  row.dataset.path = file.path;
  row.dataset.category = ft.category;
  row.style.paddingLeft = `${depth * 16 + 4}px`;

  // Apply initial filter state
  if (!state.visibleCategories.has(ft.category)) {
    row.setAttribute('data-cat-hidden', '');
  }

  const spacer = document.createElement('span');
  spacer.className = 'tree-chevron-spacer';

  // Coloured dot per category
  const dot = document.createElement('span');
  dot.className = 'tree-icon';
  const dotColor = (CAT_META[ft.category] || { color: '#374151' }).color;
  const dotOpacity = ft.category === 'unsupported' ? '0.4' : '0.8';
  dot.innerHTML = `<svg width="8" height="8" viewBox="0 0 8 8"><circle cx="4" cy="4" r="3" fill="${dotColor}" opacity="${dotOpacity}"/></svg>`;

  const dirtyDot = document.createElement('span');
  dirtyDot.className = 'tree-dirty-dot';

  const label = document.createElement('span');
  label.className = 'tree-label';
  label.textContent = file.name;
  // Dim unsupported files slightly
  if (ft.category === 'unsupported') label.style.opacity = '0.5';

  row.appendChild(spacer); row.appendChild(dot); row.appendChild(dirtyDot); row.appendChild(label);
  row.addEventListener('click', () => openFile(file.path));

  // ── Drag: files can be dragged to move them ─────────────────
  row.draggable = true;
  row.addEventListener('dragstart', e => {
    e.stopPropagation();
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/x-mdweb-src', file.path);
    e.dataTransfer.setData('text/x-mdweb-kind', 'file');
    row.style.opacity = '0.5';
  });
  row.addEventListener('dragend', () => { row.style.opacity = ''; });

  // ── Drop: dropping onto a file moves to its parent dir ──────
  row.addEventListener('dragover', e => {
    if (!e.dataTransfer.types.includes('text/x-mdweb-src')) return;
    e.preventDefault(); e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
    row.classList.add('drop-target');
  });
  row.addEventListener('dragleave', e => {
    if (!row.contains(e.relatedTarget)) row.classList.remove('drop-target');
  });
  row.addEventListener('drop', async e => {
    e.preventDefault(); e.stopPropagation();
    row.classList.remove('drop-target');
    const srcPath = e.dataTransfer.getData('text/x-mdweb-src');
    const kind    = e.dataTransfer.getData('text/x-mdweb-kind');
    if (!srcPath) return;
    // Target = parent directory of this file
    const destDirPath = file.path.includes('/')
      ? file.path.split('/').slice(0, -1).join('/')
      : '';
    await moveEntry(srcPath, destDirPath, kind);
  });

  return row;
}

// ── Metadata parser (markdown only) ──────────────────────────────────────────
function parseFileMeta(text) {
  const meta = { artifact: null, type: null, role: null, lastUpdated: null, precedence: null };
  const m = text.match(/^\s*<!--([\s\S]*?)-->/);
  let body = text;
  if (m) {
    body = text.slice(m[0].length);
    const c = m[1];
    const al = c.match(/ARTIFACT:\s*([A-B][0-9])\s*[—–-]?\s*(.*)/i);
    if (al) {
      meta.artifact = al[1].trim();
      const desc = al[2].trim();
      const tm = desc.match(/\b(PSIRT|AppSec|CSIRT|OSS)\b/i);
      if (tm) meta.type = tm[1].toUpperCase();
      meta.role = desc.replace(/,?\s*(PSIRT|AppSec|CSIRT|OSS)\s*(type|program)?/i, '').trim();
    }
    const dm = c.match(/Last updated:\s*(\S+)/i);
    if (dm) meta.lastUpdated = dm[1].trim();
    const pm = c.match(/PRECEDENCE NOTE:\s*([\s\S]*?)(?=\n[A-Z]|\n\s*$)/i);
    if (pm) meta.precedence = pm[1].replace(/\s+/g, ' ').trim();
    if (!meta.type) {
      const ta = c.match(/Program:\s*[^(]+\((PSIRT|AppSec|CSIRT|OSS)/i);
      if (ta) meta.type = ta[1].toUpperCase();
    }
  }
  return { meta, body: body.trim() };
}

function renderMetaStrip(meta) {
  metaStrip.innerHTML = '';
  let has = false;
  if (meta.artifact) { metaStrip.appendChild(mkBadge(meta.artifact, 'badge-blue')); has = true; }
  if (meta.type) {
    const cls = { PSIRT:'badge-psirt', APPSEC:'badge-appsec', CSIRT:'badge-csirt', OSS:'badge-oss' }[meta.type] || 'badge-grey';
    metaStrip.appendChild(mkBadge(meta.type, cls)); has = true;
  }
  if (meta.role) { metaStrip.appendChild(mkBadge(meta.role, 'badge-grey')); has = true; }
  if (meta.lastUpdated) { metaStrip.appendChild(el('span', 'badge badge-date', 'Updated ' + meta.lastUpdated)); has = true; }
  if (meta.precedence) {
    const p = el('div', 'badge-precedence', '⚠ ' + meta.precedence);
    p.style.cssText = 'margin-top:4px;width:100%';
    metaStrip.appendChild(p); has = true;
  }
  metaStrip.classList.toggle('visible', has);
}

function mkBadge(text, cls) { return el('span', `badge ${cls}`, text); }

// ── Utilities ─────────────────────────────────────────────────────────────────
function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls)  e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function svgChevron() {
  return `<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M3 2l4 3-4 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function svgFolder() {
  return `<svg width="13" height="13" viewBox="0 0 16 16" fill="#6e7a8a"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C8.17 3.71 8.692 4 9.5 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5z"/></svg>`;
}

// Configure Prism autoloader path
if (typeof Prism !== 'undefined' && Prism.plugins && Prism.plugins.autoloader) {
  Prism.plugins.autoloader.languages_path = 'https://cdn.jsdelivr.net/npm/prismjs@1/components/';
}

// ── Browser support ───────────────────────────────────────────────────────────
if (!('showDirectoryPicker' in window)) {
  sidebarWelcome.innerHTML = `<p style="color:var(--text-muted);font-size:12px;text-align:center;padding:16px;">This app requires Chrome or Edge.<br>Your current browser is not supported.</p>`;
  welcomeContent.querySelector('p').textContent = 'This app requires Chrome or Edge. Please reopen in a supported browser.';
}

// ── Auto-open via ?autoopen URL param ─────────────────────────────────────────
// When opened with ?autoopen (e.g. via the `mdweb` shell command), automatically
// trigger the folder picker dialog so the user doesn't have to click Open Folder.
(async () => {
  const params = new URLSearchParams(window.location.search);
  if (params.has('autoopen') && 'showDirectoryPicker' in window) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'read' });
      await loadFolder(handle);
    } catch (e) {
      if (e.name !== 'AbortError') console.error('Auto-open picker:', e);
    }
  }
})();
</script>

  </div>
</div>
