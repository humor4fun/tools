<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>transcode — tools.bluejar.org</title>
<link rel="stylesheet" href="../utils/tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent-decode:   #e8821a;
    --accent-decode-h: #f59e42;
    --sidebar-w:   290px;
    --header-h:    48px;
    --statusbar-h: 38px;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.5; overflow: hidden;
  }

  /* ── Layout ──────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 1fr var(--sidebar-w);
    grid-template-rows: var(--header-h) 1fr var(--statusbar-h);
    height: 100vh; width: 100vw;
  }

  /* ── Main pane ───────────────────────────────────────────── */
  #main-pane {
    display: flex; flex-direction: column; overflow: hidden;
    border-right: 1px solid var(--border);
    min-height: 0;
  }

  /* ── Chain summary ───────────────────────────────────────── */
  #chain-summary {
    position: sticky; top: 0; z-index: 5;
    display: flex; align-items: center; flex-wrap: wrap; gap: 4px;
    padding: 0 14px;
    background: var(--bg-sidebar); border-bottom: 1px solid var(--border);
    min-height: 34px; flex-shrink: 0;
    font-size: 11px;
  }
  .cs-label { color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-right: 4px; }
  .cs-arrow { color: var(--text-dim); padding: 0 2px; }
  .cs-pill {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--bg-active); border: 1px solid var(--accent-blue);
    color: var(--text-link); border-radius: 4px; padding: 1px 7px;
    font-size: 11px; font-family: var(--font-mono);
    transition: background 0.12s, box-shadow 0.12s;
  }
  .cs-pill.decode {
    background: rgba(232,130,26,0.12); border-color: var(--accent-decode);
    color: var(--accent-decode);
  }
  .cs-pill.clickable { cursor: pointer; }
  .cs-pill.clickable:hover { background: var(--bg-hover); box-shadow: 0 0 0 1px currentColor; }
  .cs-pill[draggable="true"] { cursor: grab; user-select: none; }
  .cs-pill[draggable="true"].clickable:hover { cursor: grab; }
  .cs-pill.drop-before {
    outline: 2px solid var(--accent-blue);
    outline-offset: 1px;
  }
  #chain-summary.drag-over {
    background: rgba(31,111,235,0.08);
    box-shadow: inset 0 0 0 2px var(--accent-blue);
  }
  .cs-pill-empty {
    display: inline-flex; align-items: center;
    color: var(--text-dim); border: 1px dashed var(--border);
    border-radius: 4px; padding: 1px 7px; font-size: 11px; font-style: italic;
  }

  /* ── Chain area ──────────────────────────────────────────── */
  #chain-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 0 0 40px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #chain-area::-webkit-scrollbar { width: 6px; }
  #chain-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Pane label (input / output) ─────────────────────────── */
  .pane-label {
    padding: 3px 14px 3px;
    font-size: 10px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.08em;
    background: var(--bg-sidebar); border-bottom: 1px solid var(--border-light);
    flex-shrink: 0; display: flex; align-items: center; gap: 8px; height: 26px;
  }
  .pane-label-right { margin-left: auto; display: flex; align-items: center; gap: 4px; }

  /* ── Input node ──────────────────────────────────────────── */
  #chain-input-node { border-bottom: 1px solid var(--border-light); }
  #chain-input {
    width: 100%; height: 140px;
    background: var(--bg); color: var(--text);
    font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
    border: none; outline: none; resize: none;
    padding: 14px 20px; tab-size: 2;
    white-space: pre-wrap; overflow-wrap: break-word;
    overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #chain-input::-webkit-scrollbar { width: 6px; }
  #chain-input::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Chain connector (↓ arrow) ───────────────────────────── */
  .chain-connector {
    display: flex; align-items: center; justify-content: center;
    height: 28px; color: var(--text-dim); font-size: 14px; flex-shrink: 0;
    user-select: none;
  }

  /* ── Chain slot ──────────────────────────────────────────── */
  .chain-slot-wrap {
    padding: 0 14px 8px;
  }
  .chain-slot {
    display: flex; align-items: center; gap: 8px;
    border: 1px dashed var(--border); border-radius: var(--radius);
    height: 40px; padding: 0 12px;
    cursor: pointer; user-select: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    font-size: 12px; color: var(--text-dim);
    position: relative;
  }
  .chain-slot:hover { border-color: var(--text-dim); }
  .chain-slot.focused {
    border-color: var(--accent-blue);
    border-style: solid;
    box-shadow: 0 0 0 2px rgba(31,111,235,0.2);
    color: var(--text-muted);
  }
  .chain-slot.drag-over {
    border-style: solid;
    border-color: var(--accent-blue);
    background: rgba(31,111,235,0.08);
    color: var(--text-muted);
  }
  .chain-slot.filled {
    border-style: solid;
    border-color: var(--accent-blue);
    background: var(--bg-active);
    cursor: default;
  }
  .slot-placeholder { flex: 1; font-style: italic; }
  .slot-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(31,111,235,0.15); border: 1px solid var(--accent-blue);
    color: var(--text-link); border-radius: 4px; padding: 2px 8px;
    font-size: 12px; font-family: var(--font-mono); font-weight: 500;
  }
  .slot-badge.decode {
    background: rgba(232,130,26,0.15);
    border-color: var(--accent-decode);
    color: var(--accent-decode);
  }

  /* ── Mode toggle button (next to badge) ──────────────────────── */
  .mode-toggle {
    display: inline-flex; align-items: center;
    background: var(--bg-hover); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-muted); font-size: 10px; font-family: var(--font-mono);
    padding: 2px 7px; cursor: pointer; height: 22px; white-space: nowrap;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    flex-shrink: 0;
  }
  .mode-toggle:hover:not(:disabled) {
    background: var(--bg-active); color: var(--text); border-color: var(--accent-blue);
  }
  .mode-toggle.decode {
    border-color: var(--accent-decode); color: var(--accent-decode);
  }
  .mode-toggle.decode:hover:not(:disabled) {
    border-color: var(--accent-decode-h); color: var(--accent-decode-h);
    background: rgba(232,130,26,0.12);
  }
  .mode-toggle:disabled { opacity: 0.45; cursor: default; }

  .slot-clear-btn {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 13px; padding: 0 2px; line-height: 1;
    display: flex; align-items: center;
    transition: color 0.12s;
  }
  .slot-clear-btn:hover { color: #f85149; }
  .slot-remove-btn {
    margin-left: auto;
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 15px; padding: 0 2px 1px; line-height: 1;
    display: flex; align-items: center;
    transition: color 0.12s;
    opacity: 0.6;
  }
  .slot-remove-btn:hover { color: #f85149; opacity: 1; }
  .slot-remove-btn:disabled { opacity: 0.2; cursor: default; }

  /* ── Chain output ────────────────────────────────────────── */
  .chain-output-wrap { border-top: 1px solid var(--border-light); }
  .chain-output {
    width: 100%; height: 120px;
    background: #0c0f18; color: var(--text-muted);
    font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
    border: none; outline: none; resize: none;
    padding: 14px 20px; tab-size: 2;
    white-space: pre-wrap; overflow-wrap: break-word;
    overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    transition: height 0.2s ease;
    display: block;
  }
  .chain-output::-webkit-scrollbar { width: 6px; }
  .chain-output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .chain-output.collapsed { height: 60px; }
  .chain-output.is-error  { color: #f85149; }
  .chain-output.is-loading { color: var(--text-dim); font-style: italic; }

  /* ── Add step button ─────────────────────────────────────── */
  .chain-add-btn-wrap {
    display: flex; justify-content: center; padding: 8px 14px 4px;
    border-top: 1px solid var(--border-light);
  }
  .chain-add-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-hover); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-dim); font-size: 12px; font-family: var(--font-sans);
    padding: 5px 18px; cursor: pointer; height: 28px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .chain-add-btn:hover { background: var(--bg-active); color: var(--text); border-color: var(--accent-blue); }
  .chain-add-btn:disabled { opacity: 0.3; cursor: default; }
  .chain-add-btn-wrap.drag-over .chain-add-btn {
    background: var(--bg-active); border-color: var(--accent-blue); color: var(--text);
  }

  /* ── Copy output micro button ────────────────────────────── */
  .copy-out-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 2px 5px; border-radius: 3px; display: flex; align-items: center;
    transition: color 0.12s, background 0.12s;
  }
  .copy-out-btn:hover { color: var(--text-muted); background: var(--bg-hover); }

  /* ── Sidebar ─────────────────────────────────────────────── */
  #sidebar {
    display: flex; flex-direction: column;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Status bar ──────────────────────────────────────────── */
  #statusbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 10px; padding: 0 14px;
    background: var(--bg-sidebar); border-top: 1px solid var(--border);
    font-size: 11.5px; color: var(--text-dim); flex-shrink: 0;
  }
  #stats { flex: 1; font-family: var(--font-mono); font-size: 11px; }
  .sb-sep { color: var(--border); }

  /* ── Op buttons ──────────────────────────────────────────── */
  .op-btn {
    display: flex; align-items: center; width: 100%;
    background: transparent; border: 1px solid transparent; border-radius: 5px;
    color: var(--text-muted); font-size: 12px; font-family: var(--font-sans);
    padding: 5px 8px; cursor: grab; text-align: left; gap: 7px;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    margin-bottom: 1px;
  }
  .op-btn:hover { background: var(--bg-hover); color: var(--text); }
  .op-btn-note {
    font-size: 10px; color: var(--text-dim); margin-left: auto; white-space: nowrap;
  }

  /* ── Sidebar drag hint ───────────────────────────────────── */
  .sb-hint {
    padding: 10px 12px 6px;
    font-size: 10px; color: var(--text-dim); line-height: 1.5;
    border-bottom: 1px solid var(--border);
  }

</style>
<script src="../utils/debounce.js"></script>
<script src="../utils/toast.js"></script>
<script src="../utils/clipboard.js"></script>
<script src="../utils/sidebar.js"></script>
<script src="../utils/header.js"></script>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header id="header">
    <div id="header-actions">
      <button class="hdr-btn" id="btn-copy-output">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/></svg>
        Copy output
      </button>
      <button class="hdr-btn" id="btn-reset">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41m-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9"/><path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5 5 0 0 0 8 3M3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9z"/></svg>
        Reset
      </button>
    </div>
  </header>

  <!-- ── Main pane ──────────────────────────────────────────── -->
  <div id="main-pane">

    <!-- Chain summary bar -->
    <div id="chain-summary">
      <span class="cs-label">Chain</span>
    </div>

    <!-- Scrollable chain area -->
    <div id="chain-area">

      <!-- Input node (fixed, always at top) -->
      <div id="chain-input-node">
        <div class="pane-label">Input</div>
        <textarea id="chain-input"
          placeholder="Paste or type text to encode…"
          spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>

      <!-- Chain steps are injected here by JS -->

    </div>

  </div>

  <!-- ── Sidebar ────────────────────────────────────────────── -->
  <aside id="sidebar">

    <div class="sb-hint">Drag an operation onto a slot or onto the chain bar to append a step. Click to assign to the focused slot (highlighted in blue).</div>

    <!-- Encoding -->
    <div class="sb-sec" id="sec-encoding">
      <div class="sb-hdr">
        <span>
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M10.478 1.647a.5.5 0 1 0-.956-.294l-4 13a.5.5 0 0 0 .956.294zM4.854 4.146a.5.5 0 0 1 0 .708L1.707 8l3.147 3.146a.5.5 0 0 1-.708.708l-3.5-3.5a.5.5 0 0 1 0-.708l3.5-3.5a.5.5 0 0 1 .708 0m6.292 0a.5.5 0 0 0 0 .708L14.293 8l-3.147 3.146a.5.5 0 0 0 .708.708l3.5-3.5a.5.5 0 0 0 0-.708l-3.5-3.5a.5.5 0 0 0-.708 0"/></svg>
          Encoding
        </span>
        <svg class="sb-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="sb-body" id="body-encoding">
        <button class="op-btn" data-op="base64" draggable="true">Base64</button>
        <button class="op-btn" data-op="base64url" draggable="true">Base64 URL-safe</button>
        <button class="op-btn" data-op="url-percent" draggable="true">URL Percent-Encode</button>
        <button class="op-btn" data-op="html-entities" draggable="true">HTML Entities</button>
        <button class="op-btn" data-op="unicode-escape" draggable="true">Unicode Escape (\u)</button>
      </div>
    </div>

    <!-- Hashing -->
    <div class="sb-sec" id="sec-hashing">
      <div class="sb-hdr">
        <span>
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2m3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2"/></svg>
          Hashing
        </span>
        <svg class="sb-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="sb-body" id="body-hashing">
        <button class="op-btn" data-op="md5" draggable="true">MD5<span class="op-btn-note">one-way</span></button>
        <button class="op-btn" data-op="sha1" draggable="true">SHA-1<span class="op-btn-note">one-way</span></button>
        <button class="op-btn" data-op="sha256" draggable="true">SHA-256<span class="op-btn-note">one-way</span></button>
        <button class="op-btn" data-op="sha512" draggable="true">SHA-512<span class="op-btn-note">one-way</span></button>
      </div>
    </div>

    <!-- Number Bases -->
    <div class="sb-sec" id="sec-bases">
      <div class="sb-hdr">
        <span>
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5z"/></svg>
          Number Bases
        </span>
        <svg class="sb-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="sb-body" id="body-bases">
        <button class="op-btn" data-op="hex" draggable="true">Hex (bytes)</button>
        <button class="op-btn" data-op="binary" draggable="true">Binary (bytes)</button>
        <button class="op-btn" data-op="octal" draggable="true">Octal (bytes)</button>
        <button class="op-btn" data-op="ascii" draggable="true">ASCII Ordinals</button>
      </div>
    </div>

    <!-- Text Transforms -->
    <div class="sb-sec" id="sec-transforms">
      <div class="sb-hdr">
        <span>
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2.244 13.081a.5.5 0 0 1-.622.311l-.189-.063a.5.5 0 0 1-.311-.622L5.89 2.5H8.25l4.562 10.5H10l-.9-2.188H4.901zm1.862-4.5h3.788l-1.89-4.577zM9 3a1 1 0 0 0-1 1v6a1 1 0 0 0 2 0V8h2v2a1 1 0 0 0 2 0V4a1 1 0 0 0-2 0v2h-2V4a1 1 0 0 0-1-1"/></svg>
          Text Transforms
        </span>
        <svg class="sb-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="sb-body" id="body-transforms">
        <button class="op-btn" data-op="rot13" draggable="true">ROT13<span class="op-btn-note">symmetric</span></button>
        <button class="op-btn" data-op="rot47" draggable="true">ROT47<span class="op-btn-note">symmetric</span></button>
        <button class="op-btn" data-op="reverse" draggable="true">Reverse string<span class="op-btn-note">symmetric</span></button>
        <button class="op-btn" data-op="pretty-json" draggable="true">Pretty JSON</button>
        <button class="op-btn" data-op="minify-json" draggable="true">Minify JSON</button>
        <button class="op-btn" data-op="morse" draggable="true">Morse Code</button>
      </div>
    </div>

    <!-- ASCII Tools -->
    <div class="sb-sec" id="sec-ascii">
      <div class="sb-hdr">
        <span>
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zm6 9a1 1 0 1 1 0-2 1 1 0 0 1 0 2m2.5-4.5a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5m-5 0a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5"/></svg>
          ASCII Tools
        </span>
        <svg class="sb-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="sb-body" id="body-ascii">
        <button class="op-btn" data-op="strip-nonascii" draggable="true">Strip non-ASCII<span class="op-btn-note">one-way</span></button>
        <button class="op-btn" data-op="transliterate" draggable="true">Transliterate to ASCII<span class="op-btn-note">one-way</span></button>
        <button class="op-btn" data-op="force-7bit" draggable="true">Force 7-bit ASCII<span class="op-btn-note">one-way</span></button>
      </div>
    </div>

// ── MD5 pure-JS ───────────────────────────────────────────────
function md5(str) {

    a=ff(a,b,c,d,x[i+12],7,1804603682);d=ff(d,a,b,c,x[i+13],12,-40341101);
    c=ff(c,d,a,b,x[i+14],17,-1502002290);b=ff(b,c,d,a,x[i+15],22,1236535329);
    a=gg(a,b,c,d,x[i+1],5,-165796510); d=gg(d,a,b,c,x[i+6],9,-1069501632);
    c=gg(c,d,a,b,x[i+11],14,643717713);b=gg(b,c,d,a,x[i+0],20,-373897302);
    a=gg(a,b,c,d,x[i+5],5,-701558691); d=gg(d,a,b,c,x[i+10],9,38016083);
    c=gg(c,d,a,b,x[i+15],14,-660478335);b=gg(b,c,d,a,x[i+4],20,-405537848);
    a=gg(a,b,c,d,x[i+9],5,568446438); d=gg(d,a,b,c,x[i+14],9,-1019803690);

    c=hh(c,d,a,b,x[i+7],16,-155497632);b=hh(b,c,d,a,x[i+10],23,-1094730640);
    a=hh(a,b,c,d,x[i+13],4,681279174); d=hh(d,a,b,c,x[i+0],11,-358537222);
    c=hh(c,d,a,b,x[i+3],16,-722521979);b=hh(b,c,d,a,x[i+6],23,76029189);

// ── SHA via WebCrypto ─────────────────────────────────────────
async function shaHash(str, algo) {
  const buf = await crypto.subtle.digest(algo, new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Operations map ────────────────────────────────────────────
const OPS = {
  'base64': {
    label: 'Base64',
    encode: s => btoa(unescape(encodeURIComponent(s))),
    decode: s => decodeURIComponent(escape(atob(s.trim()))),
  },
  'base64url': {
    label: 'Base64 URL-safe',
    encode: s => btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''),
    decode: s => {
      const p = s.trim().replace(/-/g,'+').replace(/_/g,'/');
      const pad = p.length % 4;
      return decodeURIComponent(escape(atob(pad ? p + '===='.slice(pad) : p)));
    },
  },
  'url-percent': {
    label: 'URL Percent-Encode',
    encode: s => encodeURIComponent(s),
    decode: s => decodeURIComponent(s),
  },
  'html-entities': {
    label: 'HTML Entities',
    encode: s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'),
    decode: s => s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'"),
  },
  'unicode-escape': {
    label: 'Unicode Escape (\\u)',
    encode: s => [...s].map(c => {
      const cp = c.codePointAt(0);
      if (cp <= 127) return c;
      return cp > 0xffff ? `\\u{${cp.toString(16)}}` : `\\u${cp.toString(16).padStart(4,'0')}`;
    }).join(''),
    decode: s => s.replace(/\\u\{([0-9a-fA-F]+)\}|\\u([0-9a-fA-F]{4})/g,
      (_, p1, p2) => String.fromCodePoint(parseInt(p1 || p2, 16))),
  },
  'md5': {
    label: 'MD5',
    encode: s => md5(s),
    oneWay: true,
  },
  'sha1': {
    label: 'SHA-1',
    encode: s => shaHash(s, 'SHA-1'),
    oneWay: true,
  },
  'sha256': {
    label: 'SHA-256',
    encode: s => shaHash(s, 'SHA-256'),
    oneWay: true,
  },
  'sha512': {
    label: 'SHA-512',
    encode: s => shaHash(s, 'SHA-512'),
    oneWay: true,
  },
  'hex': {
    label: 'Hex',
    encode: s => [...new TextEncoder().encode(s)].map(b=>b.toString(16).padStart(2,'0')).join(' '),
    decode: s => new TextDecoder().decode(new Uint8Array(s.trim().split(/\s+/).map(h=>parseInt(h,16)))),
  },
  'binary': {
    label: 'Binary',
    encode: s => [...new TextEncoder().encode(s)].map(b=>b.toString(2).padStart(8,'0')).join(' '),
    decode: s => new TextDecoder().decode(new Uint8Array(s.trim().split(/\s+/).map(b=>parseInt(b,2)))),
  },
  'octal': {
    label: 'Octal',
    encode: s => [...new TextEncoder().encode(s)].map(b=>b.toString(8).padStart(3,'0')).join(' '),
    decode: s => new TextDecoder().decode(new Uint8Array(s.trim().split(/\s+/).map(o=>parseInt(o,8)))),
  },
  'ascii': {
    label: 'ASCII Ordinals',
    encode: s => [...new TextEncoder().encode(s)].map(b=>String(b)).join(' '),
    decode: s => new TextDecoder().decode(new Uint8Array(s.trim().split(/\s+/).map(n=>parseInt(n,10)))),
  },
  'rot13': {
    label: 'ROT13',
    encode: s => s.replace(/[a-zA-Z]/g, c => {
      const b = c <= 'Z' ? 65 : 97;
      return String.fromCharCode(((c.charCodeAt(0)-b+13)%26)+b);
    }),
    symmetric: true,
  },
  'rot47': {
    label: 'ROT47',
    encode: s => s.replace(/[!-~]/g, c => String.fromCharCode(((c.charCodeAt(0)-33+47)%94)+33)),
    symmetric: true,
  },
  'reverse': {
    label: 'Reverse string',
    encode: s => [...s].reverse().join(''),
    symmetric: true,
  },
  'pretty-json': {
    label: 'Pretty JSON',
    encode: s => JSON.stringify(JSON.parse(s.trim()), null, 2),
    oneWay: true,
  },
  'minify-json': {
    label: 'Minify JSON',
    encode: s => JSON.stringify(JSON.parse(s.trim())),
    oneWay: true,
  },
  'morse': {
    label: 'Morse Code',
    encode: s => s.toUpperCase().split('').map(c => c===' ' ? ' / ' : (MORSE_ENC[c] ? MORSE_ENC[c]+' ' : '')).join('').trim(),
    decode: s => s.split(' / ').map(word => word.trim().split(/\s+/).map(tok => MORSE_DEC[tok] || '?').join('')).join(' '),
  },
  'strip-nonascii': {
    label: 'Strip non-ASCII',
    encode: s => s.replace(/[^\x20-\x7E\t\n\r]/g, ''),
    oneWay: true,
  },
  'transliterate': {
    label: 'Transliterate to ASCII',
    encode: s => [...s.normalize('NFD')].map(c => {
      if (TRANSLIT_SUPP[c]) return TRANSLIT_SUPP[c];
      const cp = c.codePointAt(0);
      if (cp >= 0x0300 && cp <= 0x036F) return ''; // strip combining marks
      if (cp > 127) return '?';
      return c;
    }).join(''),
    oneWay: true,
  },
  'force-7bit': {
    label: 'Force 7-bit ASCII',
    encode: s => [...s].map(c => String.fromCharCode(c.charCodeAt(0) & 0x7F)).join(''),
    oneWay: true,
  },
};

// ── Slot rendering ────────────────────────────────────────────
function renderSlot(i) {
  const step = chain[i];
  const slotEl = step.slotEl;
  const op = step.op;

  slotEl.innerHTML = '';
  slotEl.onclick = null;

  if (op) {
    const def = OPS[op];
    const mode = chain[i].mode || 'encode';
    const isDecodeMode = mode === 'decode' && !def.symmetric && !def.oneWay;

    slotEl.className = 'chain-slot filled';

    const badge = document.createElement('span');
    badge.className = 'slot-badge' + (isDecodeMode ? ' decode' : '');
    badge.textContent = def.label;

    const clearBtn = document.createElement('button');
    clearBtn.className = 'slot-clear-btn';
    clearBtn.title = 'Clear operation';
    clearBtn.textContent = '×';
    clearBtn.onclick = (e) => { e.stopPropagation(); clearSlotOp(i); };
    badge.appendChild(clearBtn);

    // Mode toggle button
    const modeToggle = document.createElement('button');
    modeToggle.className = 'mode-toggle' + (isDecodeMode ? ' decode' : '');
    if (def.oneWay) {
      modeToggle.textContent = 'one-way';
      modeToggle.disabled = true;
      modeToggle.title = 'This operation cannot be reversed';
    } else if (def.symmetric) {
      modeToggle.textContent = 'symmetric';
      modeToggle.disabled = true;
      modeToggle.title = 'Encode and decode are identical for this operation';
    } else {
      modeToggle.textContent = isDecodeMode ? 'DEC ⇌' : 'ENC ⇌';
      modeToggle.title = isDecodeMode ? 'Switch to encode mode' : 'Switch to decode mode';
      modeToggle.onclick = (e) => { e.stopPropagation(); toggleSlotMode(i); };
    }

    const removeBtn = document.createElement('button');
    removeBtn.className = 'slot-remove-btn';
    removeBtn.title = 'Remove this step';
    removeBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/></svg>';
    removeBtn.disabled = chain.length <= 1;
    removeBtn.onclick = (e) => { e.stopPropagation(); removeStep(i); };

    slotEl.appendChild(badge);
    slotEl.appendChild(modeToggle);
    slotEl.appendChild(removeBtn);
  } else {
    slotEl.className = 'chain-slot' + (focusedSlotIdx === i ? ' focused' : '');
    const ph = document.createElement('span');
    ph.className = 'slot-placeholder';
    ph.textContent = 'Drag or click an operation from the sidebar';
    const removeBtn = document.createElement('button');
    removeBtn.className = 'slot-remove-btn';
    removeBtn.title = 'Remove this step';
    removeBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/><path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/></svg>';
    removeBtn.disabled = chain.length <= 1;
    removeBtn.onclick = (e) => { e.stopPropagation(); removeStep(i); };
    slotEl.appendChild(ph);
    slotEl.appendChild(removeBtn);
    slotEl.onclick = () => focusSlot(i);
  }
}

// ── Add step ──────────────────────────────────────────────────
function addStep() {
  if (chain.length >= 100) {
    toast('Maximum 100 steps reached', 'warn');
    return;
  }

  const stepNum = chain.length + 1;

  // Collapse all previous outputs
  chain.forEach(s => s.outputEl.classList.add('collapsed'));

  // Hide previous add buttons
  chain.forEach(s => { if (s.addBtnWrap) s.addBtnWrap.style.display = 'none'; });

  // Build node
  const node = document.createElement('div');
  node.className = 'chain-node';

  // Connector arrow
  const connector = document.createElement('div');
  connector.className = 'chain-connector';
  connector.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" opacity="0.4"><path fill-rule="evenodd" d="M8 1a.5.5 0 0 1 .5.5v11.793l3.146-3.147a.5.5 0 0 1 .708.708l-4 4a.5.5 0 0 1-.708 0l-4-4a.5.5 0 0 1 .708-.708L7.5 13.293V1.5A.5.5 0 0 1 8 1"/></svg>';

  // Slot
  const slotWrap = document.createElement('div');
  slotWrap.className = 'chain-slot-wrap';
  const slotEl = document.createElement('div');
  slotEl.className = 'chain-slot';
  slotEl.dataset.idx = chain.length;

  // Drag-and-drop on slot
  slotEl.addEventListener('dragover', e => {
    e.preventDefault();
    slotEl.classList.add('drag-over');
  });
  slotEl.addEventListener('dragleave', () => slotEl.classList.remove('drag-over'));
  slotEl.addEventListener('drop', e => {
    e.preventDefault();
    slotEl.classList.remove('drag-over');
    const op = e.dataTransfer.getData('text/plain');
    if (op && OPS[op]) {
      const idx = parseInt(slotEl.dataset.idx);
      setSlotOp(idx, op);
    }
  });

  slotWrap.appendChild(slotEl);

  // Output
  const outputWrap = document.createElement('div');
  outputWrap.className = 'chain-output-wrap';

  const outputLabel = document.createElement('div');
  outputLabel.className = 'pane-label';
  outputLabel.innerHTML = `<span>Output #${stepNum}</span>`;
  const labelRight = document.createElement('div');
  labelRight.className = 'pane-label-right';
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-out-btn';
  copyBtn.title = `Copy output #${stepNum}`;
  copyBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/></svg>';
  labelRight.appendChild(copyBtn);
  outputLabel.appendChild(labelRight);

  const outputEl = document.createElement('textarea');
  outputEl.className = 'chain-output';
  outputEl.readOnly = true;
  outputEl.spellcheck = false;

  copyBtn.addEventListener('click', () => {
    if (!outputEl.value) { toast('Nothing to copy', 'warn'); return; }
    copyText(outputEl.value, { successMsg: `Output #${stepNum} copied` });
  });

  outputWrap.appendChild(outputLabel);
  outputWrap.appendChild(outputEl);

  // Add step button
  const addBtnWrap = document.createElement('div');
  addBtnWrap.className = 'chain-add-btn-wrap';
  const addBtn = document.createElement('button');
  addBtn.className = 'chain-add-btn';
  addBtn.innerHTML = '<svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg> Add step';
  addBtn.addEventListener('click', addStep);
  addBtnWrap.appendChild(addBtn);

  // Make the add-step area a drop target for sidebar ops
  addBtnWrap.addEventListener('dragover', e => {
    if (reorderSrcIdx !== null) return; // ignore reorder drags
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
    addBtnWrap.classList.add('drag-over');
  });
  addBtnWrap.addEventListener('dragleave', () => addBtnWrap.classList.remove('drag-over'));
  addBtnWrap.addEventListener('drop', e => {
    addBtnWrap.classList.remove('drag-over');
    if (reorderSrcIdx !== null) return;
    e.preventDefault();
    const op = e.dataTransfer.getData('text/plain');
    if (op && OPS[op]) { addStep(); setSlotOp(chain.length - 1, op); }
  });

  node.appendChild(connector);
  node.appendChild(slotWrap);
  node.appendChild(outputWrap);
  node.appendChild(addBtnWrap);
  chainArea.appendChild(node);

  const idx = chain.length;
  chain.push({ op: null, mode: 'encode', node, slotEl, outputEl, addBtnWrap });

  // Update dataset idx for all slots (in case of reindex)
  refreshSlotIndices();
  renderSlot(idx);
  focusSlot(idx);
  updateAddButtons();
  updateSummary();
  updateStats();
}

// ── Remove step ───────────────────────────────────────────────
function removeStep(i) {
  if (chain.length <= 1) return;

  chain[i].node.remove();
  chain.splice(i, 1);

  // Reindex
  refreshSlotIndices();

  // Re-render all slots (remove buttons need to be updated)
  chain.forEach((_, idx) => renderSlot(idx));

  // Renumber output labels
  renumberOutputs();

  // Uncollapse all except the last
  chain.forEach((s, idx) => {
    if (idx < chain.length - 1) {
      s.outputEl.classList.add('collapsed');
    } else {
      s.outputEl.classList.remove('collapsed');
    }
  });

  // Show add btn only on last step
  updateAddButtons();

  // Adjust focused slot
  focusedSlotIdx = Math.min(focusedSlotIdx, chain.length - 1);
  focusSlot(focusedSlotIdx);

  // Clear outputs from removed position onward (they've been spliced)
  // Clear all outputs that are now invalid
  chain.forEach(s => { s.outputEl.value = ''; s.outputEl.className = 'chain-output' + (s.outputEl.classList.contains('collapsed') ? ' collapsed' : ''); });

  runChain();
  updateSummary();
  updateStats();
}

// ── Set slot op ───────────────────────────────────────────────
function setSlotOp(i, key) {
  if (!OPS[key]) return;
  chain[i].op = key;
  renderSlot(i);
  updateSummary();
  // Advance focus to next empty slot
  const nextEmpty = chain.findIndex((s, idx) => idx > i && !s.op);
  if (nextEmpty !== -1) focusSlot(nextEmpty);
  else focusSlot(i); // stay on this slot (all filled)
  runChain();
}

// ── Clear slot op ─────────────────────────────────────────────
function clearSlotOp(i) {
  chain[i].op = null;
  chain[i].mode = 'encode';
  // Clear this output and all downstream outputs
  for (let j = i; j < chain.length; j++) {
    chain[j].outputEl.value = '';
    // Preserve collapsed class
    const isCollapsed = chain[j].outputEl.classList.contains('collapsed');
    chain[j].outputEl.className = 'chain-output' + (isCollapsed ? ' collapsed' : '');
  }
  renderSlot(i);
  focusSlot(i);
  updateSummary();
  updateStats();
  savePrefs();
}

// ── Toggle slot encode/decode mode ───────────────────────────
function toggleSlotMode(i) {
  chain[i].mode = chain[i].mode === 'decode' ? 'encode' : 'decode';
  renderSlot(i);
  updateSummary();
  runChain();
  savePrefs();
}

// ── Reorder chain steps ───────────────────────────────────────
function reorderChain(from, to) {
  if (from === to) return;
  const [step] = chain.splice(from, 1);
  chain.splice(to, 0, step);
  // Re-append DOM nodes in new order (browser moves existing nodes)
  chain.forEach(s => chainArea.appendChild(s.node));
  refreshSlotIndices();
  chain.forEach((_, i) => renderSlot(i));
  renumberOutputs();
  chain.forEach((s, i) => {
    (i < chain.length - 1)
      ? s.outputEl.classList.add('collapsed')
      : s.outputEl.classList.remove('collapsed');
  });
  updateAddButtons();
  focusedSlotIdx = Math.min(focusedSlotIdx, chain.length - 1);
  updateSummary();
  runChain();
  savePrefs();
}

// ── Focus slot ────────────────────────────────────────────────
function focusSlot(i) {
  focusedSlotIdx = i;
  chain.forEach((s, idx) => {
    if (!s.op) { // only update unfilled slots' focused state
      s.slotEl.classList.toggle('focused', idx === i);
    }
  });
}

// ── Refresh slot indices ──────────────────────────────────────
function refreshSlotIndices() {
  chain.forEach((s, i) => { s.slotEl.dataset.idx = i; });
}

// ── Renumber output labels ────────────────────────────────────
function renumberOutputs() {
  chain.forEach((s, i) => {
    const label = s.node.querySelector('.pane-label span');
    if (label) label.textContent = `Output #${i + 1}`;
    const copyBtn = s.node.querySelector('.copy-out-btn');
    if (copyBtn) copyBtn.title = `Copy output #${i + 1}`;
  });
}

// ── Update add button visibility ──────────────────────────────
function updateAddButtons() {
  chain.forEach((s, i) => {
    s.addBtnWrap.style.display = (i === chain.length - 1) ? '' : 'none';
  });
}

// ── Update chain summary ──────────────────────────────────────
function updateSummary() {
  chainSummary.innerHTML = '<span class="cs-label">Chain</span>';
  chain.forEach((s, i) => {
    if (i > 0) {
      const arrow = document.createElement('span');
      arrow.className = 'cs-arrow';
      arrow.textContent = '→';
      chainSummary.appendChild(arrow);
    }

    const pill = document.createElement('span');

    if (s.op) {
      const def = OPS[s.op];
      const isDecodeMode = s.mode === 'decode' && !def.symmetric && !def.oneWay;
      const canToggle = !def.oneWay && !def.symmetric;

      let cls = 'cs-pill' + (isDecodeMode ? ' decode' : '');
      if (canToggle) cls += ' clickable';
      pill.className = cls;
      pill.textContent = (isDecodeMode ? '↓ ' : '↑ ') + def.label;

      // Tooltip
      if (canToggle) {
        pill.title = isDecodeMode
          ? 'Click to switch to encode mode · Drag to reorder'
          : 'Click to switch to decode mode · Drag to reorder';
      } else if (def.oneWay) {
        pill.title = 'One-way operation · Drag to reorder';
      } else {
        pill.title = 'Symmetric operation · Drag to reorder';
      }

      // Click to toggle encode/decode
      if (canToggle) {
        pill.addEventListener('click', e => {
          if (pill._wasDragged) { pill._wasDragged = false; return; }
          toggleSlotMode(i);
        });
      }

      // Drag to reorder
      pill.draggable = true;
      pill.dataset.chainIdx = i;

      pill.addEventListener('dragstart', e => {
        pill._wasDragged = true;
        reorderSrcIdx = i;
        e.dataTransfer.setData('application/transcode-reorder', String(i));
        e.dataTransfer.effectAllowed = 'move';
      });
      pill.addEventListener('dragend', () => {
        reorderSrcIdx = null;
        chainSummary.querySelectorAll('.cs-pill.drop-before')
          .forEach(p => p.classList.remove('drop-before'));
      });
      pill.addEventListener('dragover', e => {
        if (reorderSrcIdx === null || reorderSrcIdx === i) return;
        e.preventDefault();
        e.stopPropagation(); // don't let chain-summary bar handle it
        chainSummary.querySelectorAll('.cs-pill.drop-before')
          .forEach(p => p.classList.remove('drop-before'));
        pill.classList.add('drop-before');
      });
      pill.addEventListener('dragleave', () => pill.classList.remove('drop-before'));
      pill.addEventListener('drop', e => {
        pill.classList.remove('drop-before');
        if (reorderSrcIdx === null) return;
        e.preventDefault();
        e.stopPropagation();
        const from = reorderSrcIdx;
        reorderSrcIdx = null;
        reorderChain(from, i);
      });

    } else {
      pill.className = 'cs-pill-empty';
      pill.textContent = `Step ${i + 1}`;
    }

    chainSummary.appendChild(pill);
  });
}

// ── Run chain ─────────────────────────────────────────────────
async function runChain() {
  const inputVal = chainInput.value;
  let prevVal = inputVal;

  for (let i = 0; i < chain.length; i++) {
    if (!chain[i].op) break;
    const op = OPS[chain[i].op];
    const outEl = chain[i].outputEl;
    const isCollapsed = outEl.classList.contains('collapsed');
    outEl.className = 'chain-output' + (isCollapsed ? ' collapsed' : '') + ' is-loading';
    outEl.value = 'Running…';
    try {
      const fn = (chain[i].mode === 'decode' && op.decode) ? op.decode : op.encode;
      const result = await Promise.resolve(fn(prevVal));
      const val = typeof result === 'string' ? result : String(result);
      outEl.value = val;
      outEl.className = 'chain-output' + (isCollapsed ? ' collapsed' : '');
      prevVal = val;
    } catch(e) {
      outEl.value = 'Error: ' + e.message;
      outEl.className = 'chain-output' + (isCollapsed ? ' collapsed' : '') + ' is-error';
      toast(e.message.slice(0, 80), 'err');
      break;
    }
  }

  updateStats();
  savePrefs();
}

const debouncedRunChain = debounce(runChain, 300);

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  const steps = chain.filter(s => s.op).length;
  const ic = chainInput.value.length;
  // Find last non-empty output
  let oc = 0;
  for (let i = chain.length - 1; i >= 0; i--) {
    if (chain[i].outputEl.value && !chain[i].outputEl.classList.contains('is-loading')) {
      oc = chain[i].outputEl.value.length;
      break;
    }
  }
  statsEl.textContent = `Chain: ${steps} step${steps !== 1 ? 's' : ''} · in: ${ic.toLocaleString()} chars · out: ${oc.toLocaleString()} chars`;
}

// ── Reset chain ───────────────────────────────────────────────
function resetChain() {
  chain.forEach(s => s.node.remove());
  chain = [];
  focusedSlotIdx = 0;
  chainInput.value = '';
  addStep();
  updateSummary();
  updateStats();
  savePrefs();
}

// ── Sidebar op buttons ────────────────────────────────────────
document.querySelectorAll('.op-btn[data-op]').forEach(btn => {
  btn.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', btn.dataset.op);
    e.dataTransfer.effectAllowed = 'copy';
  });
  btn.addEventListener('click', () => {
    if (chain.length === 0) return;
    setSlotOp(focusedSlotIdx, btn.dataset.op);
  });
});

// ── Chain summary drop target (append step) ───────────────────
chainSummary.addEventListener('dragover', e => {
  e.preventDefault();
  if (reorderSrcIdx !== null) {
    e.dataTransfer.dropEffect = 'move';
  } else {
    e.dataTransfer.dropEffect = 'copy';
    chainSummary.classList.add('drag-over');
  }
});
chainSummary.addEventListener('dragleave', e => {
  // Only remove if leaving the summary bar itself, not a child
  if (!chainSummary.contains(e.relatedTarget)) {
    chainSummary.classList.remove('drag-over');
  }
});
chainSummary.addEventListener('drop', e => {
  e.preventDefault();
  chainSummary.classList.remove('drag-over');
  // If this is a chain-reorder drag that landed on the bar background
  // (not on a pill, which would have stopped propagation), move to end
  if (reorderSrcIdx !== null) {
    const from = reorderSrcIdx;
    reorderSrcIdx = null;
    reorderChain(from, chain.length - 1);
    return;
  }
  const op = e.dataTransfer.getData('text/plain');
  if (op && OPS[op]) {
    addStep();
    setSlotOp(chain.length - 1, op);
  }
});

// ── Header buttons ────────────────────────────────────────────
$('btn-copy-output').addEventListener('click', () => {
  let text = '';
  for (let i = chain.length - 1; i >= 0; i--) {
    if (chain[i].outputEl.value && !chain[i].outputEl.className.includes('is-loading')) {
      text = chain[i].outputEl.value; break;
    }
  }
  if (!text) { toast('Nothing to copy', 'warn'); return; }
  copyText(text, { successMsg: 'Output copied' });
});

$('btn-reset').addEventListener('click', () => resetChain());

// ── Input events ──────────────────────────────────────────────
chainInput.addEventListener('input', () => {
  updateStats();
  debouncedRunChain();
});

// ── Persistence ───────────────────────────────────────────────
function savePrefs() {
  try {
    const p = {
      chainOps: chain.map(s => ({ op: s.op, mode: s.mode || 'encode' })),
      chainInput: chainInput.value,
    };
    localStorage.setItem('transcode_prefs', JSON.stringify(p));
  } catch(e) {}
}

async function loadPrefs() {
  try {
    const p = JSON.parse(localStorage.getItem('transcode_prefs') || '{}');

    // Restore input
    if (p.chainInput) chainInput.value = p.chainInput;

    // Restore chain ops (at least 1 step already exists from init addStep())
    if (Array.isArray(p.chainOps) && p.chainOps.length > 0) {
      // Normalise: support both old plain-string format and new {op,mode} format
      const normalised = p.chainOps.map(item =>
        item && typeof item === 'object' ? item : { op: item, mode: 'encode' }
      );
      // Set op for first step
      const first = normalised[0];
      if (first && first.op && OPS[first.op]) {
        chain[0].op = first.op;
        chain[0].mode = first.mode || 'encode';
        renderSlot(0);
      }
      // Add and fill remaining steps
      for (let i = 1; i < Math.min(normalised.length, 100); i++) {
        addStep();
        const item = normalised[i];
        if (item && item.op && OPS[item.op]) {
          chain[i].op = item.op;
          chain[i].mode = item.mode || 'encode';
          renderSlot(i);
        }
      }
      // Focus first empty slot
      const firstEmpty = chain.findIndex(s => !s.op);
      focusSlot(firstEmpty !== -1 ? firstEmpty : chain.length - 1);
      updateSummary();
      updateAddButtons();
      if (chainInput.value) await runChain();
    }
  } catch(e) {}
  updateStats();
}

// ── Init ──────────────────────────────────────────────────────
renderHeader({
  title: 'transcode',
  toolIconSvg: '<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 4a.5.5 0 0 1 .5-.5h11.793l-2.147-2.146a.5.5 0 0 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L13.293 4.5H1.5A.5.5 0 0 1 1 4z"/><path d="M15 12a.5.5 0 0 1-.5.5H2.707l2.147 2.146a.5.5 0 0 1-.708.708l-3-3a.5.5 0 0 1 0-.708l3-3a.5.5 0 0 1 .708.708L2.707 11.5H14.5a.5.5 0 0 1 .5.5z" opacity="0.6"/></svg>',
  githubPath: 'transcode',
});
initSidebarSections('transcode_prefs', ['sec-encoding','sec-hashing','sec-bases','sec-transforms','sec-ascii']);
addStep(); // create initial step
loadPrefs();
</script>
</body>
