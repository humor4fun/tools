<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>list — tools.bluejar.org</title>
<link rel="stylesheet" href="../utils/tokens.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 290px;
    --header-h:  48px;
    --statusbar-h: 38px;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.5; overflow: hidden;
  }

  /* ── Layout ──────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-columns: 1fr var(--sidebar-w);
    grid-template-rows: var(--header-h) auto 1fr var(--statusbar-h);
    height: 100vh; width: 100vw;
  }

  /* ── Header extra ─────────────────────────────────────────── */
  .hdr-btn.ok { color: #4ade80; border-color: var(--accent-green); }

  /* ── Textarea pane ───────────────────────────────────────── */
  #editor-pane {
    background: var(--bg-content); display: flex; flex-direction: column; overflow: hidden;
    border-right: 1px solid var(--border);
  }
  #editor {
    flex: 1; width: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
    border: none; outline: none; resize: none;
    padding: 24px 28px; tab-size: 2;
    white-space: pre-wrap; overflow-wrap: break-word;
    overflow-y: auto; overflow-x: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  #sidebar {
    background: var(--bg-sidebar); overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Status bar ──────────────────────────────────────────── */
  #statusbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 10px; padding: 0 14px;
    background: var(--bg-sidebar); border-top: 1px solid var(--border);
    font-size: 11.5px; color: var(--text-dim); flex-shrink: 0;
  }
  #stats { flex: 1; font-family: var(--font-mono); font-size: 11px; }
  .sb-sep { color: var(--border); }
  .sb-btn {
    display: flex; align-items: center; gap: 4px;
    background: var(--bg-hover); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-muted); font-size: 11px; font-family: var(--font-sans);
    padding: 3px 9px; cursor: pointer; height: 24px;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .sb-btn:hover:not(:disabled) { color: var(--text); background: var(--bg-active); border-color: var(--accent-blue); }
  .sb-btn:disabled { opacity: 0.35; cursor: default; }
  #stack-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }
  #stack-input {
    width: 46px; background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 11px; font-family: var(--font-mono);
    padding: 2px 6px; text-align: center; outline: none;
  }
  #stack-input:focus { border-color: var(--accent-blue); }



  /* ── Separator panel ─────────────────────────────────────── */
  #sep-panel { padding: 10px 12px 12px; border-bottom: 1px solid var(--border); }
  .sep-row { margin-bottom: 8px; }
  .sep-row:last-child { margin-bottom: 0; }
  .sep-label {
    font-size: 10px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px;
  }
  .sep-pills { display: flex; flex-wrap: wrap; gap: 4px; }
  .sep-pill {
    display: inline-flex; align-items: center; padding: 3px 9px;
    border: 1px solid var(--border); border-radius: 100px;
    font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
    cursor: pointer; background: var(--bg-hover); white-space: nowrap;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }
  .sep-pill:hover { background: var(--bg-active); color: var(--text); }
  .sep-pill.active { background: var(--bg-active); color: var(--text-link); border-color: var(--accent-blue); }
  .sep-custom-input {
    margin-top: 5px; background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 12px; font-family: var(--font-mono);
    padding: 3px 8px; width: 100%; outline: none; display: none;
  }
  .sep-custom-input.visible { display: block; }
  .sep-custom-input:focus { border-color: var(--accent-blue); }

  /* ── Operation buttons ───────────────────────────────────── */
  .op-btn {
    display: flex; align-items: center; width: 100%;
    background: transparent; border: none; border-radius: 5px;
    color: var(--text-muted); font-size: 12px; font-family: var(--font-sans);
    padding: 5px 8px; cursor: pointer; text-align: left; gap: 7px;
    transition: background 0.12s, color 0.12s;
    margin-bottom: 1px;
  }
  .op-btn:hover { background: var(--bg-hover); color: var(--text); }
  .op-btn:active { background: var(--bg-active); }
  .op-btn svg { flex-shrink: 0; opacity: 0.6; }
  .op-btn-note {
    font-size: 10px; color: var(--text-dim); margin-left: auto; white-space: nowrap;
  }

  /* ── Replace sub-form ────────────────────────────────────── */
  .sub-form { padding: 2px 2px 6px; }
  .sub-form input[type="text"] {
    width: 100%; background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 12px; font-family: var(--font-mono);
    padding: 4px 8px; outline: none; margin-bottom: 5px; display: block;
  }
  .sub-form input[type="text"]:focus { border-color: var(--accent-blue); }
  .sub-form input[type="text"]::placeholder { color: var(--text-dim); }
  .sub-form-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  }
  .sub-form-check {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text-muted); cursor: pointer; user-select: none;
  }
  .sub-form-check input { accent-color: var(--accent-blue); cursor: pointer; }
  .sub-form-apply {
    display: flex; align-items: center; justify-content: center;
    width: 100%; background: var(--accent-blue); border: none; border-radius: 5px;
    color: #fff; font-size: 12px; font-family: var(--font-sans);
    padding: 5px 0; cursor: pointer; transition: background 0.15s;
  }
  .sub-form-apply:hover { background: var(--accent-blue-h); }

  /* ── Labels sub-form ─────────────────────────────────────── */
  .label-mode-row {
    display: flex; gap: 4px; margin-bottom: 8px;
  }
  .label-mode-btn {
    flex: 1; text-align: center; padding: 4px 0; font-size: 11px;
    border: 1px solid var(--border); border-radius: 4px; cursor: pointer;
    background: var(--bg-hover); color: var(--text-muted);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }
  .label-mode-btn.active { background: var(--bg-active); color: var(--text-link); border-color: var(--accent-blue); }

  /* ── Prune sub-form ──────────────────────────────────────── */
  .prune-btns { display: flex; gap: 5px; margin-top: 6px; }
  .prune-btn {
    flex: 1; background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: 5px; color: var(--text-muted); font-size: 11.5px;
    padding: 5px 4px; cursor: pointer; text-align: center;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .prune-btn:hover { background: var(--bg-active); color: var(--text); border-color: var(--accent-blue); }

  /* ── Stack-full warning banner ──────────────────────────────── */
  #stack-warn-banner {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; font-size: 12px;
    background: #2d1f00; border-bottom: 1px solid #92400e;
    color: #fbbf24; z-index: 9; flex-shrink: 0;
    max-height: 40px; overflow: hidden;
    transition: max-height 0.2s ease, padding 0.2s ease, border-bottom-width 0.2s ease;
  }
  #stack-warn-banner.hidden {
    max-height: 0; padding-top: 0; padding-bottom: 0; border-bottom-width: 0;
  }
  #stack-warn-banner svg { flex-shrink: 0; opacity: 0.9; }
  #stack-warn-msg { flex: 1; }
  #stack-warn-dismiss {
    background: none; border: none; color: #fbbf24; font-size: 16px;
    cursor: pointer; padding: 0 4px; opacity: 0.7; line-height: 1;
    transition: opacity 0.15s; flex-shrink: 0;
  }
  #stack-warn-dismiss:hover { opacity: 1; }

  /* ── History sidebar section ─────────────────────────────────── */
  #history-list {
    height: 160px; overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    padding: 2px 0;
  }
  #history-list::-webkit-scrollbar { width: 4px; }
  #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .hist-entry {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; font-size: 11.5px; cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.1s, color 0.1s;
    user-select: none;
  }
  .hist-entry:hover { background: var(--bg-hover); }
  .hist-entry.hist-current {
    color: var(--text-heading); background: rgba(31,111,235,0.08);
    border-left-color: var(--accent-blue); cursor: default; font-weight: 500;
  }
  .hist-entry.hist-current:hover { background: rgba(31,111,235,0.08); }
  .hist-entry.hist-undo { color: var(--text-muted); }
  .hist-entry.hist-undo:hover { color: var(--text); }
  .hist-entry.hist-redo { color: var(--text-dim); font-style: italic; }
  .hist-entry.hist-redo:hover { color: var(--text-muted); }
  .hist-icon { flex-shrink: 0; font-size: 9px; width: 12px; text-align: center; }
  .hist-empty {
    padding: 12px 10px; font-size: 11px; color: var(--text-dim); font-style: italic;
  }
  #history-clear-btn {
    background: none; border: none; color: var(--text-dim); font-size: 10px;
    cursor: pointer; padding: 2px 6px; border-radius: 3px;
    transition: color 0.15s, background 0.15s; line-height: 1.5;
  }
  #history-clear-btn:hover { color: #f85149; background: var(--bg-hover); }

</style>
<script src="../utils/toast.js"></script>
<script src="../utils/clipboard.js"></script>
<script src="../utils/sidebar.js"></script>
<script src="../utils/header.js"></script>
</head>
<body>
<div id="app">

  <!-- ── Header ──────────────────────────────────────────────── -->
  <header id="header">
    <div id="header-actions">
      <button class="hdr-btn" id="btn-copy">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5zm-3-1A1.5 1.5 0 0 0 5 1.5v1A1.5 1.5 0 0 0 6.5 4h3A1.5 1.5 0 0 0 11 2.5v-1A1.5 1.5 0 0 0 9.5 0z"/></svg>
        Copy
      </button>
      <button class="hdr-btn" id="btn-save-hdr">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708z"/></svg>
        Save
      </button>
    </div>
  </header>

  <!-- ── Stack-full warning banner ──────────────────────────────── -->
  <div id="stack-warn-banner" class="hidden" style="grid-column:1/-1">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5m.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2"/></svg>
    <span id="stack-warn-msg"></span>
    <button id="stack-warn-dismiss" aria-label="Dismiss warning">&#x2715;</button>
  </div>

  <!-- ── Textarea ─────────────────────────────────────────────── -->
  <div id="editor-pane">
    <textarea id="editor" placeholder="Paste or type your list here…" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
  </div>

  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside id="sidebar">

    <!-- Separators (always open) -->
    <div id="sep-panel">
      <div class="sep-row">
        <div class="sep-label">Input separator</div>
        <div class="sep-pills" id="in-pills">
          <span class="sep-pill active" data-sep="newline">Newline</span>
          <span class="sep-pill" data-sep="blank">Blank line</span>
          <span class="sep-pill" data-sep="comma">Comma</span>
          <span class="sep-pill" data-sep="space">Space</span>
          <span class="sep-pill" data-sep="tab">Tab</span>
          <span class="sep-pill" data-sep="custom">Custom…</span>
        </div>
        <input class="sep-custom-input" id="in-custom" placeholder="e.g.  |" maxlength="8">
      </div>
      <div class="sep-row">
        <div class="sep-label">Output separator</div>
        <div class="sep-pills" id="out-pills">
          <span class="sep-pill active" data-sep="newline">Newline</span>
          <span class="sep-pill" data-sep="blank">Blank line</span>
          <span class="sep-pill" data-sep="comma">Comma</span>
          <span class="sep-pill" data-sep="space">Space</span>
          <span class="sep-pill" data-sep="tab">Tab</span>
          <span class="sep-pill" data-sep="custom">Custom…</span>
        </div>
        <input class="sep-custom-input" id="out-custom" placeholder="e.g.  |" maxlength="8">
      </div>
    </div>

    <!-- Sort -->
    <div class="sb-sec" id="sec-sort">
      <div class="sb-hdr">
        <span class="">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 3.5a.5.5 0 0 0-1 0v8.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L3.5 12.293zm4 .5a.5.5 0 0 1 0-1h1a.5.5 0 0 1 0 1zm0 3a.5.5 0 0 1 0-1h3a.5.5 0 0 1 0 1zm0 3a.5.5 0 0 1 0-1h5a.5.5 0 0 1 0 1zM7 12.5a.5.5 0 0 0 .5.5h7a.5.5 0 0 0 0-1h-7a.5.5 0 0 0-.5.5"/></svg>
          Sort
        </span>
        <svg class="sb-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="sb-body" id="body-sort">
        <button class="op-btn" data-op="sort-az">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 2.5a.5.5 0 0 0-1 0v8.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 2a.5.5 0 0 0 .708 0l2-2a.5.5 0 0 0-.708-.708L3.5 11.293zm4 1a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5M7.5 6a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zm0 3a.5.5 0 0 0 0 1h3a.5.5 0 0 0 0-1zm0 3a.5.5 0 0 0 0 1h1a.5.5 0 0 0 0-1z"/></svg>
          A → Z
        </button>
        <button class="op-btn" data-op="sort-za">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 2.5a.5.5 0 0 0-1 0v8.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 2a.5.5 0 0 0 .708 0l2-2a.5.5 0 0 0-.708-.708L3.5 11.293zm4 9a.5.5 0 0 1 .5-.5h1a.5.5 0 0 1 0 1h-1a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m0-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5"/></svg>
          Z → A
        </button>
        <button class="op-btn" data-op="sort-names">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/></svg>
          A → Z (names, by last name)
        </button>
        <button class="op-btn" data-op="sort-titles">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5M3 2.5a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1H10v1h.5A1.5 1.5 0 0 1 12 5.5v5a1.5 1.5 0 0 1-1.5 1.5h-5A1.5 1.5 0 0 1 4 10.5v-5A1.5 1.5 0 0 1 5.5 4H6V3H3.5a.5.5 0 0 1-.5-.5"/></svg>
          A → Z (titles, ignore A/An/The…)
        </button>
        <button class="op-btn" data-op="sort-email">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1zm13 2.383-4.708 2.825L15 11.105zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741M1 11.105l4.708-2.897L1 5.383z"/></svg>
          A → Z (email, by domain)
        </button>
        <button class="op-btn" data-op="sort-href">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1 1 0 0 0-.154.199 2 2 0 0 1 .861 3.337L6.88 11.45a2 2 0 1 1-2.83-2.83l.793-.792a4 4 0 0 1-.128-1.287z"/><path d="M6.586 4.672A3 3 0 0 0 7.414 9.5l.775-.776a2 2 0 0 1-.896-3.346L9.12 3.55a2 2 0 1 1 2.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 1 0-4.243-4.243z"/></svg>
          A → Z (HREF, by link text)
        </button>
        <button class="op-btn" data-op="sort-ignore-first">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2.5a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5m2 3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m0 3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2 3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/></svg>
          A → Z (ignore 1st word)
        </button>
        <button class="op-btn" data-op="sort-addresses">
          <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"/></svg>
          A → Z (addresses)
          <span class="op-btn-note">blank-line sep</span>
        </button>
        <button class="op-btn" data-op="sort-numeric">

let inCustom  = '';
let outCustom = '';

// ── Persistence ────────────────────────────────────────────────
function loadPrefs() {
  try {
    const s = JSON.parse(localStorage.getItem('list_prefs') || '{}');
    if (s.stackMax !== undefined) { stackMax = s.stackMax; stackInp.value = stackMax; }
    if (s.inSep)  { inSep  = s.inSep;  setActivePill('in',  inSep);  }
    if (s.outSep) { outSep = s.outSep; setActivePill('out', outSep); }
    if (s.inCustom)  { inCustom  = s.inCustom;  el('in-custom').value  = inCustom;  }
    if (s.outCustom) { outCustom = s.outCustom; el('out-custom').value = outCustom; }
    if (s.inSep  === 'custom') el('in-custom').classList.add('visible');
    if (s.outSep === 'custom') el('out-custom').classList.add('visible');
  } catch(e) {}
}
function savePrefs() {
  try {
    const s = { stackMax, inSep, outSep, inCustom, outCustom };
    localStorage.setItem('list_prefs', JSON.stringify(s));
  } catch(e) {}
}

// ── Stats ──────────────────────────────────────────────────────
function updateStats() {
  const val = editor.value;
  const chars = val.length;
  const words = val.trim() === '' ? 0 : val.trim().split(/\s+/).length;
  const items = val.trim() === '' ? 0 : splitItems(val).filter(s => s.trim() !== '').length;
  statsEl.textContent = `${items} items · ${words} words · ${chars} chars`;
}

// ── Undo / Redo ────────────────────────────────────────────────
// Each stack entry: { val: string, label: string }
// currentLabel describes what the current editor state represents.
let currentLabel = 'Initial';

function pushUndo(prevVal, label) {
  if (stackMax === 0) return;
  // Warn when AT the limit (next push drops oldest)
  if (undoStack.length >= stackMax) {
    showStackWarn();
    undoStack.shift(); // drop oldest to make room
  }
  undoStack.push({ val: prevVal, label: currentLabel });
  currentLabel = label || 'Edit';
  redoStack = [];
  updateUndoButtons();
  updateHistory();
}

function updateUndoButtons() {
  btnUndo.disabled = undoStack.length === 0;
  btnRedo.disabled = redoStack.length === 0;
}

btnUndo.addEventListener('click', () => {
  if (!undoStack.length) return;
  const entry = undoStack.pop();
  redoStack.push({ val: editor.value, label: currentLabel });
  editor.value = entry.val;
  currentLabel = entry.label;
  updateStats(); updateUndoButtons(); updateHistory();
});

btnRedo.addEventListener('click', () => {
  if (!redoStack.length) return;
  const entry = redoStack.pop();
  undoStack.push({ val: editor.value, label: currentLabel });
  editor.value = entry.val;
  currentLabel = entry.label;
  updateStats(); updateUndoButtons(); updateHistory();
});

stackInp.addEventListener('change', () => {
  let v = parseInt(stackInp.value, 10);
  if (isNaN(v) || v < 0) v = 0;
  if (v > 100) v = 100;
  stackInp.value = v;
  const prevMax = stackMax;
  stackMax = v;
  // Trim stacks if needed
  while (undoStack.length > stackMax) undoStack.shift();
  while (redoStack.length > stackMax) redoStack.shift();
  // If limit changed, reset the per-limit dismissal so banner can reappear when reached
  if (v !== prevMax) clearStackWarnDismissal();
  updateUndoButtons(); updateHistory();
  savePrefs();
});

// ── History list rendering ─────────────────────────────────────
function updateHistory() {
  const list = el('history-list');
  list.innerHTML = '';

  const totalEntries = undoStack.length + 1 + redoStack.length; // undo + current + redo
  if (undoStack.length === 0 && redoStack.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'hist-empty';
    empty.textContent = 'No history yet';
    list.appendChild(empty);
    return;
  }

  // Redo entries: redoStack[last] = most recently undone (shows first/top)
  // redoStack[0] = oldest redo (shows last in redo section)
  for (let i = redoStack.length - 1; i >= 0; i--) {
    const entry = redoStack[i];
    const row = document.createElement('div');
    row.className = 'hist-entry hist-redo';
    row.title = 'Click to redo to this state';
    row.innerHTML = `<span class="hist-icon">↑</span><span>${escHtml(entry.label)}</span>`;
    const idx = i; // redo entry index in redoStack (0 = oldest)
    row.addEventListener('click', () => jumpToRedo(idx));
    list.appendChild(row);
  }

  // Current state
  const cur = document.createElement('div');
  cur.className = 'hist-entry hist-current';
  cur.innerHTML = `<span class="hist-icon">●</span><span>${escHtml(currentLabel)}</span>`;
  list.appendChild(cur);
  // Scroll current into view
  requestAnimationFrame(() => cur.scrollIntoView({ block: 'nearest' }));

  // Undo entries: undoStack[last] = most recent (shows first)
  for (let i = undoStack.length - 1; i >= 0; i--) {
    const entry = undoStack[i];
    const row = document.createElement('div');
    row.className = 'hist-entry hist-undo';
    row.title = 'Click to undo to this state';
    row.innerHTML = `<span class="hist-icon">↓</span><span>${escHtml(entry.label)}</span>`;
    const idx = i; // position in undoStack (undoStack.length-1 = top/most recent)
    row.addEventListener('click', () => jumpToUndo(idx));
    list.appendChild(row);
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Jump to undo entry at undoStack[idx] — apply consecutive undos from top down to idx
function jumpToUndo(targetIdx) {
  // Number of undos needed: from top (undoStack.length-1) down to targetIdx inclusive
  const steps = undoStack.length - targetIdx;
  for (let k = 0; k < steps; k++) {
    const entry = undoStack.pop();
    redoStack.push({ val: editor.value, label: currentLabel });
    editor.value = entry.val;
    currentLabel = entry.label;
  }
  updateStats(); updateUndoButtons(); updateHistory();
}

// Jump to redo entry at redoStack[targetIdx] — apply consecutive redos from top down to targetIdx
function jumpToRedo(targetIdx) {
  // redoStack[last] = most recent undo. We need to redo from top down to targetIdx
  const steps = redoStack.length - targetIdx;
  for (let k = 0; k < steps; k++) {
    const entry = redoStack.pop();
    undoStack.push({ val: editor.value, label: currentLabel });
    editor.value = entry.val;
    currentLabel = entry.label;
  }
  updateStats(); updateUndoButtons(); updateHistory();
}

el('history-clear-btn').addEventListener('click', () => {
  undoStack = []; redoStack = [];
  currentLabel = 'Initial';
  updateUndoButtons(); updateHistory();
});

// ── Stack-full warning banner ─────────────────────────────────
const WARN_KEY      = 'list_stackwarn';
const WARN_EXPIRY   = 86400000; // 24 hours in ms

function getWarnState() {
  try { return JSON.parse(localStorage.getItem(WARN_KEY) || '{}'); } catch { return {}; }
}
function clearStackWarnDismissal() {
  try {
    const s = getWarnState();
    delete s.dismissed;
    delete s.dismissedLimit;
    localStorage.setItem(WARN_KEY, JSON.stringify(s));
  } catch {}
}

function showStackWarn() {
  if (stackMax === 0) return;
  const s = getWarnState();
  // If dismissed within 24h AND for the same limit, don't show
  if (s.dismissed && s.dismissedLimit === stackMax) {
    if (Date.now() - s.dismissed < WARN_EXPIRY) return;
  }
  const banner = el('stack-warn-banner');
  el('stack-warn-msg').textContent =
    `Stack full (${stackMax}/${stackMax}) — increase the limit in the status bar to keep more history`;
  banner.classList.remove('hidden');
}

el('stack-warn-dismiss').addEventListener('click', () => {
  el('stack-warn-banner').classList.add('hidden');
  try {
    const s = getWarnState();
    s.dismissed = Date.now();
    s.dismissedLimit = stackMax;
    localStorage.setItem(WARN_KEY, JSON.stringify(s));
  } catch {}
});

// ── Separators ─────────────────────────────────────────────────
const SEP_CHARS = {
  newline: '\n',
  blank:   '\n\n',
  comma:   ',',
  space:   ' ',
  tab:     '\t',
};
function getSepChar(type, custom) {
  if (type === 'custom') return custom;
  return SEP_CHARS[type] || '\n';
}
function setActivePill(which, val) {
  const container = el(which + '-pills');
  container.querySelectorAll('.sep-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.sep === val);
  });
}

function applyOutSep() {
  // Reformat the textarea content using current in→out separator
  const inChar  = getSepChar(inSep, inCustom);
  const outChar = getSepChar(outSep, outCustom);
  if (inChar === outChar) return;
  const prev = editor.value;
  const items = splitByChar(prev, inChar);
  editor.value = items.join(outChar);
  // Sync in sep to out
  inSep = outSep; inCustom = outCustom;
  setActivePill('in', inSep);
  el('in-custom').classList.toggle('visible', inSep === 'custom');
  el('in-custom').value = inCustom;
  updateStats();
}

document.querySelectorAll('#in-pills .sep-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    inSep = pill.dataset.sep;
    setActivePill('in', inSep);
    el('in-custom').classList.toggle('visible', inSep === 'custom');
    // Sync out to in (SortMyList behaviour)
    outSep = inSep;
    setActivePill('out', outSep);
    el('out-custom').classList.toggle('visible', outSep === 'custom');
    savePrefs();
  });
});
document.querySelectorAll('#out-pills .sep-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const newOutSep = pill.dataset.sep;
    const newOutCustom = outCustom;
    // Reformat immediately
    const inChar  = getSepChar(inSep, inCustom);
    const outChar = getSepChar(newOutSep, newOutCustom);
    if (inChar !== outChar) {
      const prev = editor.value;
      pushUndo(prev, 'Change separator');
      const items = splitByChar(prev, inChar);
      editor.value = items.join(outChar);
    }
    outSep = newOutSep;
    setActivePill('out', outSep);
    el('out-custom').classList.toggle('visible', outSep === 'custom');
    // Sync in to out
    inSep = outSep;
    setActivePill('in', inSep);
    el('in-custom').classList.toggle('visible', inSep === 'custom');
    updateStats(); savePrefs();
  });
});
el('in-custom').addEventListener('input', e => { inCustom = e.target.value; savePrefs(); });
el('out-custom').addEventListener('input', e => { outCustom = e.target.value; savePrefs(); });

// ── Split / Join helpers ────────────────────────────────────────
function splitByChar(text, sepChar) {
  if (sepChar === '\n\n') {
    return text.split(/\n\s*\n/).map(s => s.trim()).filter(s => s !== '');
  }
  return text.split(sepChar);
}

function splitItems(text) {
  const inChar = getSepChar(inSep, inCustom);
  return splitByChar(text, inChar);
}
function joinItems(items) {
  const outChar = getSepChar(outSep, outCustom);
  return items.join(outChar);
}

function applyTransform(fn, label) {
  const prev = editor.value;
  pushUndo(prev, label || 'Edit');
  editor.value = fn(prev);
  updateStats(); updateUndoButtons(); updateHistory();
}

function applyItemTransform(fn, label) {
  const prev = editor.value;
  pushUndo(prev, label || 'Edit');
  const items = splitItems(prev);
  editor.value = joinItems(fn(items));
  updateStats(); updateUndoButtons(); updateHistory();
}

// ── Sort helpers ───────────────────────────────────────────────
function collate(a, b) {
  return a.localeCompare(b, undefined, { sensitivity: 'base', numeric: true });
}

const TITLE_IGNORE = /^(a|an|the|la|le|l'|il)\s+/i;
const NAME_PREFIXES = /^(the\s+|mr\.?\s+|mrs\.?\s+|ms\.?\s+|dr\.?\s+|prof\.?\s+|rev\.?\s+|reverend\s+|honorable\s+|the\s+honorable\s+|sir\s+)/i;
const NAME_AND      = /\s+(and\s+.+|&.+)$/i;

function getLastName(item) {
  let s = item.trim().replace(NAME_PREFIXES, '').replace(NAME_AND, '');
  const parts = s.split(/[\s,]+/).filter(Boolean);
  return parts.length >= 2 ? parts[parts.length - 1] : parts[0] || s;
}

const DAYS = ['mon','tue','wed','thu','fri','sat','sun'];
const DAY_PATTERNS = [
  /\b(monday|mon)\b/i,
  /\b(tuesday|tue|tues)\b/i,
  /\b(wednesday|wed)\b/i,
  /\b(thursday|thu|thur|thurs)\b/i,
  /\b(friday|fri)\b/i,
  /\b(saturday|sat)\b/i,
  /\b(sunday|sun)\b/i,
];
function getDayIndex(item) {
  for (let i = 0; i < DAY_PATTERNS.length; i++) {
    if (DAY_PATTERNS[i].test(item)) return i;
  }
  return 999;
}

const MONTH_PATTERNS = [
  /\b(jan(?:uary)?)\b/i,
  /\b(feb(?:ruary)?)\b/i,
  /\b(mar(?:ch)?)\b/i,
  /\b(apr(?:il)?)\b/i,
  /\b(may)\b/i,
  /\b(jun(?:e)?)\b/i,
  /\b(jul(?:y)?)\b/i,
  /\b(aug(?:ust)?)\b/i,
  /\b(sep(?:t(?:ember)?)?)\b/i,
  /\b(oct(?:ober)?)\b/i,
  /\b(nov(?:ember)?)\b/i,
  /\b(dec(?:ember)?)\b/i,
];
function getMonthIndex(item) {
  for (let i = 0; i < MONTH_PATTERNS.length; i++) {
    if (MONTH_PATTERNS[i].test(item)) return i;
  }
  return 999;
}
function getDayNum(item) {
  const m = item.match(/\b(\d{1,2})\b/);
  return m ? parseInt(m[1], 10) : 999;
}

// Numeric sort: find first number-like token, handle K/M/G/m suffixes
function getNumericVal(item) {
  const m = item.match(/([+-]?\d+\.?\d*)\s*([KkMmGg]?)/);
  if (!m) return Infinity;
  let v = parseFloat(m[1]);
  switch (m[2]) {
    case 'k': case 'K': v *= 1e3; break;
    case 'M': v *= 1e6; break;
    case 'G': v *= 1e9; break;
    case 'm': v *= 1e-3; break;
  }
  return v;
}

// HREF: text after first >
function getHrefText(item) {
  const m = item.match(/>([^<]*)</);
  return m ? m[1].trim().toLowerCase() : item.toLowerCase();
}

// Email: domain (right of @)
function getEmailDomain(item) {
  const m = item.match(/@([\w.-]+)/);
  return m ? m[1].toLowerCase() : item.toLowerCase();
}

// Transpose: auto-detect delimiter among tab, comma, semicolon, hyphen, multi-space
function detectTransposeDelim(lines) {
  if (lines.some(l => l.includes('\t'))) return /\t/;
  if (lines.some(l => l.includes(';')))  return /;/;
  if (lines.some(l => l.includes(',')))  return /,/;
  if (lines.some(l => / {2,}/.test(l)))  return /\s{2,}/;
  return /\s+/;
}

// Addr sort: parse address blocks (blank-line separated), sort by last name of first line
function sortAddresses(text) {
  const blocks = text.split(/\n\s*\n/).map(b => b.trim()).filter(Boolean);
  blocks.sort((a, b) => {
    const lastA = getLastName(a.split('\n')[0]);
    const lastB = getLastName(b.split('\n')[0]);
    return collate(lastA, lastB);
  });
  return blocks.join('\n\n');
}

// Changing label counter (supports numbers and letters, wraps to AA, AB…)
function makeLabelCounter(type) {
  let n = 0;
  return () => {
    n++;
    if (type === 'number') return String(n);
    // Letter: 1=A, 26=Z, 27=AA …
    let r = '', x = n;
    while (x > 0) {
      x--;
      r = String.fromCharCode(65 + (x % 26)) + r;
      x = Math.floor(x / 26);
    }
    return r;
  };
}

// Fisher-Yates shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ── Get selection or all lines ─────────────────────────────────
function getSelectionLines() {
  const { selectionStart: ss, selectionEnd: se, value } = editor;
  if (ss === se) return null; // no selection
  // Expand to full lines
  const start = value.lastIndexOf('\n', ss - 1) + 1;
  const end   = value.indexOf('\n', se);
  const lineEnd = end === -1 ? value.length : end;
  return { start, end: lineEnd, text: value.slice(start, lineEnd) };
}

function applyLabelTransform(fn, label) {
  const sel = getSelectionLines();
  const prev = editor.value;
  pushUndo(prev, label || 'Add labels');
  if (sel) {
    const lines = sel.text.split('\n');
    const transformed = fn(lines).join('\n');
    editor.value = prev.slice(0, sel.start) + transformed + prev.slice(sel.end);
    editor.setSelectionRange(sel.start, sel.start + transformed.length);
  } else {
    const lines = editor.value.split('\n');
    editor.value = fn(lines).join('\n');
  }
  updateStats(); updateUndoButtons(); updateHistory();
}

// ── Label apply handlers ───────────────────────────────────────
el('btn-apply-changing-label').addEventListener('click', () => {
  const type    = document.querySelector('input[name="label-type"]:checked').value;
  const sepChar = el('label-sep').value;
  const pos     = document.querySelector('input[name="label-pos"]:checked').value;
  let n = 0;
  function nextLabel() {
    n++;
    if (type === 'number') return String(n);
    let r = '', x = n;
    while (x > 0) { x--; r = String.fromCharCode(65 + (x % 26)) + r; x = Math.floor(x / 26); }
    return r;
  }
  applyLabelTransform(lines => lines.map(line => {
    const lbl = nextLabel();
    return pos === 'prefix' ? lbl + sepChar + line : line + sepChar + lbl;
  }), 'Add labels');
  toast('Labels applied', 'ok');
});

el('btn-apply-static-label').addEventListener('click', () => {
  const labelText = el('label-static-text').value;
  const sepChar   = el('label-static-sep').value;
  const pos = document.querySelector('input[name="static-pos"]:checked').value;
  if (!labelText) { toast('Enter label text first', 'warn'); return; }
  applyLabelTransform(lines => lines.map(line =>
    pos === 'prefix' ? labelText + sepChar + line : line + sepChar + labelText
  ), 'Add labels');
  toast('Labels applied', 'ok');
});

// ── Prune ──────────────────────────────────────────────────────
el('btn-prune-start').addEventListener('click', () => {
  const trigger = el('prune-trigger').value;
  if (!trigger) { toast('Enter trigger text first', 'warn'); return; }
  applyItemTransform(items => items.map(item => {
    const idx = item.indexOf(trigger);
    return idx === -1 ? item : item.slice(idx + trigger.length);
  }), 'Prune from start');
  toast('Pruned from start', 'ok');
});
el('btn-prune-end').addEventListener('click', () => {
  const trigger = el('prune-trigger').value;
  if (!trigger) { toast('Enter trigger text first', 'warn'); return; }
  applyItemTransform(items => items.map(item => {
    const idx = item.indexOf(trigger);
    return idx === -1 ? item : item.slice(0, idx);
  }), 'Prune from end');
  toast('Pruned from end', 'ok');
});

// ── Replace ────────────────────────────────────────────────────
el('btn-replace').addEventListener('click', () => {
  const find = el('replace-find').value;
  const repl = el('replace-with').value;
  if (!find) { toast('Enter search text first', 'warn'); return; }
  const whole = el('replace-whole-word').checked;
  applyTransform(text => {
    if (whole) {
      const re = new RegExp('(?<![\\w])' + find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?![\\w])', 'g');
      return text.replace(re, repl);
    }
    return text.split(find).join(repl);
  }, 'Replace');
  toast('Replaced', 'ok');
});

// ── File ops ───────────────────────────────────────────────────
el('btn-load-file').addEventListener('click', () => el('file-input').click());
el('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pushUndo(editor.value, 'Load file');
    editor.value = ev.target.result;
    updateStats(); updateUndoButtons(); updateHistory();
    toast('Loaded: ' + file.name, 'ok');
  };
  reader.readAsText(file);
  e.target.value = '';
});

function saveFile() {
  const blob = new Blob([editor.value], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'list.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Saved', 'ok');
}
el('btn-save-file').addEventListener('click', saveFile);
el('btn-save-hdr').addEventListener('click', saveFile);
el('btn-print').addEventListener('click', () => window.print());

// ── All operation buttons ──────────────────────────────────────
document.querySelectorAll('.op-btn[data-op]').forEach(btn => {
  btn.addEventListener('click', () => runOp(btn.dataset.op));
});

function runOp(op) {
  switch (op) {

    case 'sort-az':
      applyItemTransform(items => [...items].sort(collate), 'Sort A→Z');
      break;
    case 'sort-za':
      applyItemTransform(items => [...items].sort((a,b) => collate(b,a)), 'Sort Z→A');
      break;
    case 'sort-names':
      applyItemTransform(items => [...items].sort((a,b) =>
        collate(getLastName(a), getLastName(b))
      ), 'Sort by last name');
      break;
    case 'sort-titles':
      applyItemTransform(items => [...items].sort((a,b) => {
        const clean = s => s.trim().replace(TITLE_IGNORE, '').toLowerCase();
        return collate(clean(a), clean(b));
      }), 'Sort by title');
      break;
    case 'sort-email':
      applyItemTransform(items => [...items].sort((a,b) =>
        collate(getEmailDomain(a), getEmailDomain(b))
      ), 'Sort by email domain');
      break;
    case 'sort-href':
      applyItemTransform(items => [...items].sort((a,b) =>
        collate(getHrefText(a), getHrefText(b))
      ), 'Sort by link text');
      break;
    case 'sort-ignore-first':
      applyItemTransform(items => [...items].sort((a,b) => {
        const rest = s => s.trim().split(/\s+/).slice(1).join(' ').toLowerCase();
        return collate(rest(a), rest(b));
      }), 'Sort, ignore 1st word');
      break;
    case 'sort-addresses':
      applyTransform(text => sortAddresses(text), 'Sort addresses');
      break;
    case 'sort-numeric':
      applyItemTransform(items => [...items].sort((a,b) =>
        getNumericVal(a) - getNumericVal(b)
      ), 'Sort numeric');
      break;
    case 'sort-dow':
      applyItemTransform(items => [...items].sort((a,b) =>
        getDayIndex(a) - getDayIndex(b)
      ), 'Sort by day');
      break;
    case 'sort-month':
      applyItemTransform(items => [...items].sort((a,b) => {
        const mi = getMonthIndex(a) - getMonthIndex(b);
        return mi !== 0 ? mi : getDayNum(a) - getDayNum(b);
      }), 'Sort by month');
      break;
    case 'sort-length':
      applyItemTransform(items => [...items].sort((a,b) => a.length - b.length), 'Sort by length');
      break;
    case 'sort-random':
      applyItemTransform(items => shuffle([...items]), 'Shuffle');
      break;
    case 'sort-reverse-list':
      applyItemTransform(items => [...items].reverse(), 'Reverse');
      break;

    case 'mirror-items':
      applyItemTransform(items => items.map(s => s.split('').reverse().join('')), 'Mirror items');
      break;
    case 'reverse-words':
      applyItemTransform(items => items.map(s => s.split(/(\s+)/).reverse().join('')), 'Reverse words');
      break;
    case 'transpose': {
      const lines = editor.value.split('\n').filter(l => l.trim() !== '');
      const delim = detectTransposeDelim(lines);
      const rows  = lines.map(l => l.split(delim));
      const cols  = Math.max(...rows.map(r => r.length));
      const result = [];
      for (let c = 0; c < cols; c++) {
        result.push(rows.map(r => (r[c] || '').trimEnd()).join('\t'));
      }
      pushUndo(editor.value, 'Transpose');
      editor.value = result.join('\n');
      updateStats(); updateUndoButtons(); updateHistory();
      break;
    }

    case 'case-lower':
      applyTransform(t => t.toLowerCase(), 'Lowercase');
      break;
    case 'case-upper':
      applyTransform(t => t.toUpperCase(), 'Uppercase');
      break;
    case 'case-title': {
      const skip = new Set(['a','an','the','and','but','for','nor','or','of','with','to','in','on','de','le','la','au']);
      applyTransform(t => t.replace(/\b\w+/g, (w, offset) => {
        if (offset > 0 && skip.has(w.toLowerCase())) return w.toLowerCase();
        return w[0].toUpperCase() + w.slice(1).toLowerCase();
      }), 'Title case');
      break;
    }
    case 'case-random':
      applyTransform(t => t.split('').map(c =>
        Math.random() < 0.5 ? c.toUpperCase() : c.toLowerCase()
      ).join(''), 'Random case');
      break;
    case 'case-capitalize':
      applyItemTransform(items => items.map(s =>
        s.length === 0 ? s : s[0].toUpperCase() + s.slice(1)
      ), 'Capitalize');
      break;

    case 'remove-dupes': {
      const seen = new Set();
      applyItemTransform(items => items.filter(item => {
        if (seen.has(item)) return false;
        seen.add(item); return true;
      }), 'Remove duplicates');
      break;
    }
    case 'trim-spaces':
      applyItemTransform(items => items.map(s => s.trim()), 'Trim spaces');
      break;
    case 'remove-whitespace':
      applyTransform(t => t.replace(/[ \t]+/g, ' ').replace(/\n{3,}/g, '\n\n').trim(), 'Remove extra whitespace');
      break;
    case 'remove-linebreaks':
      applyTransform(t => t.replace(/\n+/g, ' ').trim(), 'Remove line breaks');
      break;
    case 'remove-linebreaks-paras':
      applyTransform(t => {
        return t.split(/\n\s*\n/).map(para =>
          para.replace(/\n/g, ' ').trim()
        ).join('\n\n');
      }, 'Remove line breaks (keep paras)');
      break;
    case 'remove-nonalpha': {
      applyItemTransform(items => items.map(s =>
        s.replace(/[^A-Za-z0-9 ]/g, '')
      ), 'Remove non-alphanumeric');
      break;
    }

    default:
      toast('Unknown operation: ' + op, 'warn');
  }
}

// ── Live stats ─────────────────────────────────────────────────
editor.addEventListener('input', updateStats);

// ── Tab key → 2 spaces ────────────────────────────────────────
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ss = editor.selectionStart;
    const se = editor.selectionEnd;
    editor.value = editor.value.slice(0, ss) + '  ' + editor.value.slice(se);
    editor.selectionStart = editor.selectionEnd = ss + 2;
  }
});

  githubPath: 'list',
});
