<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mdweb</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #0f1117;
    --bg-sidebar:   #161b27;
    --bg-content:   #0f1117;
    --bg-hover:     #1e2535;
    --bg-active:    #1e3a5f;
    --border:       #232b3e;
    --border-light: #1e2535;

    --text:         #c9d1d9;
    --text-muted:   #6e7a8a;
    --text-dim:     #4a5568;
    --text-heading: #e6edf3;
    --text-link:    #58a6ff;

    --accent-blue:  #1f6feb;
    --accent-blue-h:#388bfd;
    --accent-green: #238636;

    /* file type accent colours */
    --ft-md:   #1f6feb;
    --ft-html: #238636;
    --ft-code: #9d4edd;
    --ft-text: #6e7a8a;

    --badge-psirt:  #3b1f6e;   --badge-psirt-t: #b388ff;
    --badge-appsec: #1a3d1f;   --badge-appsec-t:#4ade80;
    --badge-csirt:  #3d2600;   --badge-csirt-t: #fb923c;
    --badge-oss:    #0d3340;   --badge-oss-t:   #22d3ee;
    --badge-grey:   #1e2535;   --badge-grey-t:  #94a3b8;
    --badge-amber:  #3d2900;   --badge-amber-t: #fbbf24;
    --badge-blue:   #0d2340;   --badge-blue-t:  #58a6ff;
    --badge-green:  #0d2d14;   --badge-green-t: #4ade80;
    --badge-purple: #1e0d3d;   --badge-purple-t:#c084fc;

    --sidebar-w: 260px;
    --header-h:  48px;
    --toolbar-h: 42px;
    --radius:    6px;
    --font-mono: 'JetBrains Mono','Fira Code','Cascadia Code',ui-monospace,monospace;
    --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }

  html, body {
    height: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-sans); font-size: 14px; line-height: 1.5; overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    grid-template-rows: var(--header-h) 1fr;
    height: 100vh; width: 100vw;
  }

  /* ── Header ─────────────────────────────────────────────── */
  #header {
    grid-column: 1 / -1;
    display: flex; align-items: center; padding: 0 16px; gap: 12px;
    background: var(--bg-sidebar); border-bottom: 1px solid var(--border); z-index: 10;
  }
  #header-logo {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; font-weight: 600; color: var(--text-heading); letter-spacing: 0.01em;
  }
  #header-folder-name {
    font-size: 12px; color: var(--text-muted); background: var(--bg-hover);
    border: 1px solid var(--border); border-radius: var(--radius); padding: 2px 8px;
    font-family: var(--font-mono); max-width: 300px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: none;
  }
  #header-folder-name.visible { display: block; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  #sidebar {
    display: flex; flex-direction: column;
    background: var(--bg-sidebar); border-right: 1px solid var(--border); overflow: hidden;
  }
  #sidebar-tree-wrap {
    flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0 4px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #sidebar-tree-wrap::-webkit-scrollbar { width: 4px; }
  #sidebar-tree-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #sidebar-welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; gap: 16px; padding: 24px 20px;
  }
  #btn-open-welcome {
    display: flex; align-items: center; gap: 8px; background: var(--accent-blue);
    color: #fff; border: none; border-radius: var(--radius); padding: 10px 18px;
    font-size: 13px; font-weight: 600; cursor: pointer; width: 100%;
    justify-content: center; transition: background 0.15s;
  }
  #btn-open-welcome:hover { background: var(--accent-blue-h); }
  #sidebar-welcome-hint { font-size: 11px; color: var(--text-dim); text-align: center; line-height: 1.6; }

  #sidebar-bottom { border-top: 1px solid var(--border-light); padding: 8px 10px; flex-shrink: 0; display: none; }
  #sidebar-bottom.visible { display: flex; flex-direction: column; gap: 2px; }
  #btn-change-folder, #btn-refresh-tree, #btn-collapse-all, #btn-new-file {
    display: flex; align-items: center; gap: 6px; background: transparent; border: none;
    color: var(--text-dim); font-size: 11px; cursor: pointer; padding: 4px 6px;
    border-radius: 4px; width: 100%; transition: color 0.15s, background 0.15s;
  }
  #btn-change-folder:hover, #btn-refresh-tree:hover,
  #btn-collapse-all:hover, #btn-new-file:hover { color: var(--text-muted); background: var(--bg-hover); }

  /* ── Tree ─────────────────────────────────────────────────── */
  .tree-item {
    display: flex; align-items: center; cursor: pointer;
    border-radius: 4px; margin: 0 6px 1px; user-select: none; min-height: 26px;
  }
  .tree-item:hover  { background: var(--bg-hover); }
  .tree-item.active { background: var(--bg-active); }
  .tree-chevron {
    flex-shrink: 0; width: 16px; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); transition: transform 0.15s;
  }
  .tree-chevron.open { transform: rotate(90deg); }
  .tree-chevron-spacer { width: 16px; flex-shrink: 0; }
  .tree-icon { flex-shrink: 0; width: 16px; display: flex; align-items: center; justify-content: center; margin-right: 5px; }
  .tree-label {
    flex: 1; font-size: 12.5px; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 4px 6px 4px 0;
  }
  .tree-item.active .tree-label { color: var(--text-heading); }
  .tree-dir > .tree-label { color: var(--text-muted); font-size: 11.5px; letter-spacing: 0.02em; }
  .tree-children { display: none; }
  .tree-children.open { display: block; }
  .tree-dirty-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent-blue-h);
    flex-shrink: 0; margin-right: 6px; display: none;
  }
  .tree-item.has-unsaved .tree-dirty-dot { display: block; }
  .tree-item.drop-target {
    background: var(--bg-active) !important;
    outline: 1px solid var(--accent-blue);
    outline-offset: -1px;
  }

  /* ── Tree search bar ──────────────────────────────────────── */
  #tree-search {
    display: none; align-items: center; gap: 6px;
    padding: 6px 10px 6px 12px; border-bottom: 1px solid var(--border-light); flex-shrink: 0;
  }
  #tree-search.visible { display: flex; }
  #tree-search-icon { color: var(--text-dim); flex-shrink: 0; }
  #tree-search-input {
    flex: 1; background: var(--bg-hover); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 12px; padding: 4px 8px;
    font-family: var(--font-mono); outline: none; min-width: 0;
  }
  #tree-search-input:focus { border-color: var(--accent-blue); }
  #tree-search-input::placeholder { color: var(--text-dim); }
  #tree-search-clear {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 16px; padding: 0 2px; line-height: 1; display: none;
    transition: color 0.15s;
  }
  #tree-search-clear:hover { color: var(--text-muted); }
  #tree-search-clear.visible { display: block; }
  .tree-item[data-search-hidden] { display: none !important; }
  #tree-search-empty {
    display: none; padding: 12px 16px; font-size: 12px;
    color: var(--text-dim); text-align: center; font-style: italic;
  }
  #tree-search-empty.visible { display: block; }

  /* ── Content pane ─────────────────────────────────────────── */
  #content-pane {
    display: flex; flex-direction: column; overflow: hidden;
    background: var(--bg-content); min-width: 0;
  }

  /* ── Breadcrumb ───────────────────────────────────────────── */
  #breadcrumb {
    display: none; align-items: center; gap: 0; padding: 0 16px; height: 38px;
    flex-shrink: 0; border-bottom: 1px solid var(--border); background: var(--bg-sidebar);
    overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
  }
  #breadcrumb.visible { display: flex; }
  #breadcrumb::-webkit-scrollbar { display: none; }
  .crumb { font-size: 12px; color: var(--text-muted); white-space: nowrap; padding: 2px 4px; border-radius: 4px; cursor: default; }
  .crumb.clickable { cursor: pointer; color: var(--text-link); transition: background 0.12s, color 0.12s; }
  .crumb.clickable:hover { background: var(--bg-hover); color: var(--text-heading); }
  .crumb.current { color: var(--text); font-weight: 500; }
  .crumb-sep { color: var(--text-dim); font-size: 11px; padding: 0 1px; flex-shrink: 0; }
  .crumb-dirty { color: var(--accent-blue-h); font-size: 11px; margin-right: 2px; }

  /* ── Toolbar ──────────────────────────────────────────────── */
  #content-toolbar {
    display: none; align-items: center; justify-content: flex-end; gap: 6px;
    padding: 0 14px; height: var(--toolbar-h); border-bottom: 1px solid var(--border);
    background: var(--bg-sidebar); flex-shrink: 0;
  }
  #content-toolbar.visible { display: flex; }

  /* File-type badge in toolbar */
  #ft-badge {
    margin-right: auto;   /* push it to the left */
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 100px;
    letter-spacing: 0.04em; font-family: var(--font-mono); white-space: nowrap;
  }
  .ft-md     { background: var(--badge-blue);   color: var(--badge-blue-t); }
  .ft-html   { background: var(--badge-green);  color: var(--badge-green-t); }
  .ft-code   { background: var(--badge-purple); color: var(--badge-purple-t); }
  .ft-text   { background: var(--badge-grey);   color: var(--badge-grey-t); }

  .tb-toggle {
    display: flex; align-items: center; gap: 5px; background: var(--bg-hover);
    border: 1px solid var(--border); border-radius: 5px; color: var(--text-muted);
    font-size: 11.5px; font-family: var(--font-sans); padding: 4px 10px;
    cursor: pointer; height: 28px; white-space: nowrap;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .tb-toggle:hover { color: var(--text); background: var(--bg-active); }
  .tb-toggle.active { background: #0d2340; border-color: var(--accent-blue); color: var(--badge-blue-t); }
  #btn-reset-split.at-center { opacity: 0.35; cursor: default; }
  #btn-reset-split.at-center:hover { background: var(--bg-hover); color: var(--text-muted); }

  .tb-btn {
    display: flex; align-items: center; gap: 5px; border: 1px solid var(--border);
    border-radius: 5px; font-size: 11.5px; font-family: var(--font-sans); padding: 4px 10px;
    cursor: pointer; height: 28px; white-space: nowrap;
    transition: background 0.15s, border-color 0.15s, opacity 0.15s;
  }
  #btn-refresh { background: transparent; color: var(--text-muted); }
  #btn-refresh:hover { background: var(--bg-hover); color: var(--text); }
  #btn-refresh.refreshed { color: var(--accent-green); border-color: var(--accent-green); }
  #btn-edit   { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
  #btn-edit:hover { background: var(--accent-blue-h); border-color: var(--accent-blue-h); }
  #btn-cancel { background: transparent; color: var(--text-muted); }
  #btn-cancel:hover { background: var(--bg-hover); color: var(--text); }
  #btn-save   { background: var(--bg-hover); border-color: var(--border); color: var(--text-dim); cursor: default; }
  #btn-save.dirty { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; cursor: pointer; }
  #btn-save.dirty:hover { background: var(--accent-blue-h); border-color: var(--accent-blue-h); }
  #btn-save.saving { opacity: 0.6; cursor: default; }

  #perm-msg {
    display: none; align-items: center; gap: 8px; font-size: 12px;
    color: var(--badge-amber-t); background: var(--badge-amber); border-radius: 4px; padding: 4px 10px;
  }
  #perm-msg.visible { display: flex; }
  .tb-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }

  /* ── Toast notification ───────────────────────────────────── */
  #toast {
    position: fixed; top: 16px; right: 16px; z-index: 2000;
    background: var(--bg-sidebar); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 16px;
    font-size: 12.5px; color: var(--text);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(-8px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none; max-width: 300px; line-height: 1.4;
  }
  #toast.visible {
    opacity: 1; transform: translateY(0);
    pointer-events: auto;
  }
  #toast.toast-error { border-color: #f85149; color: #f85149; }
  #toast.toast-warn  { border-color: var(--badge-amber-t); color: var(--badge-amber-t); }
  #toast.toast-ok    { border-color: var(--accent-green); color: #4ade80; }

  /* ── OS folder drop overlay ───────────────────────────────── */
  #drop-overlay {
    position: fixed; inset: 0; z-index: 1500;
    background: rgba(31, 111, 235, 0.07);
    border: 2px dashed var(--accent-blue);
    border-radius: 10px; margin: 8px;
    display: none; align-items: center; justify-content: center;
    pointer-events: none;
  }
  #drop-overlay.active { display: flex; }
  #drop-overlay-label {
    background: var(--bg-sidebar); border: 1px solid var(--accent-blue);
    border-radius: var(--radius); padding: 14px 28px;
    color: var(--badge-blue-t); font-size: 14px; font-weight: 600;
    display: flex; align-items: center; gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* ── Meta strip ───────────────────────────────────────────── */
  #meta-strip {
    display: none; flex-wrap: wrap; align-items: center; gap: 6px;
    padding: 10px 40px 0; flex-shrink: 0;
  }
  #meta-strip.visible { display: flex; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 100px; white-space: nowrap;
    letter-spacing: 0.02em; font-family: var(--font-mono);
  }
  .badge-blue   { background: var(--badge-blue);  color: var(--badge-blue-t); }
  .badge-grey   { background: var(--badge-grey);  color: var(--badge-grey-t); }
  .badge-psirt  { background: var(--badge-psirt); color: var(--badge-psirt-t); }
  .badge-appsec { background: var(--badge-appsec);color: var(--badge-appsec-t); }
  .badge-csirt  { background: var(--badge-csirt); color: var(--badge-csirt-t); }
  .badge-oss    { background: var(--badge-oss);   color: var(--badge-oss-t); }
  .badge-date   { background: transparent; color: var(--text-dim); font-weight: 400; font-family: var(--font-sans); font-size: 11px; padding: 2px 4px; }
  .badge-precedence {
    background: var(--badge-amber); color: var(--badge-amber-t); font-family: var(--font-sans);
    font-weight: 500; font-size: 11px; border-radius: 4px; padding: 3px 8px;
    max-width: 100%; white-space: normal; line-height: 1.4;
  }

  /* ── Reader ───────────────────────────────────────────────── */
  #reader {
    display: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 28px 40px 80px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #reader::-webkit-scrollbar { width: 6px; }
  #reader::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #reader-inner { max-width: 820px; margin: 0 auto; }

  /* Code/text view inside reader — for non-markdown files */
  .code-view {
    font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
    color: var(--text); background: var(--bg-sidebar); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px;
    overflow-x: auto; tab-size: 2;
    /* wrap toggled by js */
    white-space: pre-wrap; overflow-wrap: break-word;
  }
  .code-view.nowrap { white-space: pre; overflow-wrap: normal; }

  /* HTML iframe view */
  .html-view {
    width: 100%; height: 100%; border: none; background: #fff;
    border-radius: var(--radius);
  }
  .html-view-wrap {
    width: 100%; height: 100%;
    border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
  }
  /* when reader contains an html-view-wrap, remove reader padding */
  #reader.html-mode { padding: 16px; }

  /* ── Prism overrides (dark theme) ─────────────────────────── */
  pre[class*="language-"], code[class*="language-"] {
    background: transparent !important;
    color: var(--text) !important;
    font-family: var(--font-mono) !important;
    font-size: 13px !important;
    text-shadow: none !important;
  }
  .token.comment, .token.prolog, .token.doctype, .token.cdata { color: #6e7a8a; }
  .token.punctuation { color: #94a3b8; }
  .token.property, .token.tag, .token.boolean, .token.number, .token.constant, .token.symbol { color: #79c0ff; }
  .token.selector, .token.attr-name, .token.string, .token.char, .token.builtin { color: #a5d6ff; }
  .token.operator, .token.entity, .token.url, .token.variable { color: #e6b8a2; }
  .token.atrule, .token.attr-value, .token.keyword { color: #ff7b72; }
  .token.function, .token.class-name { color: #d2a8ff; }
  .token.regex, .token.important { color: #ffa657; }

  /* ── Folder card view ─────────────────────────────────────── */
  #folder-view {
    display: none; flex: 1; overflow-y: auto; overflow-x: hidden; padding: 32px 40px 80px;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #folder-view::-webkit-scrollbar { width: 6px; }
  #folder-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #folder-view.visible { display: block; }

  .folder-view-heading { font-size: 11px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 12px; }
  .folder-view-section { margin-bottom: 36px; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }

  .card-dir {
    display: flex; align-items: center; gap: 12px; background: var(--bg-sidebar);
    border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
    cursor: pointer; user-select: none; transition: border-color 0.15s, background 0.15s;
  }
  .card-dir:hover { border-color: var(--accent-blue); background: var(--bg-hover); }
  .card-dir-icon { flex-shrink: 0; width: 32px; height: 32px; background: #1a2540; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
  .card-dir-body { min-width: 0; }
  .card-dir-name { font-size: 13px; font-weight: 600; color: var(--text-heading); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-dir-count { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  .card-file {
    display: flex; flex-direction: column; gap: 8px; background: var(--bg-sidebar);
    border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
    cursor: pointer; user-select: none; transition: border-color 0.15s, background 0.15s; min-height: 90px;
  }
  .card-file:hover { border-color: var(--text-link); background: var(--bg-hover); }
  .card-file-header { display: flex; align-items: flex-start; gap: 8px; }
  .card-file-icon { flex-shrink: 0; margin-top: 2px; width: 16px; height: 16px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
  .card-file-name { font-size: 13px; font-weight: 600; color: var(--text-heading); line-height: 1.3; word-break: break-word; }
  .card-file-ext { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: auto; flex-shrink: 0; font-family: var(--font-mono); letter-spacing: 0.04em; align-self: flex-start; }
  .card-file-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }
  .card-file-snippet { font-size: 11.5px; color: var(--text-dim); line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

  /* ── Edit area ────────────────────────────────────────────── */
  #edit-area { display: none; flex: 1; overflow: hidden; min-height: 0; }
  #edit-area.visible { display: flex; }

  #editor-pane { display: flex; flex-direction: column; overflow: hidden; min-width: 0; flex: 1; }
  #editor {
    flex: 1; width: 100%; background: var(--bg); color: var(--text);
    font-family: var(--font-mono); font-size: 13px; line-height: 1.7;
    border: none; outline: none; resize: none; padding: 28px 32px; tab-size: 2;
    white-space: pre-wrap; overflow-wrap: break-word; overflow-y: auto; overflow-x: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #editor::-webkit-scrollbar { width: 6px; }
  #editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #editor.nowrap { white-space: pre; overflow-wrap: normal; overflow-x: auto; }

  #split-divider {
    flex-shrink: 0; width: 5px; background: var(--border);
    cursor: col-resize; transition: background 0.15s; position: relative; z-index: 2;
  }
  #split-divider:hover, #split-divider.dragging { background: var(--accent-blue); }

  #preview-pane {
    display: none; flex-direction: column; overflow-y: auto; overflow-x: hidden;
    padding: 28px 40px 80px; min-width: 0; background: var(--bg-content);
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #preview-pane::-webkit-scrollbar { width: 6px; }
  #preview-pane::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  #preview-pane.visible { display: flex; }
  #preview-pane.nowrap { overflow-x: auto; }
  /* html preview in split pane — no padding, full height iframe */
  #preview-pane.html-mode { padding: 0; overflow: hidden; }
  #preview-pane.html-mode #preview-inner { max-width: none; margin: 0; width: 100%; height: 100%; }
  #preview-inner { max-width: 820px; margin: 0 auto; width: 100%; overflow-wrap: break-word; word-break: break-word; }
  #preview-pane.nowrap #preview-inner { max-width: none; overflow-wrap: normal; word-break: normal; white-space: nowrap; }

  /* ── Prose styles (markdown render) ──────────────────────── */
  .md h1 { font-size: 26px; font-weight: 700; color: var(--text-heading); margin: 24px 0 16px; letter-spacing: -0.02em; border-bottom: 1px solid var(--border); padding-bottom: 12px; line-height: 1.25; }
  .md h2 { font-size: 18px; font-weight: 600; color: var(--text-heading); margin: 32px 0 12px; letter-spacing: -0.01em; }
  .md h3 { font-size: 15px; font-weight: 600; color: var(--text-heading); margin: 24px 0 8px; }
  .md h4 { font-size: 13px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin: 20px 0 8px; }
  .md p  { font-size: 14px; line-height: 1.8; color: var(--text); margin: 0 0 14px; }
  .md > p:first-child { margin-top: 0; }
  .md a  { color: var(--text-link); text-decoration: none; }
  .md a:hover { text-decoration: underline; }
  .md ul, .md ol { padding-left: 22px; margin: 0 0 14px; }
  .md li { font-size: 14px; line-height: 1.75; color: var(--text); margin-bottom: 3px; }
  .md li > ul, .md li > ol { margin: 4px 0 4px; }
  .md ul.contains-task-list { list-style: none; padding-left: 4px; }
  .md li.task-list-item { display: flex; align-items: flex-start; gap: 8px; }
  .md li.task-list-item input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 14px; height: 14px; border: 1px solid var(--text-dim); border-radius: 3px; background: transparent; flex-shrink: 0; margin-top: 4px; cursor: default; }
  .md li.task-list-item input[type="checkbox"]:checked { background: var(--accent-green); border-color: var(--accent-green); background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 10 8' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 4l3 3 5-6' stroke='white' stroke-width='1.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: center; background-size: 70%; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }
  .md blockquote { border-left: 3px solid var(--border); padding: 8px 16px; margin: 0 0 14px; color: var(--text-muted); font-style: italic; }
  .md code { font-family: var(--font-mono); font-size: 12.5px; background: var(--bg-hover); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; color: #e6b8a2; }
  .md pre { background: var(--bg-sidebar); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; overflow-x: auto; margin: 0 0 16px; scrollbar-width: thin; }
  .md pre code { background: transparent; border: none; padding: 0; font-size: 12.5px; color: var(--text); white-space: pre; }
  .md table { width: 100%; border-collapse: collapse; margin: 0 0 20px; font-size: 13px; }
  .md thead { background: var(--bg-sidebar); }
  .md th { text-align: left; font-weight: 600; color: var(--text-muted); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.04em; padding: 8px 12px; border-bottom: 2px solid var(--border); }
  .md td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); color: var(--text); vertical-align: top; line-height: 1.6; }
  .md tr:last-child td { border-bottom: none; }
  .md tbody tr:hover { background: var(--bg-hover); }
  .md td code { font-size: 11.5px; }
  .md strong { color: var(--text-heading); font-weight: 600; }
  .md em { font-style: italic; color: var(--text-muted); }

  /* ── Welcome ──────────────────────────────────────────────── */
  #welcome-content {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 20px; padding: 40px; text-align: center;
  }
  #welcome-content h1 { font-size: 22px; font-weight: 600; color: var(--text-heading); letter-spacing: -0.01em; }
  #welcome-content p  { font-size: 14px; color: var(--text-muted); max-width: 380px; line-height: 1.7; }
  .arrow-hint { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }

  .state-msg { text-align: center; color: var(--text-dim); font-size: 13px; padding: 60px 20px; }

  /* ── File type filter bar ─────────────────────────────────── */
  #tree-filter {
    display: none; flex-direction: column; gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg-sidebar);
    flex-shrink: 0;
  }
  #tree-filter.visible { display: flex; }

  #filter-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px 4px;
    cursor: pointer; user-select: none;
  }
  #filter-header-label {
    font-size: 10px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.07em;
    display: flex; align-items: center; gap: 5px;
  }
  #filter-active-count {
    font-size: 10px; color: var(--accent-blue-h);
    font-weight: 700; display: none;
  }
  #filter-active-count.visible { display: inline; }
  #filter-chevron {
    color: var(--text-dim); transition: transform 0.15s; flex-shrink: 0;
  }
  #filter-chevron.open { transform: rotate(180deg); }

  #filter-body {
    display: none; padding: 0 8px 8px; flex-direction: column; gap: 1px;
  }
  #filter-body.open { display: flex; }

  .filter-row {
    display: flex; align-items: center; gap: 7px;
    padding: 3px 4px; border-radius: 4px; cursor: pointer;
    user-select: none; transition: background 0.12s;
  }
  .filter-row:hover { background: var(--bg-hover); }

  .filter-check {
    width: 13px; height: 13px; flex-shrink: 0;
    border: 1px solid var(--text-dim); border-radius: 3px;
    background: transparent; display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .filter-check.checked { border-color: transparent; }
  .filter-check svg { display: none; }
  .filter-check.checked svg { display: block; }

  .filter-dot { flex-shrink: 0; }
  .filter-label { font-size: 11.5px; color: var(--text-muted); flex: 1; }
  .filter-count { font-size: 10px; color: var(--text-dim); font-family: var(--font-mono); }

  /* per-category check colours */
  .filter-check.cat-markdown.checked  { background: var(--ft-md); }
  .filter-check.cat-html.checked      { background: var(--ft-html); }
  .filter-check.cat-code.checked      { background: var(--ft-code); }
  .filter-check.cat-text.checked      { background: var(--ft-text); }
  .filter-check.cat-viewable.checked  { background: #0891b2; }
  .filter-check.cat-unsupported.checked { background: #374151; }

  /* tree items hidden by filter */
  .tree-file[data-cat-hidden] { display: none; }

  /* ── New badge/dot colours ────────────────────────────────── */
  --ft-view: #0891b2;
  .ft-view { background: #0d2d3d; color: #22d3ee; }
  .ft-unsupported { background: var(--badge-grey); color: var(--text-dim); opacity: 0.6; }

  /* tree dot for viewable / unsupported */
  /* colours applied inline in JS */

  /* ── Viewable file viewer (images, video, audio, pdf) ─────── */
  #viewer-area {
    display: none; flex: 1; overflow: hidden; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--bg-content); padding: 20px;
  }
  #viewer-area.visible { display: flex; }

  #viewer-area img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; border-radius: var(--radius);
    border: 1px solid var(--border);
  }
  #viewer-area video, #viewer-area audio {
    max-width: 100%; border-radius: var(--radius);
  }
  #viewer-area iframe.pdf-view {
    width: 100%; height: 100%; border: none; border-radius: var(--radius);
  }

  /* ── Unsupported / no-edit notice ─────────────────────────── */
  .notice-pane {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 60px 40px; text-align: center; flex: 1;
  }
  .notice-pane-icon { font-size: 32px; opacity: 0.35; }
  .notice-pane-title { font-size: 15px; font-weight: 600; color: var(--text-heading); }
  .notice-pane-sub { font-size: 13px; color: var(--text-dim); max-width: 340px; line-height: 1.7; }
</style>
</head>
<body>
<div id="app">

  <header id="header">
    <div id="header-logo">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="6" rx="1" fill="#58a6ff" opacity="0.8"/>
        <rect x="9" y="1" width="6" height="6" rx="1" fill="#58a6ff" opacity="0.5"/>
        <rect x="1" y="9" width="6" height="6" rx="1" fill="#58a6ff" opacity="0.5"/>
        <rect x="9" y="9" width="6" height="6" rx="1" fill="#58a6ff" opacity="0.3"/>

      mdweb
    </div>
    <span id="header-folder-name"></span>
  </header>

  <aside id="sidebar">
    <div id="sidebar-welcome">
      <button id="btn-open-welcome">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C8.17 3.71 8.692 4 9.5 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5z"/></svg>
        Open Folder
      </button>
      <p id="sidebar-welcome-hint">Select a folder containing<br>text files to begin</p>
    </div>
    <!-- File type filter (shown after folder load) -->
    <div id="tree-filter">
      <div id="filter-header">
        <span id="filter-header-label">
          <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M6 10.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7a.5.5 0 0 1-.5-.5m-2-3a.5.5 0 0 1 .5-.5h11a.5.5 0 0 1 0 1h-11a.5.5 0 0 1-.5-.5"/></svg>
          Filter
          <span id="filter-active-count"></span>
        </span>
        <svg id="filter-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div id="filter-body"></div>
    </div>

    <div id="tree-search">
      <svg id="tree-search-icon" width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.099zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/></svg>

      <button id="tree-search-clear" title="Clear search">×</button>
    </div>
    <div id="sidebar-tree-wrap" style="display:none"></div>
    <div id="tree-search-empty">No files match</div>
    <div id="sidebar-bottom">
      <button id="btn-refresh-tree" title="Refresh file tree">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/></svg>
        Refresh tree
      </button>
      <button id="btn-collapse-all" title="Collapse all folders">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1 4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1zm5 0a1 1 0 0 1 1-1h7a1 1 0 1 1 0 2H7a1 1 0 0 1-1-1zm0 5a1 1 0 0 1 1-1h7a1 1 0 1 1 0 2H7a1 1 0 0 1-1-1zm-5 0a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1z"/></svg>
        <span class="tree-btn-label">Collapse all</span>
      </button>
      <button id="btn-new-file" title="Create new file in current folder">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2"/></svg>
        New file
      </button>
      <button id="btn-change-folder">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h2.764c.958 0 1.76.56 2.311 1.184C8.17 3.71 8.692 4 9.5 4H13.5A1.5 1.5 0 0 1 15 5.5v7a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 12.5z"/></svg>
        Change folder
      </button>
    </div>
  </aside>

  <main id="content-pane">

    <div id="welcome-content">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" style="opacity:0.25">
        <rect x="4" y="4" width="18" height="18" rx="3" fill="#58a6ff"/>
        <rect x="26" y="4" width="18" height="18" rx="3" fill="#58a6ff" opacity="0.6"/>
        <rect x="4" y="26" width="18" height="18" rx="3" fill="#58a6ff" opacity="0.6"/>
        <rect x="26" y="26" width="18" height="18" rx="3" fill="#58a6ff" opacity="0.3"/>
      </svg>
      <h1>mdweb</h1>
      <p>Open a folder to browse and read its text files. Use the button in the sidebar to get started.</p>
      <div class="arrow-hint">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="#4a5568"><path d="M9.5 2a.5.5 0 0 1 .5.5v11a.5.5 0 0 1-.854.354L5.5 9.707V14.5a.5.5 0 0 1-1 0V2a.5.5 0 0 1 1 0v4.793l3.646-3.647A.5.5 0 0 1 9.5 2z"/></svg>
        <span style="color:var(--text-dim);font-size:12px;">Click "Open Folder" in the sidebar</span>
      </div>
    </div>

    <nav id="breadcrumb"></nav>

    <div id="content-toolbar">
      <!-- file type badge — left side -->
      <span id="ft-badge"></span>
      <!-- toggles -->
      <button class="tb-toggle" id="btn-wrap" title="Toggle line wrap">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M0 3.5A.5.5 0 0 1 .5 3h15a.5.5 0 0 1 0 1H.5a.5.5 0 0 1-.5-.5zm0 4A.5.5 0 0 1 .5 7h15a.5.5 0 0 1 0 1H.5a.5.5 0 0 1-.5-.5zm0 4a.5.5 0 0 1 .5-.5h9a.5.5 0 0 1 0 1h-9a.5.5 0 0 1-.5-.5zm10.5-.5a.5.5 0 0 0 0 1h.5a2 2 0 1 0 0-4h-2v-1a.5.5 0 0 0-1 0v3.5a.5.5 0 0 0 1 0V12h2a1 1 0 1 1 0 2h-.5z"/></svg>
        Wrap

      <button class="tb-toggle" id="btn-split" title="Toggle split view">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M0 3a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm7.5-1v12H14a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1zM6.5 2H2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h4.5z"/></svg>
        Split
      </button>
      <button class="tb-toggle" id="btn-reset-split" title="Reset split to 50/50" style="display:none">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/></svg>
        50/50
      </button>
      <button class="tb-btn" id="btn-reveal" title="Reveal current file in sidebar" style="display:none">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5M.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5m15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5"/><path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm8-9a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/></svg>
        Reveal
      </button>
      <div class="tb-sep"></div>
      <button class="tb-btn" id="btn-refresh" title="Reload file from disk">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2z"/><path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466"/></svg>
        Reload

      <button class="tb-btn" id="btn-edit">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708zm.646 6.061L9.793 2.5 3.293 9H3.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.207zm-7.468 7.468A.5.5 0 0 1 6 13.5V13h-.5a.5.5 0 0 1-.5-.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.5-.5V10h-.5a.5.5 0 0 1-.175-.032l-.179.178a.5.5 0 0 0-.11.168l-2 5a.5.5 0 0 0 .65.65l5-2a.5.5 0 0 0 .168-.11z"/></svg>
        Edit
      </button>
      <button class="tb-btn" id="btn-cancel" style="display:none">Cancel</button>
      <button class="tb-btn" id="btn-save" style="display:none">
        <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor"><path d="M2 1a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1H9.5a1 1 0 0 0-1 1v7.293l2.646-2.647a.5.5 0 0 1 .708.708l-3.5 3.5a.5.5 0 0 1-.708 0l-3.5-3.5a.5.5 0 1 1 .708-.708L7.5 9.293V2a2 2 0 0 1 2-2H14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2h2.5a.5.5 0 0 1 0 1z"/></svg>
        Save
      </button>
      <div id="perm-msg">⚠ Write access denied — grant folder permission to edit</div>
    </div>

    <div id="meta-strip"></div>
    <div id="reader"><div id="reader-inner" class="md"></div></div>
    <div id="folder-view"></div>
    <!-- Viewable files (image / video / audio / pdf) -->
    <div id="viewer-area"></div>
    <div id="edit-area">
      <div id="editor-pane">
        <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <div id="split-divider"></div>
      <div id="preview-pane"><div id="preview-inner" class="md"></div></div>
    </div>

  </main>
</div>

<!-- Prism.js for syntax highlighting -->
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
<!-- marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

<script>
'use strict';

// ── File type detection ───────────────────────────────────────────────────────
// Returns { category, lang, label, badgeClass }
// category: 'markdown' | 'html' | 'code' | 'text' | 'viewable' | 'unsupported'
const FILE_TYPES = {
  // Markdown
  md:         { category: 'markdown', lang: null,         label: 'Markdown',   badgeClass: 'ft-md' },
  mdx:        { category: 'markdown', lang: null,         label: 'MDX',        badgeClass: 'ft-md' },
  markdown:   { category: 'markdown', lang: null,         label: 'Markdown',   badgeClass: 'ft-md' },
  // HTML / markup
  html:       { category: 'html',     lang: 'html',       label: 'HTML',       badgeClass: 'ft-html' },
  htm:        { category: 'html',     lang: 'html',       label: 'HTML',       badgeClass: 'ft-html' },
  svg:        { category: 'html',     lang: 'svg',        label: 'SVG',        badgeClass: 'ft-html' },

// Extension sets for quick lookup
const TEXT_EXTENSIONS     = new Set(Object.keys(FILE_TYPES));
const VIEWABLE_EXTENSIONS = new Set(Object.keys(VIEWABLE_TYPES));

// Known extensionless filenames to treat as text
const NO_EXT_NAMES = new Set(['LICENSE', 'LICENCE', 'Dockerfile', 'Makefile', 'makefile', 'NOTICE', 'AUTHORS', 'CONTRIBUTING', 'CHANGELOG', 'CHANGES', 'TODO', 'FIXME', 'INSTALL', 'COPYING', 'README']);

function getExt(filename) {
  const dot = filename.lastIndexOf('.');
  return dot < 0 ? '' : filename.slice(dot + 1).toLowerCase();
}

// Returns a type object for any file. Never returns null.
function getFileType(filename) {
  // Exact name matches (Dockerfile, LICENSE, etc.)
  if (NO_EXT_NAMES.has(filename)) {
    const lower = filename.toLowerCase();
    return FILE_TYPES[lower] || { category: 'text', lang: null, label: filename, badgeClass: 'ft-text' };
  }
  const ext = getExt(filename);
  if (!ext) return { category: 'unsupported', label: 'File', badgeClass: 'ft-unsupported' };
  if (FILE_TYPES[ext])     return FILE_TYPES[ext];
  if (VIEWABLE_TYPES[ext]) return VIEWABLE_TYPES[ext];
  return { category: 'unsupported', label: ext.toUpperCase(), badgeClass: 'ft-unsupported' };
}

// Returns true for text-renderable files only (used for internal link interception)
function isReadable(filename) {
  if (NO_EXT_NAMES.has(filename)) return true;
  const ext = getExt(filename);
  return TEXT_EXTENSIONS.has(ext);
}

function stripExt(filename) {
  // Keep full filename in label for non-md types; strip .md for markdown
  const ft = getFileType(filename);
  if (ft && ft.category === 'markdown') return filename.replace(/\.[^.]+$/, '');
  return filename;
}

// ── OS folder drag-and-drop ───────────────────────────────────────────────────
// dragDepth tracks nested dragenter/dragleave events to prevent overlay flicker.
let _dragDepth = 0;

document.addEventListener('dragenter', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  _dragDepth++;
  dropOverlay.classList.add('active');
  e.preventDefault();
});

document.addEventListener('dragover', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

document.addEventListener('dragleave', () => {
  _dragDepth--;
  if (_dragDepth <= 0) { _dragDepth = 0; dropOverlay.classList.remove('active'); }
});

document.addEventListener('drop', async e => {
  e.preventDefault();
  _dragDepth = 0;
  dropOverlay.classList.remove('active');

  // Ignore internal tree drag-and-drop (those items have our custom type set).
  if (e.dataTransfer.types.includes('text/x-mdweb-src')) return;

  const items = e.dataTransfer.items ? [...e.dataTransfer.items] : [];
  if (!items.length) return;

  // Only process the first item
  const item = items[0];
  if (typeof item.getAsFileSystemHandle !== 'function') {
    showToast('Folder drag requires Chrome or Edge.', { type: 'error' });
    return;
  }

  let handle;
  try {
    handle = await item.getAsFileSystemHandle();
  } catch (err) {
    showToast('Could not access the dropped item.', { type: 'error' });
    return;
  }

  if (handle.kind !== 'directory') {
    showToast('Drop a folder, not a file.', { type: 'warn' });
    return;
  }

  if (state.dirty && !confirmDiscard()) return;
  await loadFolder(handle);
});

// ── Reveal active file in sidebar tree ───────────────────────────────────────
function revealInTree(path) {
  if (!path) return;
  // Expand every ancestor directory from root down to the file's parent.
  const parts = path.split('/');
  parts.slice(0, -1).forEach((_, i) => {
    const dirPath = parts.slice(0, i + 1).join('/');
    const dirRow  = sidebarTreeWrap.querySelector(`.tree-dir[data-path="${CSS.escape(dirPath)}"]`);
    if (!dirRow) return;
    const children = dirRow.parentElement && dirRow.parentElement.querySelector('.tree-children');
    const chevron  = dirRow.querySelector('.tree-chevron');
    if (children && !children.classList.contains('open')) {
      children.classList.add('open');
      if (chevron) chevron.classList.add('open');
    }
  });
  // If tree was marked collapsed, it's now at least partially open.
  state.treeCollapsed = false;
  updateCollapseBtn();
  // Scroll the file row into view.
  const fileRow = sidebarTreeWrap.querySelector(`.tree-file[data-path="${CSS.escape(path)}"]`);
  if (fileRow) fileRow.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

btnReveal.addEventListener('click', () => revealInTree(state.currentPath));

// ── New file ──────────────────────────────────────────────────────────────────
async function createNewFile() {
  if (!state.rootHandle) return;

  // Determine target directory: prefer current dir view, else parent of open file.
  let targetDirPath = '';
  if (state.currentDirPath !== null && state.currentDirPath !== undefined) {
    targetDirPath = state.currentDirPath;
  } else if (state.currentPath) {
    targetDirPath = state.currentPath.includes('/')
      ? state.currentPath.split('/').slice(0, -1).join('/')
      : '';
  }

  const dirLabel = targetDirPath === '' ? state.rootName : targetDirPath.split('/').pop();
  const name = prompt(`New file name in "${dirLabel}":`);
  if (!name || !name.trim()) return;
  const trimmed = name.trim();

  // Validate: no path separators, no leading dot.
  if (trimmed.includes('/') || trimmed.includes('\\') || trimmed.startsWith('.')) {
    showToast('Invalid file name.', { type: 'warn' });
    return;
  }

  // Ensure write permission.
  if (!state.writePermission) {
    const perm = await state.rootHandle.requestPermission({ mode: 'readwrite' });
    if (perm !== 'granted') { showPermDenied(); return; }
    state.writePermission = true;
  }

  try {
    const dirHandle  = getDirHandle(targetDirPath);
    const fileHandle = await dirHandle.getFileHandle(trimmed, { create: true });
    const writable   = await fileHandle.createWritable();
    await writable.write('');
    await writable.close();

    const newPath = targetDirPath ? `${targetDirPath}/${trimmed}` : trimmed;
    await refreshTree();
    openFile(newPath);
    showToast(`Created "${trimmed}".`, { type: 'ok', duration: 3000 });
  } catch (err) {
    showToast(`Could not create file: ${err.message}`, { type: 'error', duration: 8000 });
  }
}

btnNewFile.addEventListener('click', createNewFile);

// ── Tree search / find file ───────────────────────────────────────────────────
function filterTree(query) {
  const q = query.trim().toLowerCase();

  // Toggle the clear button visibility.
  treeSearchClear.classList.toggle('visible', q.length > 0);

  if (!q) {
    // Clear: remove all search-hidden attributes from files and dirs.
    sidebarTreeWrap.querySelectorAll('[data-search-hidden]')
      .forEach(el => el.removeAttribute('data-search-hidden'));
    // Re-collapse any dirs that were force-opened by the search.
    sidebarTreeWrap.querySelectorAll('.tree-children[data-search-opened]').forEach(c => {
      c.removeAttribute('data-search-opened');
      c.classList.remove('open');
      const row = c.parentElement && c.parentElement.querySelector('.tree-dir');
      if (row) { const chev = row.querySelector('.tree-chevron'); if (chev) chev.classList.remove('open'); }
    });
    treeSearchEmpty.classList.remove('visible');
    return;
  }

  // First pass: mark file rows as hidden or visible.
  sidebarTreeWrap.querySelectorAll('.tree-file').forEach(row => {
    const path = (row.dataset.path || '').toLowerCase();
    const matches = path.includes(q);
    row.toggleAttribute('data-search-hidden', !matches);
  });

  // Second pass: for each dir, determine whether any descendant file matches.
  // Process deepest dirs first by reversing the NodeList.
  const dirWraps = [...sidebarTreeWrap.querySelectorAll('.tree-dir')].reverse();
  dirWraps.forEach(row => {
    const wrap     = row.parentElement;
    const children = wrap && wrap.querySelector('.tree-children');
    if (!children) return;

    // A dir is visible if it has at least one visible file or visible sub-dir descendant.
    const hasVisibleFile = children.querySelector('.tree-file:not([data-search-hidden])');
    const hasVisibleDir  = children.querySelector('.tree-dir:not([data-search-hidden])');
    const hasMatch = hasVisibleFile || hasVisibleDir;

    row.toggleAttribute('data-search-hidden', !hasMatch);

    if (hasMatch && !children.classList.contains('open')) {
      children.classList.add('open');
      children.setAttribute('data-search-opened', '');
      const chev = row.querySelector('.tree-chevron');
      if (chev) chev.classList.add('open');
    }
  });

  // Show empty state if nothing at all matched.
  const anyVisible = sidebarTreeWrap.querySelector('.tree-file:not([data-search-hidden])');
  treeSearchEmpty.classList.toggle('visible', !anyVisible);
}

treeSearchInput.addEventListener('input', e => filterTree(e.target.value));
