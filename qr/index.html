<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QR Code Generator · tools.bluejar.org</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg-sidebar:#161b27;--bg-input:#1c2232;--bg-hover:#1f2637;
  --border:#2a3448;--border-light:#1e2a3d;
  --accent:#1f6feb;--accent-h:#388bfd;
  --text:#c9d1d9;--text-dim:#6e7681;--text-heading:#e6edf3;
  --font-mono:'JetBrains Mono','Fira Mono','Cascadia Code',monospace;
  --font-ui:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --hdr:44px;--sw:290px;--stbar:28px;--r:6px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:13px}
#app{display:grid;grid-template-columns:var(--sw) 1fr;grid-template-rows:var(--hdr) 1fr var(--stbar);height:100vh}

header{grid-column:1/-1;display:flex;align-items:center;gap:8px;padding:0 16px;
  background:var(--bg-sidebar);border-bottom:1px solid var(--border);font-family:var(--font-mono);font-size:13px}
#hdr-logo{text-decoration:none;color:var(--text-heading);font-weight:600;display:flex;align-items:center;gap:6px}
.hdr-sep{color:var(--border);font-size:16px}
#hdr-title{color:var(--text-heading);font-weight:600}
#hdr-space{flex:1}
#hdr-gh{display:flex;align-items:center;gap:5px;color:var(--text-dim);text-decoration:none;
  font-size:12px;padding:4px 8px;border-radius:var(--r);border:1px solid var(--border)}
#hdr-gh:hover{color:var(--text);border-color:var(--accent)}

aside{background:var(--bg-sidebar);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden}
main{display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px;background:var(--bg)}
#stbar{grid-column:1/-1;display:flex;align-items:center;gap:12px;padding:0 12px;
  background:var(--bg-sidebar);border-top:1px solid var(--border);font-size:11px;
  color:var(--text-dim);font-family:var(--font-mono)}
.st-sep{opacity:.3}

#preview-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;max-width:100%}
#preview-canvas{max-width:min(100%,600px);max-height:calc(100vh - var(--hdr) - var(--stbar) - 48px);
  object-fit:contain;border-radius:var(--r);box-shadow:0 4px 24px rgba(0,0,0,.5)}
#preview-err{color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);
  border-radius:var(--r);padding:10px 16px;font-size:12px;max-width:480px;text-align:center;display:none}

.sb-sec{border-bottom:1px solid var(--border-light)}
.sb-hdr{display:flex;align-items:center;gap:6px;padding:10px 14px;cursor:pointer;user-select:none;
  font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--text-dim)}
.sb-hdr:hover{color:var(--text);background:var(--bg-hover)}
.chevron{margin-left:auto;transition:transform .15s}
.sb-sec.collapsed .chevron{transform:rotate(-90deg)}
.sb-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:10px}
.sb-sec.collapsed .sb-body{display:none}

.clabel{font-size:11px;color:var(--text-dim);margin-bottom:3px;display:block}
.crow{display:flex;flex-direction:column;gap:3px}

.pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--bg-input);
  color:var(--text-dim);font-size:11px;cursor:pointer;transition:all .1s;font-family:var(--font-mono)}
.pill:hover{border-color:var(--accent);color:var(--text)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

textarea,input[type=text],input[type=number]{width:100%;background:var(--bg-input);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);padding:6px 8px;font-size:12px;font-family:var(--font-mono);outline:none;resize:vertical}
textarea:focus,input[type=text]:focus,input[type=number]:focus{border-color:var(--accent)}

.color-row{display:flex;align-items:center;gap:8px}
.swatch{width:28px;height:28px;border-radius:var(--r);border:2px solid var(--border);cursor:pointer;overflow:hidden;flex-shrink:0}
.swatch input[type=color]{width:42px;height:42px;margin:-7px;cursor:pointer;border:none;outline:none}
.cval{flex:1;font-family:var(--font-mono);font-size:11px}

.srow{display:flex;align-items:center;gap:8px}
input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.sval{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);min-width:40px;text-align:right}

.trow{display:flex;align-items:center;gap:8px}
.tog{position:relative;width:32px;height:18px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--border);border-radius:9px;cursor:pointer;transition:background .15s}
.tog input:checked+.tog-track{background:var(--accent)}
.tog-thumb{position:absolute;top:3px;left:3px;width:12px;height:12px;background:#fff;border-radius:50%;pointer-events:none;transition:transform .15s}
.tog input:checked~.tog-thumb{transform:translateX(14px)}
.tog-lbl{font-size:12px;color:var(--text);cursor:pointer}

.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);
  border:1px solid var(--border);background:var(--bg-input);color:var(--text);font-size:12px;
  cursor:pointer;transition:all .1s}
.btn:hover{background:var(--bg-hover);border-color:var(--accent-h)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-h)}
.btn-row{display:flex;gap:6px;flex-wrap:wrap}

.hint{font-size:11px;color:var(--text-dim)}
.warn-hint{font-size:11px;color:#fbbf24}

/* Image drop zone */
#img-drop{border:1px dashed var(--border);border-radius:var(--r);padding:14px;text-align:center;
  cursor:pointer;transition:border-color .15s;font-size:11px;color:var(--text-dim)}
#img-drop:hover,#img-drop.over{border-color:var(--accent);color:var(--text)}
#img-preview-row{display:flex;align-items:center;gap:8px;margin-top:6px}
#img-thumb{width:40px;height:40px;border-radius:4px;object-fit:contain;background:var(--bg-input);
  border:1px solid var(--border);display:none}
#img-clear{font-size:11px;color:var(--text-dim);background:none;border:none;cursor:pointer;padding:2px 6px}
#img-clear:hover{color:#f87171}
#swap-btn{padding:6px 10px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg-input);
  cursor:pointer;color:var(--text-dim);font-size:11px;transition:all .1s}
#swap-btn:hover{color:var(--text);border-color:var(--accent)}
</style>
</head>
<body>
<div id="app">

<header>
  <a id="hdr-logo" href="/">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="1" width="6" height="6" rx="1" fill="#58a6ff" opacity=".8"/>
      <rect x="9" y="1" width="6" height="6" rx="1" fill="#58a6ff" opacity=".5"/>
      <rect x="1" y="9" width="6" height="6" rx="1" fill="#58a6ff" opacity=".5"/>
      <rect x="9" y="9" width="6" height="6" rx="1" fill="#58a6ff" opacity=".3"/>
    </svg>
    tools
  </a>
  <span class="hdr-sep">/</span>
  <span id="hdr-title">qr</span>
  <div id="hdr-space"></div>
  <a id="hdr-gh" href="https://github.com/humor4fun/tools" target="_blank">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    GitHub
  </a>
</header>

<aside id="sidebar">

  <!-- TYPE -->
  <div class="sb-sec" id="sec-type">
    <div class="sb-hdr" data-sec="type">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M0 0h6v6H0zm10 0h6v6h-6zM0 10h6v6H0z"/></svg>
      Type
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div class="pills" id="type-pills">
        <button class="pill active" data-type="qr">QR Code</button>
        <button class="pill" data-type="dm">Data Matrix</button>
      </div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="sb-sec" id="sec-content">
    <div class="sb-hdr" data-sec="content">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H2z"/><path d="M3 4.5h10v1H3zm0 2h10v1H3zm0 2h6v1H3z"/></svg>
      Content
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <textarea id="content-inp" rows="4" spellcheck="false">https://tools.bluejar.org/</textarea>
      <div class="hint" id="content-hint"></div>
    </div>
  </div>

  <!-- ERROR CORRECTION (QR only) -->
  <div class="sb-sec" id="sec-ec">
    <div class="sb-hdr" data-sec="ec">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0z"/></svg>
      Error Correction
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div class="pills" id="ec-pills">
        <button class="pill" data-ec="L">L · 7%</button>
        <button class="pill active" data-ec="M">M · 15%</button>
        <button class="pill" data-ec="Q">Q · 25%</button>
        <button class="pill" data-ec="H">H · 30%</button>
      </div>
      <div class="hint" id="ec-hint">Higher = more scannable if partially obscured</div>
    </div>
  </div>

  <!-- COLORS -->
  <div class="sb-sec" id="sec-colors">
    <div class="sb-hdr" data-sec="colors">
      Colors
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div class="crow">
        <label class="clabel">Foreground (modules)</label>
        <div class="color-row">
          <div class="swatch"><input type="color" id="fg-color" value="#000000"></div>
          <input type="text" id="fg-hex" value="#000000" class="cval">
        </div>
      </div>
      <div class="crow">
        <label class="clabel">Background</label>
        <div class="color-row">
          <div class="swatch" style="background:repeating-conic-gradient(#555 0% 25%,#333 0% 50%) 0 0/8px 8px">
            <input type="color" id="bg-color" value="#ffffff">
          </div>
          <input type="text" id="bg-hex" value="#ffffff" class="cval">
          <label title="Transparent background (PNG only)" style="display:flex;align-items:center;gap:4px;cursor:pointer">
            <input type="checkbox" id="bg-transparent" style="accent-color:var(--accent)">
            <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">α</span>
          </label>
        </div>
      </div>
      <button id="swap-btn">⇅ Swap colors</button>
    </div>
  </div>

  <!-- SHAPE -->
  <div class="sb-sec" id="sec-shape">
    <div class="sb-hdr" data-sec="shape">
      Shape
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div class="crow">
        <label class="clabel">Overall shape</label>
        <div class="pills" id="shape-pills">
          <button class="pill active" data-shape="square">Square</button>
          <button class="pill" data-shape="rounded">Rounded</button>
          <button class="pill" data-shape="circle">Circle</button>
        </div>
      </div>
      <div class="crow" id="shape-radius-row" style="display:none">
        <label class="clabel">Corner radius %</label>
        <div class="srow">
          <input type="range" id="shape-radius" min="5" max="45" value="20">
          <span class="sval" id="sr-val">20%</span>
        </div>
      </div>
      <div class="crow" id="qr-module-row">
        <label class="clabel">Module style</label>
        <div class="pills" id="module-pills">
          <button class="pill active" data-mod="square">Square</button>
          <button class="pill" data-mod="dot">Dot</button>
          <button class="pill" data-mod="rounded">Rounded</button>
        </div>
      </div>
      <div class="crow" id="qr-marker-row">
        <label class="clabel">Corner marker style</label>
        <div class="pills" id="marker-pills">
          <button class="pill active" data-marker="square">Square</button>
          <button class="pill" data-marker="dot">Dot</button>
          <button class="pill" data-marker="rounded">Rounded</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CENTER IMAGE -->
  <div class="sb-sec" id="sec-img">
    <div class="sb-hdr" data-sec="img">
      Center Image
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div id="img-drop">Drop image here or click to browse</div>
      <input type="file" id="img-file" accept="image/*" style="display:none">
      <div id="img-preview-row">
        <img id="img-thumb" alt="center logo">
        <span id="img-name" class="hint" style="flex:1"></span>
        <button id="img-clear">Remove</button>
      </div>
      <div class="crow" id="img-opts" style="display:none">
        <label class="clabel">Image size (% of QR)</label>
        <div class="srow">
          <input type="range" id="img-size" min="10" max="40" value="20">
          <span class="sval" id="is-val">20%</span>
        </div>
        <label class="clabel" style="margin-top:4px">Padding ring</label>
        <div class="srow">
          <input type="range" id="img-pad" min="0" max="10" value="3">
          <span class="sval" id="ip-val">3px</span>
        </div>
        <div class="warn-hint" id="ec-warn" style="display:none">With a center image, H error correction is recommended.</div>
      </div>
    </div>
  </div>

  <!-- SIZE -->
  <div class="sb-sec" id="sec-size">
    <div class="sb-hdr" data-sec="size">
      Size
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div class="crow">
        <label class="clabel">Output size (px)</label>
        <div class="srow">
          <input type="range" id="out-size" min="128" max="2048" value="512" step="32">
          <span class="sval" id="os-val">512</span>
        </div>
      </div>
      <div class="crow">
        <label class="clabel">Quiet zone (modules)</label>
        <div class="srow">
          <input type="range" id="quiet-zone" min="0" max="8" value="4">
          <span class="sval" id="qz-val">4</span>
        </div>
      </div>
    </div>
  </div>

  <!-- EXPORT -->
  <div class="sb-sec" id="sec-export">
    <div class="sb-hdr" data-sec="export">
      Export
      <span class="chevron"><svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M4.5 6l3.5 4 3.5-4z"/></svg></span>
    </div>
    <div class="sb-body">
      <div class="btn-row">
        <button class="btn primary" id="btn-png">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
          PNG
        </button>
        <button class="btn" id="btn-svg">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/><path d="M7.646 11.854a.5.5 0 0 0 .708 0l3-3a.5.5 0 0 0-.708-.708L8.5 10.293V1.5a.5.5 0 0 0-1 0v8.793L5.354 8.146a.5.5 0 1 0-.708.708l3 3z"/></svg>
          SVG
        </button>
        <button class="btn" id="btn-copy">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3zm-3-1A1.5 1.5 0 0 0 5 1.5H4.5v1A1.5 1.5 0 0 0 6 4h4a1.5 1.5 0 0 0 1.5-1.5v-1H11A1.5 1.5 0 0 0 9.5 0h-3z"/></svg>
          Copy
        </button>
      </div>
      <div id="copy-msg" class="hint" style="display:none">Copied!</div>
    </div>
  </div>

</aside>

<main>
  <div id="preview-wrap">
    <canvas id="preview-canvas"></canvas>
    <div id="preview-err"></div>
  </div>
</main>

<div id="stbar">
  <span id="st-info">—</span>
  <span class="st-sep">·</span>
  <span id="st-size">—</span>
  <span class="st-sep">·</span>
  <span id="st-type">—</span>
</div>

</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════════════

  }

  // Build matrix
  const mat = Array.from({length:size}, () => new Array(size).fill(null));
  const fixed = Array.from({length:size}, () => new Array(size).fill(false));

  function setFixed(r, c, v) { mat[r][c] = v; fixed[r][c] = true; }

  // Finder patterns
  function finder(row, col) {
    for (let dr = -1; dr <= 7; dr++) {
      for (let dc = -1; dc <= 7; dc++) {
        const r = row+dr, c = col+dc;
        if (r < 0 || r >= size || c < 0 || c >= size) continue;
        const inPat = dr >= 0 && dr <= 6 && dc >= 0 && dc <= 6;
        const isDark = inPat && ((dr===0||dr===6||dc===0||dc===6)||(dr>=2&&dr<=4&&dc>=2&&dc<=4));
        setFixed(r, c, isDark);
      }
    }
  }
  finder(0,0); finder(0,size-7); finder(size-7,0);

  // Timing patterns
  for (let i = 8; i < size-8; i++) {
    setFixed(6, i, i%2===0);
    setFixed(i, 6, i%2===0);
  }

  // Dark module
  setFixed(size-8, 8, true);

  // Alignment patterns
  const ALIGN = [
    [],[],[6,18],[6,22],[6,26],[6,30],[6,34],
    [6,22,38],[6,24,42],[6,26,46],[6,28,50],
    [6,30,54],[6,32,58],[6,34,62],[6,26,46,66],
    [6,26,48,70],[6,26,50,74],[6,30,54,78],[6,30,56,82],
    [6,30,58,86],[6,34,62,90],[6,28,50,72,94],
    [6,26,50,74,98],[6,30,54,78,102],[6,28,54,80,106],
    [6,32,58,84,110],[6,30,58,86,114],[6,34,62,90,118],
    [6,26,50,74,98,122],[6,30,54,78,102,126],
    [6,26,52,78,104,130],[6,30,56,82,108,132],
    [6,34,60,86,112,136],[6,30,58,86,114,142],
    [6,34,62,90,118,146],[6,30,54,78,102,126,150],
    [6,24,50,76,102,128,154],[6,28,54,80,106,132,158],
    [6,32,58,84,110,136,162],[6,26,54,82,110,138,166],
    [6,30,58,86,114,142,170]
  ];

  const alignPos = ALIGN[version] || [];
  for (const ar of alignPos) {
    for (const ac of alignPos) {
      if (fixed[ar][ac]) continue;
      for (let dr = -2; dr <= 2; dr++) {
        for (let dc = -2; dc <= 2; dc++) {
          const isDark = dr===-2||dr===2||dc===-2||dc===2||dr===0&&dc===0;
          setFixed(ar+dr, ac+dc, isDark);
        }
      }
    }
  }

  // Reserve format/version info areas (mark as fixed, fill later)
  for (let i = 0; i <= 8; i++) {
    if (!fixed[8][i]) setFixed(8, i, false);
    if (!fixed[i][8]) setFixed(i, 8, false);
    if (!fixed[8][size-1-i+1]) setFixed(8, size-1-i+1, false);
    if (!fixed[size-1-i+1][8]) setFixed(size-1-i+1, 8, false);
  }

  // Place data bits
  const finalBits = [];
  for (const byte of finalBytes) {
    for (let i = 7; i >= 0; i--) finalBits.push((byte >> i) & 1);
  }

  // Apply mask and score
  const MASKS = [
    (r,c)=>(r+c)%2===0,
    (r,c)=>r%2===0,
    (r,c)=>c%3===0,
    (r,c)=>(r+c)%3===0,
    (r,c)=>(Math.floor(r/2)+Math.floor(c/3))%2===0,
    (r,c)=>(r*c)%2+(r*c)%3===0,
    (r,c)=>((r*c)%2+(r*c)%3)%2===0,
    (r,c)=>((r+c)%2+(r*c)%3)%2===0,
  ];

  function placeDataWithMask(maskId) {
    const m = Array.from({length:size}, (_,r)=>mat[r].slice());
    let bi = 0;
    for (let rightCol = size-1; rightCol >= 1; rightCol -= 2) {
      const col = rightCol <= 6 ? rightCol - 1 : rightCol;
      for (let vert = 0; vert < size; vert++) {
        for (let h = 0; h < 2; h++) {
          const r = (col % 2 === 0) ? size-1-vert : vert;
          const c = col - h + (rightCol <= 6 ? 1 : 0);
          if (c < 0 || c >= size) continue;
          if (fixed[r][c]) continue;
          const bit = bi < finalBits.length ? finalBits[bi++] : 0;
          const masked = bit ^ (MASKS[maskId](r,c) ? 1 : 0);
          m[r][c] = masked === 1;
        }
      }
    }
    return m;
  }

  function penaltyScore(m) {
    let score = 0;
    const N1=3,N2=3,N3=40,N4=10;
    // Rule 1
    for (let r=0;r<size;r++) {
      let runH=1,runV=1;
      for (let c=1;c<size;c++) {
        if (m[r][c]===m[r][c-1]) runH++; else { if(runH>=5)score+=N1+(runH-5); runH=1; }
        if (m[c][r]===m[c-1][r]) runV++; else { if(runV>=5)score+=N1+(runV-5); runV=1; }
      }
      if(runH>=5)score+=N1+(runH-5);
      if(runV>=5)score+=N1+(runV-5);
    }
    // Rule 2: 2x2 blocks
    for (let r=0;r<size-1;r++)
      for (let c=0;c<size-1;c++)
        if(m[r][c]===m[r][c+1]&&m[r][c]===m[r+1][c]&&m[r][c]===m[r+1][c+1]) score+=N2;
    // Rule 4
    let dark=0; for(let r=0;r<size;r++) for(let c=0;c<size;c++) if(m[r][c]) dark++;
    const pct=dark/(size*size)*100;
    score+=N4*Math.floor(Math.abs(pct-50)/5);
    return score;
  }

  // Format info bits
  const ECI = {L:1,M:0,Q:3,H:2};
  function formatInfo(ecLevel, maskId) {
    const data = (ECI[ecLevel] << 3) | maskId;
    let rem = data << 10;
    const gen = 0x537;
    for (let i = 14; i >= 10; i--) {
      if (rem & (1 << i)) rem ^= gen << (i - 10);
    }
    return ((data << 10) | rem) ^ 0x5412;
  }

  function applyFormatInfo(m, ecLevel, maskId) {
    const fi = formatInfo(ecLevel, maskId);
    const order = [0,1,2,3,4,5,7,8,8,8,8,8,8,8,8];
    const order2 = [8,8,8,8,8,8,8,8,7,5,4,3,2,1,0];
    for (let i = 0; i < 15; i++) {
      const bit = (fi >> i) & 1 ? true : false;
      m[8][order2[i]] = bit;
      m[order[i]][8] = bit;
      if (i < 8) m[size-1-i][8] = bit;
      else m[8][size-15+i] = bit;
    }
    m[size-8][8] = true; // dark module
  }

  // Version info
  function versionInfo(v) {
    let rem = v << 12;
    const gen = 0x1F25;
    for (let i = 17; i >= 12; i--) {
      if (rem & (1 << i)) rem ^= gen << (i - 12);
    }
    return (v << 12) | rem;
  }

  function applyVersionInfo(m, v) {
    if (v < 7) return;
    const vi = versionInfo(v);
    for (let i = 0; i < 18; i++) {
      const bit = (vi >> i) & 1 ? true : false;
      const r = Math.floor(i / 3), c = size - 11 + (i % 3);
      m[r][c] = bit; m[c][r] = bit;
    }
  }

  // Find best mask
  let bestScore = Infinity, bestMask = 0, bestMat = null;
  for (let mi = 0; mi < 8; mi++) {
    const m = placeDataWithMask(mi);
    applyFormatInfo(m, ecLevel, mi);
    applyVersionInfo(m, version);
    const s = penaltyScore(m);
    if (s < bestScore) { bestScore = s; bestMask = mi; bestMat = m; }
  }

  return { matrix: bestMat, size, version };
}

// ═══════════════════════════════════════════════════════════════════════════
//  Data Matrix encoder (ECC 200, square symbols only)
//  Simplified: supports ASCII/byte encoding, auto-size selection
// ═══════════════════════════════════════════════════════════════════════════

function generateDataMatrix(text) {
  const bytes = new TextEncoder().encode(text);
  
  // Symbol sizes [rows, cols, dataCapacity]
  const SIZES = [
    [10,10,3],[12,12,5],[14,14,8],[16,16,12],[18,18,18],[20,20,22],
    [22,22,30],[24,24,36],[26,26,44],[32,32,62],[36,36,86],[40,40,114],
    [44,44,144],[48,48,174],[52,52,204],[64,64,280],[72,72,368],[80,80,456],
    [88,88,576],[96,96,696],[104,104,816],[120,120,1050],[132,132,1304],[144,144,1558]
  ];

  // Find minimum size
  let sym = null;
  for (const s of SIZES) {
    if (s[2] >= bytes.length + 1) { sym = s; break; }
  }
  if (!sym) throw new Error('Data too long for Data Matrix');

  const [rows, cols, cap] = sym;

  // Encode: ASCII scheme
  const codewords = [];
  for (const b of bytes) {
    if (b >= 32 && b <= 127) codewords.push(b - 31); // ASCII printable
    else { codewords.push(235); codewords.push(b + 1); } // extended ASCII
  }
  // Pad
  codewords.push(129); // end-of-data
  while (codewords.length < cap) {
    // randomized padding
    const r = codewords.length + 1;
    let pad = 129 + ((r * 149) % 253) + 1;
    if (pad > 254) pad -= 254;
    codewords.push(pad);
  }

  // ECC 200 Reed-Solomon
  // Simplified: we'll use a lookup for the RS params
  const RS_PARAMS = {
    3:[5,7,1],5:[7,10,1],8:[10,12,1],12:[12,14,1],18:[14,18,1],22:[18,20,1],
    30:[20,24,1],36:[24,24,1],44:[28,28,1],62:[36,36,1],86:[42,42,2],
    114:[48,56,2],144:[56,56,2],174:[68,68,2],204:[84,84,4],280:[112,112,4],
    368:[144,144,4],456:[192,192,4],576:[224,224,4],696:[272,272,6],
    816:[336,336,6],1050:[408,408,6],1304:[496,496,6],1558:[620,620,6]
  };

  const rsParam = RS_PARAMS[cap];
  if (!rsParam) throw new Error('RS params not found');
  const [rsLen, totalBlocks, interleavedBlocks] = rsParam;

  // GF(256) with primitive poly x^8+x^5+x^3+x^2+1 = 0x12D for DM
  const PRIM = 0x12D;
  const LOG = new Uint8Array(256), EXP = new Uint8Array(512);
  let x = 1;
  for (let i = 0; i < 255; i++) {
    EXP[i] = x; LOG[x] = i;
    x *= 2; if (x > 255) x ^= PRIM;
  }
  for (let i = 255; i < 512; i++) EXP[i] = EXP[i-255];

  function gfMulDM(a, b) {
    if (a === 0 || b === 0) return 0;
    return EXP[LOG[a] + LOG[b]];
  }

  function makeGenPolyDM(degree) {
    let g = [1];
    for (let i = 1; i <= degree; i++) {
      const newG = new Array(g.length + 1).fill(0);
      for (let j = 0; j < g.length; j++) {
        newG[j] ^= gfMulDM(g[j], EXP[i]);
        newG[j+1] ^= g[j];
      }
      g = newG;
    }
    return g;
  }

  function rsEncode(data, numEC) {
    const gen = makeGenPolyDM(numEC);
    const rem = new Array(numEC).fill(0);
    for (const d of data) {
      const fb = d ^ rem[0];
      for (let j = 0; j < numEC - 1; j++) rem[j] = rem[j+1] ^ gfMulDM(fb, gen[numEC-1-j]);
      rem[numEC-1] = gfMulDM(fb, gen[0]);
    }
    return rem;
  }

  const numDataPerBlock = Math.ceil(cap / interleavedBlocks);
  const numECPerBlock = rsLen;
  const allEC = [];

  for (let b = 0; b < interleavedBlocks; b++) {
    const blockData = [];
    for (let i = b; i < codewords.length; i += interleavedBlocks) blockData.push(codewords[i]);
    allEC.push(rsEncode(blockData, numECPerBlock));
  }

  // Interleave EC
  const ecInterleaved = [];
  for (let i = 0; i < numECPerBlock; i++) {
    for (let b = 0; b < interleavedBlocks; b++) {
      if (allEC[b][i] !== undefined) ecInterleaved.push(allEC[b][i]);
    }
  }

  const finalCW = [...codewords, ...ecInterleaved];

  // Place codewords into matrix using DM placement rules
  const mat = Array.from({length:rows}, () => new Array(cols).fill(false));

  // Set border
  for (let i = 0; i < rows; i++) {
    mat[i][0] = true; // left solid border
    mat[i][cols-1] = (i % 2 === 0); // right dashed
  }
  for (let j = 0; j < cols; j++) {
    mat[rows-1][j] = true; // bottom solid border
    mat[0][j] = (j % 2 === 1); // top dashed
  }

  // Place data using Utah/corner patterns
  const used = Array.from({length:rows}, () => new Array(cols).fill(false));
  // Mark borders used
  for (let i = 0; i < rows; i++) { used[i][0] = true; used[i][cols-1] = true; }
  for (let j = 0; j < cols; j++) { used[0][j] = true; used[rows-1][j] = true; }

  function setModule(r, c, bit) {
    // Wrap
    let rr = r, cc = c;
    if (rr < 0) { rr += rows; cc += 4 - ((rows+4)%8); }
    if (cc < 0) { cc += cols; rr += 4 - ((cols+4)%8); }
    if (rr >= rows || cc >= cols) return;
    if (used[rr][cc]) return;
    mat[rr][cc] = bit;
    used[rr][cc] = true;
  }

  function utah(r, c, bits) {
    setModule(r-2, c-2, (bits>>7)&1);
    setModule(r-2, c-1, (bits>>6)&1);
    setModule(r-1, c-2, (bits>>5)&1);
    setModule(r-1, c-1, (bits>>4)&1);
    setModule(r-1, c,   (bits>>3)&1);
    setModule(r,   c-2, (bits>>2)&1);
    setModule(r,   c-1, (bits>>1)&1);
    setModule(r,   c,   (bits>>0)&1);
  }

  function corner1(bits) {
    setModule(rows-1, 0,   (bits>>7)&1);
    setModule(rows-1, 1,   (bits>>6)&1);
    setModule(rows-1, 2,   (bits>>5)&1);
    setModule(0,      cols-2,(bits>>4)&1);
    setModule(0,      cols-1,(bits>>3)&1);
    setModule(1,      cols-1,(bits>>2)&1);
    setModule(2,      cols-1,(bits>>1)&1);
    setModule(3,      cols-1,(bits>>0)&1);
  }

  function corner2(bits) {
    setModule(rows-3, 0,   (bits>>7)&1);
    setModule(rows-2, 0,   (bits>>6)&1);
    setModule(rows-1, 0,   (bits>>5)&1);
    setModule(0,      cols-4,(bits>>4)&1);
    setModule(0,      cols-3,(bits>>3)&1);
    setModule(0,      cols-2,(bits>>2)&1);
    setModule(0,      cols-1,(bits>>1)&1);
    setModule(1,      cols-1,(bits>>0)&1);
  }

  function corner3(bits) {
    setModule(rows-3, 0,   (bits>>7)&1);
    setModule(rows-2, 0,   (bits>>6)&1);
    setModule(rows-1, 0,   (bits>>5)&1);
    setModule(0,      cols-2,(bits>>4)&1);
    setModule(0,      cols-1,(bits>>3)&1);
    setModule(1,      cols-1,(bits>>2)&1);
    setModule(2,      cols-1,(bits>>1)&1);
    setModule(3,      cols-1,(bits>>0)&1);
  }

  function corner4(bits) {
    setModule(rows-1, 0,   (bits>>7)&1);
    setModule(rows-1, cols-1,(bits>>6)&1);
    setModule(0,      cols-3,(bits>>5)&1);
    setModule(1,      cols-3,(bits>>4)&1);
    setModule(1,      cols-2,(bits>>3)&1);
    setModule(1,      cols-1,(bits>>2)&1);
    setModule(2,      cols-3,(bits>>1)&1);
    setModule(2,      cols-2,(bits>>0)&1);
  }

  let cwIdx = 0;
  let r = 4, c = 0;

  function notUsed(rr, cc) {
    if (rr < 0 || rr >= rows || cc < 0 || cc >= cols) return false;
    return !used[rr][cc];
  }

  let safety = 0;
  while ((r < rows || c < cols) && safety++ < 10000) {
    if (r === rows && c === 0) { corner1(finalCW[cwIdx++] || 0); }
    else if (r === rows-2 && c === 0 && cols % 4 !== 0) { corner2(finalCW[cwIdx++] || 0); }
    else if (r === rows-2 && c === 0 && cols % 8 === 4) { corner3(finalCW[cwIdx++] || 0); }
    else if (r === 0 && c === cols-2 && rows % 8 === 4) { corner4(finalCW[cwIdx++] || 0); }
    
    do { if (r < rows && c >= 0 && notUsed(r,c)) utah(r,c, finalCW[cwIdx++]||0); r-=2; c+=2; } while (r >= 0 && c < cols);
    r += 1; c += 3;
    do { if (r >= 0 && c < cols && notUsed(r,c)) utah(r,c, finalCW[cwIdx++]||0); r+=2; c-=2; } while (r < rows && c >= 0);
    r += 3; c += 1;
  }

  // Fill unused interior
  if (!used[rows-1][cols-1]) { mat[rows-1][cols-1] = true; used[rows-1][cols-1] = true; }
  if (!used[rows-2][cols-2]) { mat[rows-2][cols-2] = false; }

  return { matrix: mat, size: rows };
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDERING
// ═══════════════════════════════════════════════════════════════════════════

let centerImg = null;

function renderQR(canvas, matrix, size, opts) {
  const px = Math.max(1, Math.floor(opts.outSize / (size + 2 * opts.quietZone)));
  const total = (size + 2 * opts.quietZone) * px;
  const off = opts.quietZone * px;

  canvas.width = total;
  canvas.height = total;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.clearRect(0, 0, total, total);
  if (!opts.transparent) {
    ctx.fillStyle = opts.bg;
    ctx.fillRect(0, 0, total, total);
  }

  const isQR = opts.type === 'qr';

  // Identify QR finder pattern modules (top-left 7x7, top-right, bottom-left)
  function isFinderRow(r, c) {
    if (!isQR) return false;
    const inTL = r < 7 && c < 7;
    const inTR = r < 7 && c >= size-7;
    const inBL = r >= size-7 && c < 7;
    return inTL || inTR || inBL;
  }

  function drawModule(ctx, x, y, w, h, style, color) {
    ctx.fillStyle = color;
    if (style === 'dot') {
      ctx.beginPath();
      ctx.arc(x+w/2, y+h/2, w*0.45, 0, Math.PI*2);
      ctx.fill();
    } else if (style === 'rounded') {
      const r = w * 0.3;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    } else {
      ctx.fillRect(x, y, w, h);
    }
  }

  // Draw modules
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!matrix[r][c]) continue;
      const x = off + c * px;
      const y = off + r * px;
      const isFinder = isFinderRow(r, c);
      const style = isFinder ? opts.markerStyle : opts.moduleStyle;
      drawModule(ctx, x, y, px, px, style, opts.fg);
    }
  }

  // Overall shape clip
  if (opts.overallShape !== 'square') {
    applyOverallShapeClip(canvas, opts);
  }

  // Center image
  if (centerImg && opts.type === 'qr') {
    const imgSize = Math.round(total * opts.imgSize / 100);
    const pad = opts.imgPad;
    const ix = Math.round((total - imgSize) / 2);
    const iy = Math.round((total - imgSize) / 2);
    // White padding circle/rect
    ctx.fillStyle = opts.bg || '#ffffff';
    ctx.beginPath();
    ctx.roundRect(ix - pad, iy - pad, imgSize + pad*2, imgSize + pad*2, pad);
    ctx.fill();
    ctx.drawImage(centerImg, ix, iy, imgSize, imgSize);
  }
}

function applyOverallShapeClip(canvas, opts) {
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');
  const img = ctx.getImageData(0, 0, w, h);
  const d = img.data;
  const cx = w/2, cy = h/2;
  const rx = w/2, ry = h/2;

  for (let py = 0; py < h; py++) {
    for (let px2 = 0; px2 < w; px2++) {
      let inside = true;
      if (opts.overallShape === 'circle') {
        const dx = (px2 - cx)/rx, dy = (py - cy)/ry;
        inside = dx*dx + dy*dy <= 1;
      } else if (opts.overallShape === 'rounded') {
        const r = Math.min(w, h) * opts.shapeRadius / 100;
        const dx = Math.max(0, Math.abs(px2 - cx) - (rx - r));
        const dy = Math.max(0, Math.abs(py - cy) - (ry - r));
        inside = dx*dx + dy*dy <= r*r;
      }
      if (!inside) d[(py*w + px2)*4 + 3] = 0;
    }
  }
  ctx.putImageData(img, 0, 0);
}

// ═══════════════════════════════════════════════════════════════════════════
//  STATE & UI
// ═══════════════════════════════════════════════════════════════════════════

let curType = 'qr';
let curEC = 'M';
let curShape = 'square';
let curModule = 'square';
let curMarker = 'square';
let lastMatrix = null;
let lastSize = 0;

const previewCanvas = document.getElementById('preview-canvas');
const previewErr    = document.getElementById('preview-err');
const contentInp    = document.getElementById('content-inp');
const contentHint   = document.getElementById('content-hint');
const fgColor       = document.getElementById('fg-color');
const fgHex         = document.getElementById('fg-hex');
const bgColor       = document.getElementById('bg-color');
const bgHex         = document.getElementById('bg-hex');
const bgTransp      = document.getElementById('bg-transparent');
const outSizeEl     = document.getElementById('out-size');
const quietZoneEl   = document.getElementById('quiet-zone');
const imgSizeEl     = document.getElementById('img-size');
const imgPadEl      = document.getElementById('img-pad');
const shapeRadiusEl = document.getElementById('shape-radius');

function getOpts() {
  return {
    type:        curType,
    ec:          curEC,
    fg:          fgColor.value,
    bg:          bgColor.value,
    transparent: bgTransp.checked,
    outSize:     parseInt(outSizeEl.value),
    quietZone:   parseInt(quietZoneEl.value),
    overallShape:curShape,
    shapeRadius: parseInt(shapeRadiusEl.value),
    moduleStyle: curModule,
    markerStyle: curMarker,
    imgSize:     parseInt(imgSizeEl.value),
    imgPad:      parseInt(imgPadEl.value),
  };
}

let renderTimer = null;
function scheduleRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(doRender, 50);
}

function doRender() {
  const text = contentInp.value;
  if (!text.trim()) {
    previewErr.style.display = 'none';
    return;
  }
  try {
    let result;
    if (curType === 'qr') {
      result = generateQRMatrix(text, curEC);
    } else {
      result = generateDataMatrix(text);
    }
    lastMatrix = result.matrix;
    lastSize = result.size;
    const opts = getOpts();
    renderQR(previewCanvas, lastMatrix, lastSize, opts);
    previewErr.style.display = 'none';
    contentHint.textContent = curType === 'qr'
      ? `Version ${result.version} · ${result.size}×${result.size} modules · EC ${curEC}`
      : `${result.size}×${result.size} symbol`;
    document.getElementById('st-info').textContent =
      curType === 'qr' ? `v${result.version} QR Code · EC ${curEC}` : 'Data Matrix ECC200';
    document.getElementById('st-size').textContent = `${previewCanvas.width}×${previewCanvas.height}px`;
    document.getElementById('st-type').textContent = `${result.size}×${result.size} modules`;
  } catch(e) {
    previewErr.textContent = e.message;
    previewErr.style.display = 'block';
    contentHint.textContent = '';
  }
}

// Sidebar collapse
document.querySelectorAll('.sb-hdr').forEach(h => {
  h.addEventListener('click', () => h.closest('.sb-sec').classList.toggle('collapsed'));
});

// Type pills
document.querySelectorAll('#type-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#type-pills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    curType = p.dataset.type;
    document.getElementById('sec-ec').style.display = curType === 'qr' ? '' : 'none';
    document.getElementById('qr-module-row').style.display = curType === 'qr' ? '' : 'none';
    document.getElementById('qr-marker-row').style.display = curType === 'qr' ? '' : 'none';
    scheduleRender();
  });
});

// EC pills
document.querySelectorAll('#ec-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#ec-pills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    curEC = p.dataset.ec;
    updateECWarn();
    scheduleRender();
  });
});

function updateECWarn() {
  const warn = document.getElementById('ec-warn');
  if (centerImg && curEC !== 'H' && curEC !== 'Q') {
    warn.style.display = 'block';
  } else {
    warn.style.display = 'none';
  }
}

// Content
contentInp.addEventListener('input', scheduleRender);

// Colors
function wireColor(picker, hexInp) {
  picker.addEventListener('input', () => { hexInp.value = picker.value; scheduleRender(); });
  hexInp.addEventListener('input', () => {
    if (/^#[0-9a-fA-F]{6}$/.test(hexInp.value)) { picker.value = hexInp.value; scheduleRender(); }
  });
}
wireColor(fgColor, fgHex);
wireColor(bgColor, bgHex);
bgTransp.addEventListener('change', scheduleRender);
document.getElementById('swap-btn').addEventListener('click', () => {
  const t = fgColor.value; fgColor.value = bgColor.value; bgColor.value = t;
  fgHex.value = fgColor.value; bgHex.value = bgColor.value; scheduleRender();
});

// Shape pills
document.querySelectorAll('#shape-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#shape-pills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    curShape = p.dataset.shape;
    document.getElementById('shape-radius-row').style.display = curShape === 'rounded' ? 'flex' : 'none';
    scheduleRender();
  });
});

// Module style pills
document.querySelectorAll('#module-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#module-pills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    curModule = p.dataset.mod;
    scheduleRender();
  });
});

// Marker style pills
document.querySelectorAll('#marker-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#marker-pills .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    curMarker = p.dataset.marker;
    scheduleRender();
  });
});

// Sliders
function wireSlider(id, valId, fmt) {
  const el = document.getElementById(id), vl = document.getElementById(valId);
  el.addEventListener('input', () => { vl.textContent = fmt(el.value); scheduleRender(); });
  vl.textContent = fmt(el.value);
}
wireSlider('out-size', 'os-val', v => v);
wireSlider('quiet-zone', 'qz-val', v => v);
wireSlider('img-size', 'is-val', v => v + '%');
wireSlider('img-pad', 'ip-val', v => v + 'px');
wireSlider('shape-radius', 'sr-val', v => v + '%');

// Center image
const imgDrop = document.getElementById('img-drop');
const imgFile = document.getElementById('img-file');
const imgThumb = document.getElementById('img-thumb');
const imgName = document.getElementById('img-name');
const imgOpts = document.getElementById('img-opts');

imgDrop.addEventListener('click', () => imgFile.click());
imgDrop.addEventListener('dragover', e => { e.preventDefault(); imgDrop.classList.add('over'); });
imgDrop.addEventListener('dragleave', () => imgDrop.classList.remove('over'));
imgDrop.addEventListener('drop', e => {
  e.preventDefault(); imgDrop.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) loadCenterImg(file);
});
imgFile.addEventListener('change', () => { if (imgFile.files[0]) loadCenterImg(imgFile.files[0]); });
document.getElementById('img-clear').addEventListener('click', () => {
  centerImg = null;
  imgThumb.style.display = 'none';
  imgOpts.style.display = 'none';
  imgName.textContent = '';
  updateECWarn();
  scheduleRender();
});

function loadCenterImg(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    centerImg = img;
    imgThumb.src = url;
    imgThumb.style.display = 'block';
    imgOpts.style.display = 'flex';
    imgName.textContent = file.name;
    updateECWarn();
    scheduleRender();
  };
  img.src = url;
}

// Export
function buildExportCanvas() {
  if (!lastMatrix) return null;
  const opts = getOpts();
  const tmp = document.createElement('canvas');
  renderQR(tmp, lastMatrix, lastSize, {...opts, outSize: opts.outSize});
  return tmp;
}

document.getElementById('btn-png').addEventListener('click', () => {
  const c = buildExportCanvas(); if (!c) return;
  c.toBlob(b => {
    const url = URL.createObjectURL(b);
    const a = document.createElement('a');
    a.href = url; a.download = `${curType}-code.png`; a.click();
    URL.revokeObjectURL(url);
  });
});

document.getElementById('btn-svg').addEventListener('click', () => {
  if (!lastMatrix) return;
  const opts = getOpts();
  const svg = generateSVG(lastMatrix, lastSize, opts);
  const b = new Blob([svg], {type:'image/svg+xml'});
  const url = URL.createObjectURL(b);
  const a = document.createElement('a');
  a.href = url; a.download = `${curType}-code.svg`; a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('btn-copy').addEventListener('click', () => {
  const c = buildExportCanvas(); if (!c) return;
  c.toBlob(async b => {
    const msg = document.getElementById('copy-msg');
    try {
      await navigator.clipboard.write([new ClipboardItem({'image/png': b})]);
      msg.textContent = 'Copied!'; msg.style.color = '';
    } catch(e) {
      msg.textContent = 'Copy failed'; msg.style.color = '#f87171';
    }
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2200);
  });
});

function generateSVG(matrix, size, opts) {
  const px = Math.max(1, Math.floor(opts.outSize / (size + 2 * opts.quietZone)));
  const total = (size + 2 * opts.quietZone) * px;
  const off = opts.quietZone * px;

  let rects = '';
  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      if (!matrix[r][c]) continue;
      const x = off + c * px, y = off + r * px;
      const style = opts.moduleStyle;
      if (style === 'dot') {
        const cx2 = x + px/2, cy2 = y + px/2, rad = px * 0.45;
        rects += `<circle cx="${cx2}" cy="${cy2}" r="${rad}"/>`;
      } else if (style === 'rounded') {
        const rr = px * 0.3;
        rects += `<rect x="${x}" y="${y}" width="${px}" height="${px}" rx="${rr}"/>`;
      } else {
        rects += `<rect x="${x}" y="${y}" width="${px}" height="${px}"/>`;
      }
    }
  }

  const bg = opts.transparent ? '' : `<rect width="${total}" height="${total}" fill="${opts.bg}"/>`;
  const clip = opts.overallShape === 'circle'
    ? `<defs><clipPath id="oc"><ellipse cx="${total/2}" cy="${total/2}" rx="${total/2}" ry="${total/2}"/></clipPath></defs>`
    : opts.overallShape === 'rounded'
    ? `<defs><clipPath id="oc"><rect width="${total}" height="${total}" rx="${total*opts.shapeRadius/100}"/></clipPath></defs>`
    : '';
  const clipAttr = opts.overallShape !== 'square' ? ' clip-path="url(#oc)"' : '';

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${total}" height="${total}" viewBox="0 0 ${total} ${total}">${clip}<g${clipAttr}>${bg}<g fill="${opts.fg}">${rects}</g></g></svg>`;
}

// Init
doRender();
</script>
